<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sizzle — Video Reel Cutter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Anthropic Sans';
      src: url('https://cdn.prod.website-files.com/6889473510b50328dbb70ae6/68c8b3afb3bfa0054f8d947a_AnthropicSans-Romans-Variable-25x258.woff2') format("woff2");
      font-weight: 300 800;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(20, 20, 25, 0.92);
      --surface-hover: rgba(30, 30, 38, 0.92);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #e8e8e8;
      --text-dim: #9b9b9b;
      --accent: #6080ff;
      --accent-glow: rgba(100, 150, 255, 0.25);
      --danger: #ff6060;
      --success: #60ff80;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: 'Anthropic Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: 1fr auto;
      gap: 16px;
      padding: 16px;
      overflow: hidden;
    }

    /* ─── Drop zone (empty state) ─────────────────────────── */
    #drop-zone {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--bg);
      z-index: 100;
      transition: opacity 0.3s;
    }
    #drop-zone.hidden { opacity: 0; pointer-events: none; }
    #drop-zone.dragover { background: #12121a; }

    #drop-zone h1 {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    #drop-zone p {
      color: var(--text-dim);
      font-size: 15px;
    }
    #drop-zone .pick {
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font: 500 15px 'Anthropic Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    #drop-zone .pick:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    /* ─── Stage (video preview) ───────────────────────────── */
    #stage {
      grid-column: 1;
      grid-row: 1;
      background: #000;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #video {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    #stage-overlay {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-family: var(--mono);
      font-size: 13px;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 6px;
      backdrop-filter: blur(10px);
    }

    /* ─── Sidebar (clips + export) ────────────────────────── */
    #sidebar {
      grid-column: 2;
      grid-row: 1 / 3;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #sidebar-header h2 {
      font-size: 15px;
      font-weight: 600;
    }
    #total-duration {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }

    #clips {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #clips:empty::after {
      content: 'No clips yet. Set in/out points on the timeline below, or let Claude suggest some.';
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .clip {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: grab;
      transition: all 0.15s;
    }
    .clip:hover {
      border-color: var(--border-strong);
      background: rgba(0,0,0,0.4);
    }
    .clip.dragging { opacity: 0.4; }

    .clip-thumb {
      width: 48px;
      height: 32px;
      border-radius: 4px;
      background: #1a1a1f;
      object-fit: cover;
    }
    .clip-info {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.4;
    }
    .clip-range { color: var(--text); }
    .clip-dur { color: var(--text-dim); }
    .clip-remove {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
    }
    .clip-remove:hover {
      background: rgba(255,96,96,0.15);
      color: var(--danger);
    }

    /* ─── Export panel ────────────────────────────────────── */
    #export-panel {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .preset-row {
      display: flex;
      gap: 6px;
    }
    .preset-row button {
      flex: 1;
      padding: 8px 4px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font: 500 11px 'Anthropic Sans', sans-serif;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-row button:hover { color: var(--text); }
    .preset-row button.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: #fff;
    }

    #export-btn {
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font: 600 14px 'Anthropic Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    #export-btn:hover {
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    #export-btn:disabled {
      background: rgba(255,255,255,0.1);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    #progress {
      height: 3px;
      background: rgba(0,0,0,0.3);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    #progress.active { display: block; }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s;
    }
    #status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      min-height: 14px;
      text-align: center;
    }

    /* ─── Timeline ────────────────────────────────────────── */
    #timeline-panel {
      grid-column: 1;
      grid-row: 2;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #timeline-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tl-btn {
      padding: 8px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text);
      font: 500 12px 'Anthropic Sans', sans-serif;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tl-btn:hover {
      border-color: var(--border-strong);
      background: rgba(0,0,0,0.5);
    }
    .tl-btn.primary {
      background: var(--accent-glow);
      border-color: var(--accent);
    }
    .tl-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #play-btn {
      width: 36px;
      padding: 8px 0;
      font-size: 14px;
    }

    .time-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .time-inputs input {
      width: 58px;
      padding: 6px 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text);
      font: 500 12px var(--mono);
      border-radius: 4px;
      text-align: center;
    }
    .time-inputs input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .spacer { flex: 1; }

    #timeline {
      position: relative;
      height: 80px;
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: crosshair;
      user-select: none;
      overflow: hidden;
    }

    #thumbstrip {
      position: absolute;
      inset: 0;
      display: flex;
    }
    #thumbstrip canvas {
      height: 100%;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .tl-clip {
      position: absolute;
      top: 0;
      bottom: 0;
      background: var(--accent-glow);
      border-left: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      pointer-events: none;
    }

    #selection {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(255,255,255,0.15);
      border-left: 2px solid #fff;
      border-right: 2px solid #fff;
      display: none;
      pointer-events: none;
    }

    #playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #fff;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }
    #playhead::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -5px;
      width: 12px;
      height: 8px;
      background: #fff;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }

    .suggestion {
      position: absolute;
      top: 0;
      bottom: 0;
      border-bottom: 3px solid var(--success);
      pointer-events: auto;
      cursor: pointer;
    }
    .suggestion:hover {
      background: rgba(96,255,128,0.15);
    }

    /* ─── Claude panel (slide-out) ────────────────────────── */
    #claude-panel {
      position: fixed;
      top: 16px;
      right: 372px;
      width: 320px;
      max-height: calc(100dvh - 32px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      padding: 18px;
      display: none;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      z-index: 50;
    }
    #claude-panel.open { display: flex; }
    #claude-panel h3 {
      font-size: 14px;
      font-weight: 600;
    }
    #claude-panel .hint {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    #api-key {
      width: 100%;
      padding: 8px 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text);
      font: 400 12px var(--mono);
      border-radius: 6px;
    }
    #api-key:focus {
      outline: none;
      border-color: var(--accent);
    }
    #claude-results {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }
    .claude-suggest {
      padding: 8px 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .claude-suggest:hover {
      border-color: var(--success);
      background: rgba(96,255,128,0.1);
    }
    .claude-suggest .range {
      font-family: var(--mono);
      color: var(--success);
    }
    .claude-suggest .reason {
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 2px;
    }

    /* ─── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <!-- Empty state -->
  <div id="drop-zone">
    <h1>Sizzle</h1>
    <p>Drop a video here, or</p>
    <button class="pick" onclick="document.getElementById('file-input').click()">Choose video</button>
    <input type="file" id="file-input" accept="video/*" hidden>
  </div>

  <!-- Video stage -->
  <div id="stage">
    <video id="video" playsinline></video>
    <div id="stage-overlay">
      <span id="time-display">0.00 / 0.00</span>
    </div>
  </div>

  <!-- Sidebar: clips + export -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Clips</h2>
      <span id="total-duration">0.0s</span>
    </div>

    <div id="clips"></div>

    <div id="export-panel">
      <div class="preset-row" id="size-presets">
        <button data-w="480" class="active">480p</button>
        <button data-w="720">720p</button>
        <button data-w="1080">1080p</button>
        <button data-w="0">Source</button>
      </div>
      <div class="preset-row" id="quality-presets">
        <button data-crf="35">Small</button>
        <button data-crf="30" class="active">Balanced</button>
        <button data-crf="24">High</button>
      </div>
      <button id="export-btn" disabled>Export WebM</button>
      <div id="progress"><div id="progress-bar"></div></div>
      <div id="status">loading ffmpeg…</div>
    </div>
  </aside>

  <!-- Timeline -->
  <div id="timeline-panel">
    <div id="timeline-controls">
      <button id="play-btn" class="tl-btn">▶</button>

      <div class="time-inputs">
        <input type="text" id="in-time" placeholder="in" value="0.00">
        <span>→</span>
        <input type="text" id="out-time" placeholder="out" value="0.00">
      </div>

      <button id="set-in" class="tl-btn">Set In [I]</button>
      <button id="set-out" class="tl-btn">Set Out [O]</button>
      <button id="add-clip" class="tl-btn primary">Add Clip [Enter]</button>

      <div class="spacer"></div>

      <button id="claude-btn" class="tl-btn">✨ Ask Claude</button>
      <button id="reset-btn" class="tl-btn">New Video</button>
    </div>

    <div id="timeline">
      <div id="thumbstrip"></div>
      <div id="selection"></div>
      <div id="playhead"></div>
    </div>
  </div>

  <!-- Claude suggestions panel -->
  <div id="claude-panel">
    <h3>Claude suggestions</h3>
    <p class="hint">Claude samples frames across your video and suggests segments that look clean — no text overlays, logos, or title cards.</p>
    <input type="password" id="api-key" placeholder="sk-ant-…" autocomplete="off">
    <button id="analyze-btn" class="tl-btn primary">Analyze video</button>
    <div id="claude-results"></div>
  </div>

  <script src="vendor/ffmpeg.js"></script>
  <script src="vendor/ffmpeg-util.js"></script>
  <script src="sizzle.js"></script>
</body>
</html>
