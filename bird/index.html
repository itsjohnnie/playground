<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Voice-Controlled Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="startScreen" class="screen start-screen">
            <div class="game-logo">
                <div class="logo-bird">🐦</div>
                <h1 class="game-title">
                    <span class="title-voice">Voice</span>
                    <span class="title-flappy">Flappy Bird</span>
                </h1>
            </div>

            <div class="feature-list">
                <div class="feature-item">
                    <span class="feature-icon">🎤</span>
                    <span class="feature-text">Use your voice to fly</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📢</span>
                    <span class="feature-text">Louder = Higher</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🤫</span>
                    <span class="feature-text">Quiet = Fall</span>
                </div>
            </div>

            <button id="startBtn" class="btn btn-start">
                <span class="btn-icon">🎮</span>
                <span class="btn-text">Start Game</span>
            </button>

            <p class="tip">
                <span class="tip-icon">🔒</span>
                Microphone access required
            </p>
        </div>

        <div id="gameContainer" style="display: none;">
            <div id="calibrationMsg" class="calibration-message">
                Calibrating... Stay quiet for a moment!
            </div>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div class="volume-indicator">
                <div class="volume-label">Volume:</div>
                <div class="volume-bar">
                    <div id="volumeLevel" class="volume-level"></div>
                </div>
            </div>
            <div class="score-display">
                <div>Score: <span id="score">0</span></div>
                <div>High Score: <span id="highScore">0</span></div>
            </div>
        </div>

        <div id="gameOverScreen" class="screen game-over-screen" style="display: none;">
            <div class="game-over-content">
                <div class="game-over-emoji">😢</div>
                <h2 class="game-over-title">Game Over!</h2>

                <div class="score-box">
                    <div class="score-item">
                        <div class="score-label">Your Score</div>
                        <div class="score-value" id="finalScore">0</div>
                    </div>
                    <div class="score-divider"></div>
                    <div class="score-item">
                        <div class="score-label">High Score</div>
                        <div class="score-value score-high" id="finalHighScore">0</div>
                    </div>
                </div>

                <button id="restartBtn" class="btn btn-restart">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">Play Again</span>
                </button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
