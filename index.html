<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dithered Camera</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="overlay-ui">
        <div class="header">
            <h1>Dithered Camera</h1>
        </div>

        <div class="controls-container">
            <div class="controls">
                <div class="button-group">
                    <button id="startBtn" class="btn btn-primary">Start Camera</button>
                    <button id="captureBtn" class="btn btn-secondary" disabled>Capture Photo</button>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span class="label-text">Dither Algorithm</span>
                        <select id="ditherAlgorithm" class="select">
                            <option value="floyd-steinberg">Floyd-Steinberg</option>
                            <option value="atkinson">Atkinson</option>
                            <option value="ordered">Ordered (Bayer)</option>
                            <option value="random">Random Threshold</option>
                            <option value="simple">Simple Threshold</option>
                        </select>
                    </label>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span class="label-text">Threshold: <span id="thresholdValue" class="value">128</span></span>
                        <input type="range" id="threshold" min="0" max="255" value="128" class="slider">
                    </label>
                </div>

                <div id="error" class="error"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
