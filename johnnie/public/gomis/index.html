<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>gomis — un negatiu, una graella</title>
<meta name="description" content="Un negatiu, una graella. Retalls desplaçats del mateix fotograma i micro-copy sobre una graella amagada.">
<meta name="theme-color" content="#0c0b0a">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- the negative: two layers for crossfade -->
  <div class="bg" id="bg-a" aria-hidden="true"></div>
  <div class="bg" id="bg-b" aria-hidden="true"></div>
  <p class="sr-only">Una fotografia de mostra (picsum.photos) omple la pantalla; alguns retalls de la mateixa imatge es desplacen sobre una graella.</p>

  <!-- corner chrome -->
  <header class="chrome chrome--tl">
    <span class="chrome__strong">GOMIS&nbsp;·&nbsp;BARCELONA</span>
    <span class="chrome__dim">un negatiu — una graella</span>
  </header>

  <div class="chrome chrome--tr">
    <span class="chrome__dim">FULL&nbsp;<span id="layout-no">№ 001</span></span>
    <span class="chrome__dim">SEED&nbsp;<span id="seed" class="hi">——</span></span>
  </div>

  <div class="chrome chrome--bl">
    <span class="chrome__dim" id="neg-info">NEG — · —</span>
    <span class="chrome__dim">GRAELLA <span id="grid-spec">6 × 10</span> · <span id="frame-count">6</span> RETALLS</span>
  </div>

  <div class="chrome chrome--bc" aria-hidden="true">
    <span class="chrome__dim" id="cursor-readout">C·— R·—</span>
  </div>

  <div class="chrome chrome--br">
    <button id="grid-toggle" class="ctl" type="button" aria-pressed="false" aria-label="Mostra la graella (G)">
      <svg class="ctl__icon ctl__icon--eye" viewBox="0 0 14 14" aria-hidden="true">
        <path d="M1.2 7C2.6 4.4 4.7 3 7 3s4.4 1.4 5.8 4C11.4 9.6 9.3 11 7 11S2.6 9.6 1.2 7Z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
        <circle cx="7" cy="7" r="1.7" fill="none" stroke="currentColor" stroke-width="1.1"/>
        <line class="ctl__slash" x1="2.4" y1="12" x2="11.6" y2="2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </button>
    <button id="regen" class="ctl ctl--wide" type="button" aria-label="Regenera el full (R)">
      <svg class="ctl__icon" viewBox="0 0 12 12" aria-hidden="true">
        <path d="M6 1.5a4.5 4.5 0 1 0 4.5 4.5" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        <path d="M8.4 1.2 10.7 1.7 10.2 4" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="ctl__label">REGENERA</span>
    </button>
  </div>

  <!-- the sheet -->
  <main class="stage" id="stage">
    <div class="grid grid--lines" id="underlay" aria-hidden="true"></div>
    <div class="grid grid--live" id="grid"></div>
    <div class="crosshair" id="crosshair" aria-hidden="true">
      <span class="crosshair__v"></span>
      <span class="crosshair__h"></span>
    </div>
  </main>

  <!-- grain -->
  <svg class="grain" aria-hidden="true">
    <filter id="grain-f"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#grain-f)"/>
  </svg>

  <script src="app.js"></script>
</body>
</html>
