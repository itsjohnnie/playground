<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>gomis — one negative, one grid</title>
<meta name="description" content="One negative, one grid. Displaced clippings of a single photograph and micro-copy on a hidden grid.">
<meta name="theme-color" content="#0c0b0a">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- the negative: two layers for crossfade -->
  <div class="bg" id="bg-a" aria-hidden="true"></div>
  <div class="bg" id="bg-b" aria-hidden="true"></div>
  <p class="sr-only">A photograph fills the screen; a few clippings of the same image are displaced across a hidden grid. Each negative is credited in the bottom-left corner.</p>

  <!-- corner chrome -->
  <header class="chrome chrome--tl">
    <span class="chrome__strong">GOMIS&nbsp;·&nbsp;BARCELONA</span>
    <span class="chrome__dim">one negative — one grid</span>
  </header>

  <div class="chrome chrome--tr">
    <span class="chrome__dim">SHEET&nbsp;<span id="layout-no">№ 001</span></span>
    <span class="chrome__dim">SEED&nbsp;<span id="seed" class="hi">——</span></span>
  </div>

  <div class="chrome chrome--bl">
    <a class="chrome__dim credit" id="neg-credit" href="https://commons.wikimedia.org/" target="_blank" rel="noopener">NEG — · —</a>
    <span class="chrome__dim">GRID <span id="grid-spec">6 × 10</span> · <span id="frame-count">6</span> CLIPS · <span id="neg-lic">—</span></span>
  </div>

  <div class="chrome chrome--bc" aria-hidden="true">
    <span class="chrome__dim" id="cursor-readout">C·— R·—</span>
  </div>

  <div class="chrome chrome--br">
    <button id="settings" class="chip" type="button" aria-expanded="false" aria-controls="panel" aria-label="Settings">
      <svg class="chip__icon chip__icon--sliders" viewBox="0 0 14 14" aria-hidden="true">
        <line x1="1.5" y1="4" x2="12.5" y2="4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="1.5" y1="10" x2="12.5" y2="10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        <circle cx="9" cy="4" r="1.9" fill="currentColor" stroke="none"/>
        <circle cx="5" cy="10" r="1.9" fill="currentColor" stroke="none"/>
      </svg>
      <svg class="chip__icon chip__icon--x" viewBox="0 0 14 14" aria-hidden="true">
        <path d="M3.5 3.5 10.5 10.5 M10.5 3.5 3.5 10.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ajustos: blooms out of the chip -->
  <div class="panel" id="panel" role="dialog" aria-modal="true" aria-label="Settings" tabindex="-1">
    <header class="panel__head">
      <span class="panel__title">SETTINGS</span>
      <span class="panel__spin" id="panel-busy" aria-hidden="true">
        <svg viewBox="0 0 12 12"><path d="M6 1.5a4.5 4.5 0 1 0 4.5 4.5" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
      </span>
    </header>

    <div class="panel__body">
      <section class="panel__group">
        <h2 class="panel__label">VIEW</h2>
        <button class="tgl" type="button" role="switch" aria-checked="false" data-setting="grid">
          <span>GRID</span><span class="tgl__track" aria-hidden="true"></span>
        </button>
        <button class="tgl" type="button" role="switch" aria-checked="true" data-setting="marks">
          <span>REGISTRATION MARKS</span><span class="tgl__track" aria-hidden="true"></span>
        </button>
        <button class="tgl" type="button" role="switch" aria-checked="true" data-setting="grain">
          <span>GRAIN</span><span class="tgl__track" aria-hidden="true"></span>
        </button>
        <button class="tgl" type="button" role="switch" aria-checked="false" data-setting="dither">
          <span>DITHER</span><span class="tgl__track" aria-hidden="true"></span>
        </button>
        <button class="tgl" type="button" role="switch" aria-checked="false" data-setting="singleLine">
          <span>SINGLE LINE</span><span class="tgl__track" aria-hidden="true"></span>
        </button>
        <button class="tgl" type="button" role="switch" aria-checked="false" data-setting="color">
          <span>COLOR</span><span class="tgl__track" aria-hidden="true"></span>
        </button>
      </section>

      <section class="panel__group">
        <h2 class="panel__label">THE SHEET</h2>
        <button class="act" type="button" id="act-photo"><span>NEW PHOTO</span><em>same text</em></button>
        <button class="act" type="button" id="act-copy"><span>NEW TEXT</span><em>same photo</em></button>
        <button class="act" type="button" id="act-all"><span>SHUFFLE ALL</span><em>key R</em></button>
        <button class="act" type="button" id="act-export"><span>EXPORT PNG</span><em>current sheet</em></button>
      </section>
    </div>
    <div class="panel__fade" aria-hidden="true"></div>
  </div>

  <!-- the sheet -->
  <main class="stage" id="stage">
    <div class="grid grid--lines" id="underlay" aria-hidden="true"></div>
    <div class="grid grid--live" id="grid"></div>
    <div class="marks" id="marks" aria-hidden="true"></div>
    <div class="crosshair" id="crosshair" aria-hidden="true">
      <span class="crosshair__v"></span>
      <span class="crosshair__h"></span>
    </div>
  </main>

  <!-- grain -->
  <svg class="grain" aria-hidden="true">
    <filter id="grain-f"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#grain-f)"/>
  </svg>

  <script src="app.js"></script>
</body>
</html>
