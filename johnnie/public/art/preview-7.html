const dimAt = (l) => l >= LO && l < HI ? DIMR[Math.min(5, ((l - LO) * 6 / (HI - LO)) | 0)] : " ";

let fs = 8, cw = 4.8, chh = 9.1, DPR = Math.min(2, devicePixelRatio || 1);
function metrics() {
  fs = Math.min(innerWidth * 0.92 / (COLS * 0.6), innerHeight * 0.74 / (RT * 1.14));
  cw = fs * 0.6; chh = fs * 1.14;
  pre.style.fontSize = fs + "px";
  dim.style.width = (COLS * cw) + "px"; dim.style.height = (RT * chh) + "px";
  dim.width = Math.ceil(COLS * cw * DPR); dim.height = Math.ceil(RT * chh * DPR);
  const dc = Math.min(innerWidth * 0.92 / COLS, innerHeight * 0.8 / RD);
  dots.style.width = (COLS * dc) + "px"; dots.style.height = (RD * dc) + "px";
  dots.width = Math.ceil(COLS * dc * DPR); dots.height = Math.ceil(RD * dc * DPR);
  dots._cell = dc;
}

/* ---- text modes (A: umbral · B: dosluces) ---- */
let cur = [];
function setFaceText(f) {
  const G = f ? KT : MT;
  cur = G.map(r => r.map(chAt));
  pre.textContent = cur.map(r => r.join("")).join("\n");
}
const torch = new Float32Array(COLS * RT);
let torchLive = false, raf = 0;
function drawDim(now) {
  const G = face ? KT : MT;
  dg.setTransform(DPR, 0, 0, DPR, 0, 0);
  dg.clearRect(0, 0, COLS * cw, RT * chh);
  dg.font = "520 " + fs + "px 'Geist Mono',monospace";
  dg.textBaseline = "top";
  const base = mode === "b" ? 0.42 : 0;
  let any = false;
  for (let y = 0; y < RT; y++) for (let x = 0; x < COLS; x++) {
    const ch = dimAt(G[y][x]);
    if (ch === " ") continue;
    const t = torch[y * COLS + x];
    const a = Math.min(1, base + t * (mode === "b" ? 0.58 : 1));
    if (a < 0.02) continue;
    any = true;
    dg.globalAlpha = a;
    dg.fillStyle = "#f2f1ee";
    dg.fillText(ch, x * cw, y * chh);
  }
  dg.globalAlpha = 1;
  return any;
}
function torchLoop() {
  raf = 0;
  let alive = false;
  for (let i = 0; i < torch.length; i++) {
    if (torch[i] > 0.01) { torch[i] *= 0.90; alive = true; } else torch[i] = 0;
  }
  drawDim();
  if (alive) raf = requestAnimationFrame(torchLoop);
}
function splat(px, py) {
  const r = pre.getBoundingClientRect();
  const cx = (px - r.left) / cw, cy = (py - r.top) / chh;
  const R = 9;
  for (let y = Math.max(0, cy - R | 0); y < Math.min(RT, cy + R); y++)
    for (let x = Math.max(0, cx - R | 0); x < Math.min(COLS, cx + R); x++) {
      const d = Math.hypot((x - cx) * 0.62, y - cy) / (R * 0.62);
      if (d < 1) torch[y * COLS + x] = Math.max(torch[y * COLS + x], 1 - d * d);
    }
  if (!raf) raf = requestAnimationFrame(torchLoop);
}

/* ---- morph (text): radial split-flap ---- */
function morphText(px, py) {
  morphing = true;
  const to = face ? MT : KT; face = 1 - face;
  label();
  const r = pre.getBoundingClientRect();
  const cx = (px - r.left) / cw, cy = (py - r.top) / chh;
  const t0 = performance.now(), SPREAD = 1200, SPIN = 240;
  const target = to.map(row => row.map(chAt));
  if (RM) { cur = target; pre.textContent = cur.map(q => q.join("")).join("\n"); drawDim(); morphing = false; return; }
  (function tick(now) {
    const t = now - t0; let done = true;
    for (let y = 0; y < RT; y++) for (let x = 0; x < COLS; x++) {
      const tgt = target[y][x];
      if (cur[y][x] === tgt && t > SPREAD) continue;
      const d = Math.hypot((x - cx) * 0.62, y - cy);
      const start = (d / Math.hypot(COLS * 0.62, RT)) * SPREAD;
      if (t < start) { done = false; continue; }
      if (t < start + SPIN) {
        done = false;
        if (cur[y][x] !== " " || tgt !== " ")
          cur[y][x] = GLYPHS[(Math.random() * GLYPHS.length) | 0];
      } else cur[y][x] = tgt;
    }
    pre.textContent = cur.map(q => q.join("")).join("\n");
    if (!done) requestAnimationFrame(tick);
    else { morphing = false; drawDim(); }
  })(t0);
}

/* ---- mode C: the dots (trama) ---- */
let dotCur = null, dotAnim = 0;
const dval = (l) => { const v = l / 35; return v < 0.30 ? 0 : Math.pow((v - 0.30) / 0.70, 1.05); };
function drawDots(boost) {
  const cell = dots._cell;
  og.setTransform(DPR, 0, 0, DPR, 0, 0);
  og.clearRect(0, 0, COLS * cell, RD * cell);
  const RMAX = cell * 0.62;
  for (let y = 0; y < RD; y++) for (let x = 0; x < COLS; x++) {
    let v = dotCur[y * COLS + x];
    if (boost) v = Math.min(1, v + boost[y * COLS + x] * 0.25);
    if (v <= 0.004) continue;
    og.fillStyle = v > 0.72 ? "#f2f1ee" : "rgba(242,241,238,.75)";
    og.beginPath();
    og.arc(x * cell + cell / 2, y * cell + cell / 2, v * RMAX, 0, 6.2832);
    og.fill();
  }
}
const dotTorch = new Float32Array(COLS * RD);
let dotRaf = 0;
function dotLoop() {
  dotRaf = 0; let alive = false;
  for (let i = 0; i < dotTorch.length; i++) {
    if (dotTorch[i] > 0.01) { dotTorch[i] *= 0.9; alive = true; } else dotTorch[i] = 0;
  }
  drawDots(dotTorch);
  if (alive) dotRaf = requestAnimationFrame(dotLoop);
}
function setFaceDots(f) {
  const G = f ? KD : MD;
  dotCur = new Float32Array(COLS * RD);
  for (let y = 0; y < RD; y++) for (let x = 0; x < COLS; x++) dotCur[y * COLS + x] = dval(G[y][x]);
  drawDots();
}
function morphDots(px, py) {
  morphing = true;
  const to = face ? MD : KD; face = 1 - face;
  label();
  const target = new Float32Array(COLS * RD);
  for (let y = 0; y < RD; y++) for (let x = 0; x < COLS; x++) target[y * COLS + x] = dval(to[y][x]);
  if (RM) { dotCur = target; drawDots(); morphing = false; return; }
  const from = Float32Array.from(dotCur);
  const r = dots.getBoundingClientRect();
  const cell = dots._cell;
  const cx = (px - r.left) / cell, cy = (py - r.top) / cell;
  const t0 = performance.now(), WAVE = 700, TWEEN = 420;
  const maxd = Math.hypot(COLS, RD);
  (function tick(now) {
    const t = now - t0; let done = true;
    for (let y = 0; y < RD; y++) for (let x = 0; x < COLS; x++) {
      const i = y * COLS + x;
      const start = (Math.hypot(x - cx, y - cy) / maxd) * WAVE;
      let u = (t - start) / TWEEN;
      if (u < 1) done = false;
      u = Math.max(0, Math.min(1, u));
      u = u < 0.5 ? 2 * u * u : 1 - Math.pow(-2 * u + 2, 2) / 2;
      dotCur[i] = from[i] + (target[i] - from[i]) * u;
    }
    drawDots();
    if (!done) requestAnimationFrame(tick);
    else morphing = false;
  })(t0);
}
function splatDots(px, py) {
  const r = dots.getBoundingClientRect(), cell = dots._cell;
  const cx = (px - r.left) / cell, cy = (py - r.top) / cell;
  const R = 8;
  for (let y = Math.max(0, cy - R | 0); y < Math.min(RD, cy + R); y++)
    for (let x = Math.max(0, cx - R | 0); x < Math.min(COLS, cx + R); x++) {
      const d = Math.hypot(x - cx, y - cy) / R;
      if (d < 1) dotTorch[y * COLS + x] = Math.max(dotTorch[y * COLS + x], 1 - d * d);
    }
  if (!dotRaf) dotRaf = requestAnimationFrame(dotLoop);
}

/* ---- modes & input ---- */
function label() {
  who.textContent = (face ? "KANE" : "MESSI") + " · " +
    (mode === "a" ? "UMBRAL" : mode === "b" ? "DOSLUCES" : "TRAMA") + " · TAP / DRAG";
}
function setMode(m) {
  mode = m;
  for (const id of ["ma", "mb", "mc"])
    document.getElementById(id).classList.toggle("on", id === "m" + m);
  const text = m !== "c";
  pre.style.display = text ? "" : "none";
  dim.style.display = text ? "" : "none";
  dots.style.display = text ? "none" : "block";
  if (text) { setFaceText(face); drawDim(); }
  else setFaceDots(face);
  label();
}
for (const m of ["a", "b", "c"])
  document.getElementById("m" + m).addEventListener("click", (e) => { e.preventDefault(); setMode(m); });

let pid = -1, x0 = 0, y0 = 0, t1 = 0, moved = 0;
stage.addEventListener("pointerdown", (e) => {
  if (pid >= 0) return;
  pid = e.pointerId; x0 = e.clientX; y0 = e.clientY;
  t1 = performance.now(); moved = 0;
  stage.setPointerCapture(pid);
});
stage.addEventListener("pointermove", (e) => {
  if (e.pointerId !== pid) return;
  moved = Math.max(moved, Math.hypot(e.clientX - x0, e.clientY - y0));
  if (moved >= 8 && !morphing) {
    // a drag is a torch stroke, not a selection — the text stays
    // selectable at rest (double-tap, long-press, select-all)
    if (!document.body.classList.contains("nosel")) {
      document.body.classList.add("nosel");
      getSelection().removeAllRanges();
    }
    (mode === "c" ? splatDots : splat)(e.clientX, e.clientY);
  }
});
const up = (e) => {
  if (e.pointerId !== pid) return;
  pid = -1;
  document.body.classList.remove("nosel");
  if (e.type === "pointerup" && moved < 8 && performance.now() - t1 < 350 && !morphing)
    (mode === "c" ? morphDots : morphText)(e.clientX, e.clientY);
};
stage.addEventListener("pointerup", up);
stage.addEventListener("pointercancel", up);

addEventListener("resize", () => { metrics(); setMode(mode); });
document.fonts.load("520 12px 'Geist Mono'").then(() => {
  metrics(); setMode("a");
});
</script>
