<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script type="importmap">{ "imports": { "three": "../lib/three.module.min.js" } }</script>
<script type="module">
// 008 — b · 64.478 — every person who was in the stadium, one point each.
// 64,478 points in 120 rows (one per minute); each soul leans toward the
// team holding that minute. Goals send shockwaves through the crowd.
// three.js · gpu points · custom shaders.

import * as THREE from "three";

const seed = ART.seed("2026-07-06-008b");
const R = ART.rng(seed);
const M = window.M8;

const ROWS = 120;
const COLS = Math.ceil(M.attendance / ROWS);   // 538 → 64,560 ≈ every soul
const COUNT = ROWS * COLS;

let renderer, scene, camera, mat, camZ = 3.9;
const F = FRAME.mount({
  n: "008", v: "b", title: "64.478", date: "06·07·2026",
  data: M.frameData, tech: "three.js · gpu points",
  dark: true,
  onResize(w, h, dpr) {
    if (!renderer) build();
    renderer.setPixelRatio(dpr);
    renderer.setSize(w / dpr, h / dpr, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    // narrower stages (full-bleed phones) pull the camera back so the
    // whole crowd stays in frame
    camZ = Math.max(3.9, 2.55 / camera.aspect);
  },
});

// minute → argentina share (possession blended with per-phase xG)
function flow(min) {
  const pts = [[22.5, 0], [67.5, 1], [105, 2]].map(([m, i]) => ({
    m, f: 0.64 * 0.68 + (M.xgPhase.arg[i] / (M.xgPhase.arg[i] + M.xgPhase.cpv[i])) * 0.32,
  }));
  if (min <= pts[0].m) return pts[0].f;
  if (min >= pts[2].m) return pts[2].f;
  const i = min < pts[1].m ? 0 : 1;
  const t = (min - pts[i].m) / (pts[i + 1].m - pts[i].m);
  return pts[i].f + (pts[i + 1].f - pts[i].f) * (t * t * (3 - 2 * t));
}

function build() {
  renderer = new THREE.WebGLRenderer({ canvas: F.canvas, antialias: false });
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0a0a0c, 2.2, 5.2);
  camera = new THREE.PerspectiveCamera(38, 3 / 4, 0.1, 10);

  const pos = new Float32Array(COUNT * 3);
  const attr = new Float32Array(COUNT * 3); // x: side (0 arg / 1 cpv), y: jitter, z: minute
  const SPREAD_X = 1.55, SPREAD_Y = 2.3;
  let k = 0;
  for (let r = 0; r < ROWS; r++) {
    const min = r + 0.5;
    const share = flow(min);
    for (let c = 0; c < COLS; c++, k++) {
      const u = (c + 0.5) / COLS;                    // 0..1 across the row
      const side = u < share ? 0 : 1;
      pos[k * 3]     = (u - 0.5) * SPREAD_X + (R() - 0.5) * 0.010;
      pos[k * 3 + 1] = (0.5 - r / ROWS) * SPREAD_Y + (R() - 0.5) * 0.012;
      pos[k * 3 + 2] = (R() - 0.5) * 0.05;
      attr[k * 3]     = side;
      attr[k * 3 + 1] = R();
      attr[k * 3 + 2] = min;
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("aInfo", new THREE.BufferAttribute(attr, 3));

  mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uClock: { value: 0 },     // replay minute 0..120
      uDpr: { value: F.DPR },
      // goal minutes + direction (+1 arg scored, -1 cpv scored)
      uGoals: { value: M.goals.map((g) => new THREE.Vector2(g.min, g.team === "arg" ? 1 : -1)) },
    },
    vertexShader: `
      attribute vec3 aInfo;
      uniform float uTime, uClock, uDpr;
      uniform vec2 uGoals[5];
      varying float vSide, vGlow, vBorn;
      void main(){
        vSide = aInfo.x;
        float jit = aInfo.y, minute = aInfo.z;
        vBorn = step(minute, uClock);              // crowd fills in as replayed
        vec3 p = position;
        // breathing — the crowd is alive
        p.x += 0.012 * sin(uTime*0.6 + jit*6.2832 + p.y*2.0);
        p.z += 0.030 * sin(uTime*0.4 + jit*12.5 + p.x*3.0);
        // goal shockwaves ripple outward through minutes
        float glow = 0.0;
        for (int i = 0; i < 5; i++) {
          float gm = uGoals[i].x;
          float since = uClock - gm;
          if (since > 0.0) {
            float d = abs(minute - gm);
            float ring = since * 3.2;              // minutes per replay-beat
            float band = exp(-pow((d - ring) * 0.55, 2.0));
            float decay = exp(-since * 0.10);
            p.z += band * decay * 0.22;
            glow += band * decay;
          }
        }
        vGlow = min(glow, 1.2);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = (1.1 + jit * 0.9 + vGlow * 1.6) * uDpr * (2.6 / -mv.z);
      }`,
    fragmentShader: `
      precision highp float;
      varying float vSide, vGlow, vBorn;
      void main(){
        if (vBorn < 0.5) discard;
        vec2 q = gl_PointCoord - 0.5;
        float a = smoothstep(0.5, 0.12, length(q));
        vec3 celeste = vec3(0.42, 0.67, 0.84);
        vec3 rojo    = vec3(0.84, 0.30, 0.24);
        vec3 col = mix(celeste, rojo, vSide);
        col += vGlow * vec3(0.9, 0.85, 0.7) * 0.8;
        gl_FragColor = vec4(col, a * (0.5 + vGlow * 0.5));
      }`,
  });
  scene.add(new THREE.Points(geo, mat));
}

let raf;
function loop(tms) {
  const t = tms / 1000;
  const cycle = t % 34;
  const clock = Math.min(120, (cycle / 26) * 120);
  mat.uniforms.uTime.value = t;
  mat.uniforms.uClock.value = clock;
  mat.uniforms.uDpr.value = F.DPR;
  // slow drift — never a still frame
  camera.position.set(Math.sin(t * 0.05) * 0.22, Math.cos(t * 0.04) * 0.14, camZ);
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
  raf = requestAnimationFrame(loop);
}
queueMicrotask(() => { if (!renderer) build(); raf || requestAnimationFrame(loop); });
</script>
