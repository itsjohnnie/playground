<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — f · tapiz — the match hand-knotted as a pampa tapestry.
// Every knot is placed: guarda-pampa diamond bands sit at the five goal
// minutes (celeste chains for argentina, rojo for cabo verde, the own
// goal an outlined hollow chain), single gold weft rows at the two
// yellow cards, a stepped ball medallion resting mid-field, and the
// field speckle splits 64/36 like the possession. Heathered yarn,
// abrash rows, selvedge, fringe. It weaves itself bottom-up on a bare
// warp, then hangs still.

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

// wool palette
vec3 pal(float i){
  if (i < 0.5) return vec3(0.898, 0.862, 0.768);   // 0 cream
  if (i < 1.5) return vec3(0.478, 0.671, 0.800);   // 1 celeste
  if (i < 2.5) return vec3(0.173, 0.278, 0.396);   // 2 indigo
  if (i < 3.5) return vec3(0.741, 0.333, 0.243);   // 3 rojo
  if (i < 4.5) return vec3(0.416, 0.169, 0.133);   // 4 wine
  if (i < 5.5) return vec3(0.833, 0.647, 0.204);   // 5 gold
  return vec3(0.180, 0.145, 0.114);                // 6 charcoal
}

const float KC = 64.0;    // knots across the rug
const float KR = 86.0;    // knot rows

// pile height per wool — gold weft lies flat, colour wools stand tall
float heightOf(float i){
  if (i < 0.5) return 0.52;      // cream
  if (i < 4.5) return 0.60;      // colour wools
  if (i < 5.5) return 0.34;      // gold weft
  return 0.44;                   // charcoal
}

// ---- the pattern: knot (cx, rowFromTop) → palette index ----
float diamondBand(float cx, float rLoc, float inner, float bg, float outline, float hollow){
  // guarda pampa: a chain of stepped diamonds, band is 7 rows tall
  float dx = abs(mod(cx, 8.0) - 4.0);
  float dr = abs(rLoc - 3.0);
  float d = dx + dr;
  if (d <= 2.0) return hollow > 0.5 ? bg : inner;
  if (d <= 3.0) return outline;
  return bg;
}

float pattern(float cx, float rt){
  // 0..1 edge binding · 2..6 zigzag guard · 7..8 cream — mirrored at bottom
  float rb = (KR - 1.0) - rt;                    // rows from bottom
  float edge = min(rt, rb);
  if (edge < 2.0) return 6.0;
  if (edge < 7.0){                               // zigzag guard, diagonal weave
    float r = edge - 2.0;
    return mod(cx + r, 6.0) < 3.0 ? 1.0 : 2.0;
  }
  if (edge < 9.0) return 0.0;

  // field rows map the 120 minutes, top to bottom
  float f0 = 9.0, f1 = KR - 10.0;
  float minute = (rt - f0) / (f1 - f0) * 120.0;

  // gold card rows — 69' and 115'
  if (abs(minute - 69.0) < 0.9 || abs(minute - 115.0) < 0.9) return 5.0;

  // five goal bands (7 rows tall) — guarda pampa chains
  for (int i = 0; i < 5; i++){
    float gm  = i==0 ? 29.0 : i==1 ? 59.0 : i==2 ? 92.0 : i==3 ? 103.0 : 111.0;
    float arg = (i==0 || i==2 || i==4) ? 1.0 : 0.0;
    float og  = i==4 ? 1.0 : 0.0;
    float gr = f0 + gm / 120.0 * (f1 - f0);      // band centre row
    float rLoc = rt - gr + 3.0;
    if (rLoc >= 0.0 && rLoc < 7.0){
      if (arg > 0.5) return diamondBand(cx, rLoc, 1.0, 2.0, 0.0, og);
      return diamondBand(cx, rLoc, 3.0, 4.0, 0.0, og);
    }
  }

  // the sol de mayo — the flag's sun, woven in gold between the
  // 29' and 59' bands
  {
    float bx = KC * 0.5 - 0.5;
    float br = f0 + 46.5 / 120.0 * (f1 - f0);
    vec2 d2 = vec2(cx - bx, (rt - br) * 1.15);   // knots are a touch tall
    float d = length(d2);
    if (d < 8.2){
      if (d < 3.4) return 5.0;                   // gold face
      float ang = atan(d2.y, d2.x);
      float spoke = abs(mod(ang + 0.2618, 0.5236) - 0.2618);
      if (d < 4.2) return spoke < 0.13 ? 5.0 : 6.0;  // charcoal collar
      if (spoke < 0.11 && d < 7.6) return 5.0;   // twelve rays
      return 0.0;                                // clean cream ground
    }
  }

  // field: cream with a possession speckle — 64% celeste, 36% rojo
  float h = hash(vec2(cx * 3.7, rt * 1.9));
  if (h < 0.075)
    return hash(vec2(cx * 1.3, rt * 7.7)) < 0.64 ? 1.0 : 3.0;
  return 0.0;
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  // width-anchored design space: x∈[0,0.75], y extends on taller screens
  vec2 q = vec2(p.x * 0.75, (p.y - 0.5) * 0.75 / max(aspect, 0.001) + 0.5);

  // the wall
  vec3 col = mix(vec3(0.902, 0.878, 0.824), vec3(0.869, 0.838, 0.774), pow(1.0 - p.y, 1.4));

  // the cloth is hung, not printed — it waves gently
  float wave = sin(q.y * 13.0 + 2.1) + 0.6 * sin(q.y * 29.0 + 0.7);
  q.x += 0.004 * wave;

  // rug box in design space
  float X0 = 0.055, X1 = 0.695, Y0 = 0.075, Y1 = 0.925;
  float k = (X1 - X0) / KC;                       // knot size
  float weave = ease(u_p * 10.0 / 9.3);           // woven rows, bottom → up
  float fell = mix(Y0, Y1, weave);                // the loom's working edge

  // soft shadow the rug throws on the wall
  {
    vec2 sq = q - vec2(0.012, -0.016);
    float inx = smoothstep(X0-0.02, X0+0.02, sq.x) * smoothstep(X1+0.02, X1-0.02, sq.x);
    float iny = smoothstep(Y0-0.02, Y0+0.02, sq.y) * smoothstep(min(fell, Y1)+0.02, min(fell, Y1)-0.02, sq.y);
    col *= 1.0 - 0.16 * inx * iny;
  }

  // hanging edges wobble a little — cloth, not paper — and the top
  // edge sags gently between the loops that hold it to the rod
  float edgeWob = (vnoise(vec2(q.y * 9.0, 3.7)) - 0.5) * k * 0.8;
  float sag = 0.0035 * (0.5 - 0.5 * cos((q.x - X0) / (k * 8.0) * 6.2832));
  float Y1e = Y1 - sag;
  float inRugX = step(X0 + edgeWob, q.x) * step(q.x, X1 + edgeWob * 0.7);
  float inRugY = step(Y0, q.y) * step(q.y, Y1e);

  // the rod it hangs from
  {
    float ry = Y1 + 0.022;
    float inRod = smoothstep(X0 - 0.034, X0 - 0.028, q.x) * smoothstep(X1 + 0.034, X1 + 0.028, q.x)
                * smoothstep(0.013, 0.010, abs(q.y - ry));
    float sheen = 1.0 - abs(q.y - ry) / 0.013;
    vec3 wood = vec3(0.302, 0.231, 0.157) * (0.75 + 0.5 * sheen * sheen);
    col = mix(col, wood, inRod);
  }

  // fringe: warp strands escaping top and bottom
  float fringe = 0.0;
  {
    float fl = 4.0 * k;
    float strand = mod(q.x - X0, k * 0.667);
    float sHash = hash(vec2(floor((q.x - X0) / (k * 0.667)), 5.5));
    float wobble = sin(q.y * 90.0 + sHash * 6.28) * k * 0.22;
    float on = step(abs(strand - k * 0.333 + wobble), k * 0.14);
    float below = step(Y0 - fl * (0.6 + sHash * 0.5), q.y) * step(q.y, Y0);
    float above = step(Y1e, q.y) * step(q.y, Y1 + fl * (0.4 + sHash * 0.45)) * weave;
    fringe = on * max(below, above) * step(X0, q.x) * step(q.x, X1);
  }
  if (fringe > 0.5 && inRugY < 0.5){
    col = mix(col, pal(0.0) * (0.82 + 0.3 * hash(q * 40.0)), 0.9);
  }

  if (inRugX > 0.5 && inRugY > 0.5){
    // knot coordinates; alternate rows sit half a knot over, like bricks
    float rowY = (Y1e - q.y) / k;
    float rt = floor(rowY);
    float brick = mod(rt, 2.0) * 0.5;
    // weft wobble: each row wanders a hair
    float wj = (hash(vec2(rt, 8.1)) - 0.5) * 0.3;
    float colX = (q.x - X0) / k + brick + wj;
    float cx = floor(colX);

    if (q.y <= fell){
      // ---- woven ----
      float idx = pattern(cx, rt);
      // selvedge: the outermost knot column is bound in dark wool
      if (cx <= 0.0 || cx >= KC - 1.0) idx = mod(rt, 4.0) < 2.0 ? 6.0 : 4.0;
      vec3 wool = pal(idx);

      // heather: every knot is its own dye lot
      wool *= 0.92 + 0.16 * hash(vec2(cx * 7.1, rt * 3.3));
      // abrash: whole rows drift, like hand-dyed batches
      wool *= 0.96 + 0.08 * vnoise(vec2(rt * 0.23, 2.2));

      // carved relief: motifs stand proud of the field and catch the
      // light on their upper-left, shadow on their lower-right
      float h0 = heightOf(idx);
      float hL = heightOf(pattern(cx - 1.0, rt));
      float hU = heightOf(pattern(cx, rt + 1.0));
      float relief = 1.0 + (h0 - hL) * 1.7 + (h0 - hU) * 2.3;
      wool *= clamp(relief, 0.70, 1.30);

      // the knot itself: a little dome of pile with seams between,
      // split into two twisted lobes like real yarn
      vec2 cell = vec2(fract(colX), fract(rowY));
      float dome = (1.0 - pow(abs(cell.x - 0.5) * 2.0, 2.2))
                 * (1.0 - pow(abs(cell.y - 0.5) * 2.0, 1.6));
      float lobe = 1.0 - abs(fract(cell.x * 2.0) - 0.5) * 2.0;
      wool *= (0.74 + 0.34 * dome) * (0.93 + 0.10 * lobe * dome);
      // ply: two close dye lots twisted together
      wool *= 0.97 + 0.06 * sin((cell.x + rt * 0.37) * 9.42);
      // fibre flecks
      wool += (hash(gl_FragCoord.xy * 0.9) - 0.5) * 0.055;
      // pile sheen: light falls from above, folds catch and lose it
      wool *= 0.965 + 0.07 * (1.0 - p.y);
      wool *= 1.0 + 0.055 * wave;

      // the working row glows faintly while the loom is alive
      if (weave < 1.0 && abs(q.y - fell) < k * 1.2) wool *= 1.10;

      col = wool;
    } else {
      // ---- not yet woven: the bare warp ----
      float warp = step(abs(fract(colX) - 0.5), 0.16);
      vec3 thread = pal(0.0) * (0.86 + 0.2 * hash(vec2(cx, 1.1)));
      col = mix(col, thread, warp * 0.55);
    }
  }

  // room grain + gentle vignette
  col += (hash(gl_FragCoord.xy * 0.71) - 0.5) * 0.02;
  float vig = smoothstep(1.35, 0.5, length(p - vec2(0.5, 0.5)));
  col *= mix(0.93, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008f");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  n: "008", v: "f", title: "tapiz", date: "06·07·2026",
  data: M.frameData, tech: "glsl · tapestry",
  dark: false,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// woven once (10s), then it hangs still — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
