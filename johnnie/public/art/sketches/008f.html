<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — f · tapiz — the match woven as a pampa wall tapestry.
// Weft-faced wool on a cotton warp: 160 warps, 288 beaten rows. The
// cartoon is the timeline — guarda-pampa diamond bands at the five goal
// minutes (celeste chains for argentina, rojo for cabo verde, the own
// goal a hollow chain), single gold picks at the two yellow cards, a
// sol de mayo at the restart, and the field speckle split 64/36 like
// the possession. Matte fibre, abrash, kilim slit shadows, wandering
// rows, a knotted warp fringe. It weaves itself bottom-up on a bare
// warp, then hangs still.

const float PI = 3.14159265;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

// wool palette — softened, matte
vec3 pal(float i){
  if (i < 0.5) return vec3(0.906, 0.874, 0.796);   // 0 cream
  if (i < 1.5) return vec3(0.494, 0.655, 0.769);   // 1 celeste
  if (i < 2.5) return vec3(0.204, 0.290, 0.384);   // 2 indigo
  if (i < 3.5) return vec3(0.702, 0.352, 0.278);   // 3 rojo
  if (i < 4.5) return vec3(0.412, 0.200, 0.165);   // 4 wine
  if (i < 5.5) return vec3(0.804, 0.633, 0.263);   // 5 gold
  return vec3(0.216, 0.184, 0.153);                // 6 charcoal
}

const float PC   = 80.0;    // pattern columns — the cartoon's grid
const float PR   = 96.0;    // pattern rows
const float WARP = 160.0;   // warp threads, two per pattern column
const float ROWS = 288.0;   // weft rows, three per pattern row

// ---- the cartoon: pattern cell (cx, rowFromTop) → wool index ----
float diamondBand(float cx, float rLoc, float inner, float bg, float outline, float hollow){
  // guarda pampa: a chain of stepped diamonds, the band 7 pattern rows tall
  float dx = abs(mod(cx, 10.0) - 5.0);
  float dr = abs(rLoc - 3.5) * 1.45;
  float d = dx + dr;
  if (d <= 2.6) return hollow > 0.5 ? bg : inner;
  if (d <= 3.9) return outline;
  return bg;
}

float pattern(float cx, float rt){
  // 0..1 dark binding · 2..7 zigzag guard · 8..9 cream — mirrored below
  float rb = (PR - 1.0) - rt;
  float edge = min(rt, rb);
  if (edge < 2.0) return 6.0;
  if (edge < 8.0){
    float r = edge - 2.0;
    return mod(cx + r, 7.0) < 3.5 ? 1.0 : 2.0;
  }
  if (edge < 10.0) return 0.0;

  // field rows map the 120 minutes, top to bottom
  float f0 = 10.0, f1 = PR - 11.0;
  float minute = (rt - f0) / (f1 - f0) * 120.0;

  // gold picks — the cards at 69' and 115'
  if (abs(minute - 69.0) < 0.8 || abs(minute - 115.0) < 0.8) return 5.0;

  // five goal bands — guarda pampa chains, each dyed for its scorer
  for (int i = 0; i < 5; i++){
    float gm  = i==0 ? 29.0 : i==1 ? 59.0 : i==2 ? 92.0 : i==3 ? 103.0 : 111.0;
    float arg = (i==0 || i==2 || i==4) ? 1.0 : 0.0;
    float og  = i==4 ? 1.0 : 0.0;
    float gr = f0 + gm / 120.0 * (f1 - f0);
    float rLoc = rt - gr + 3.5;
    if (rLoc >= 0.0 && rLoc < 7.0){
      float ph = floor(hash(vec2(gm, 61.0)) * 10.0);   // each band starts where the weaver started
      if (arg > 0.5) return diamondBand(cx + ph, rLoc, 1.0, 2.0, 0.0, og);
      return diamondBand(cx + ph, rLoc, 3.0, 4.0, 0.0, og);
    }
  }

  // the sol de mayo, woven in gold between the 29' and 59' bands
  {
    float bx = PC * 0.5 - 0.5;
    float br = f0 + 46.5 / 120.0 * (f1 - f0);
    vec2 d2 = vec2(cx - bx, rt - br);
    float d = length(d2);
    if (d < 10.4){
      if (d < 4.2) return 5.0;                    // gold face
      float ang = atan(d2.y, d2.x);
      float spoke = abs(mod(ang + 0.2618, 0.5236) - 0.2618);
      if (d < 5.2) return spoke < 0.14 ? 5.0 : 6.0;   // charcoal collar
      float ray = floor((ang + PI) / 0.5236);
      float rayLen = 8.4 + 1.8 * hash(vec2(ray, 77.0));   // no two rays alike
      if (spoke < 0.11 && d < rayLen) return 5.0;
      return 0.0;                                 // clean cream ground
    }
  }

  // field: cream with a possession speckle — 64% celeste, 36% rojo
  float h = hash(vec2(cx * 3.7, rt * 1.9));
  if (h < 0.075)
    return hash(vec2(cx * 1.3, rt * 7.7)) < 0.64 ? 1.0 : 3.0;
  return 0.0;
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  // width-anchored design space: x∈[0,0.75], y extends on taller screens
  vec2 q = vec2(p.x * 0.75, (p.y - 0.5) * 0.75 / max(aspect, 0.001) + 0.5);

  // a hung textile is never perfectly square to the room
  float tl = 0.006;
  q = vec2(0.375, 0.5) + mat2(cos(tl), -sin(tl), sin(tl), cos(tl)) * (q - vec2(0.375, 0.5));

  // plaster wall, lit from above
  vec3 col = mix(vec3(0.906, 0.884, 0.838), vec3(0.856, 0.828, 0.774), pow(clamp(1.0 - q.y, 0.0, 1.5), 1.35));
  col *= 0.975 + 0.05 * vnoise(q * 13.0);

  // geometry
  float X0 = 0.055, X1 = 0.695;
  float rodY = 0.947, rodR = 0.0105;
  float Y1 = 0.905, Y0 = 0.150;
  float wp = (X1 - X0) / WARP;                    // warp pitch
  float wh = (Y1 - Y0) / ROWS;                    // weft row height

  float weave = ease(min(u_p * 1.08, 1.0));
  float fell = mix(Y0, Y1, weave);                // the loom's working edge

  // weft tension pulls the sides in a little at mid-height,
  // and the top edge sags a hair between warp groups
  float bow = 0.0045 * sin(clamp((q.y - Y0) / (Y1 - Y0), 0.0, 1.0) * PI);
  float sag = 0.0018 * (0.5 - 0.5 * cos((q.x - X0) / (wp * 16.0) * 2.0 * PI));
  float Y1e = Y1 - sag;

  // soft shadow the cloth throws on the wall
  {
    vec2 sq = q - vec2(0.011, -0.013);
    float inx = smoothstep(X0 - 0.022, X0 + 0.014, sq.x) * smoothstep(X1 + 0.022, X1 - 0.014, sq.x);
    float iny = smoothstep(Y0 - 0.030, Y0 + 0.010, sq.y) * smoothstep(min(fell, Y1) + 0.022, min(fell, Y1) - 0.014, sq.y);
    col *= 1.0 - 0.15 * inx * iny;
  }

  // the rod it hangs from
  {
    float over = 0.038;
    float dx0 = X0 - over, dx1 = X1 + over;
    float dy = (q.y - rodY) / rodR;
    float inRod = smoothstep(1.0, 0.84, abs(dy))
                * smoothstep(dx0 - 0.002, dx0 + 0.002, q.x)
                * smoothstep(dx1 + 0.002, dx1 - 0.002, q.x);
    float cyl = sqrt(max(0.0, 1.0 - dy * dy));
    float grain = vnoise(vec2(q.x * 260.0, q.y * 36.0));
    vec3 wood = vec3(0.318, 0.243, 0.168) * (0.52 + 0.62 * pow(cyl, 1.4)) * (0.90 + 0.18 * grain);
    wood *= 1.0 - 0.30 * (smoothstep(dx0 + 0.012, dx0 + 0.004, q.x) + smoothstep(dx1 - 0.012, dx1 - 0.004, q.x));
    col = mix(col, wood, inRod);
    // its slim shadow on the wall
    float sx = (q.y - (rodY - 0.021)) / 0.009;
    col *= 1.0 - 0.08 * exp(-sx * sx)
               * smoothstep(dx0, dx0 + 0.01, q.x) * smoothstep(dx1, dx1 - 0.01, q.x);
  }

  // bare warp: from the working edge up and over the rod
  if (q.x > X0 && q.x < X1 && q.y > fell - 0.001 && q.y < rodY + rodR * 0.55){
    float xw0 = (q.x - X0) / wp;
    float wi = floor(xw0);
    float wavy = sin(q.y * 46.0 + hash(vec2(wi, 1.1)) * 6.283) * 0.10;
    float fx = fract(xw0) - 0.5 + wavy;
    float thr = smoothstep(0.30, 0.10, abs(fx));
    vec3 tc = pal(0.0) * (0.60 + 0.52 * smoothstep(0.30, 0.0, abs(fx))) * (0.86 + 0.20 * hash(vec2(wi, 9.2)));
    col = mix(col, tc, thr * 0.9);
  }

  // below the cloth: the warp ends bound off in a knot row, then fringe
  if (q.y < Y0 + 0.002 && q.x > X0 - 0.008 && q.x < X1 + 0.008){
    float kb = Y0 - 0.010;
    if (q.y > kb){
      // overhand knots, four warps to a group
      float g = (q.x - X0) / (wp * 4.0);
      float gf = fract(g) - 0.5;
      float bv = (q.y - kb) / 0.010 - 0.5;
      float rr = gf * gf * 3.2 + bv * bv * 3.6;
      float on = smoothstep(0.9, 0.5, rr) * step(0.0, g) * step(g, 40.0);
      vec3 kc = pal(0.0) * (0.54 + 0.50 * (1.0 - rr)) * (0.90 + 0.16 * hash(vec2(floor(g), 3.3)));
      col = mix(col, kc, on);
    } else {
      // each group falls as one twisted strand — no two hang alike
      float sp = wp * 4.0;
      float sxw = (q.x - X0) / sp;
      float best = 0.0; vec3 bc = col;
      for (int k = -1; k <= 1; k++){
        float s = floor(sxw) + float(k);
        if (s < 0.0 || s > 39.5) continue;
        float len = 0.050 + 0.032 * hash(vec2(s, 2.2));
        float d = (kb - q.y) / len;
        if (d < 0.0 || d > 1.0) continue;
        float c1 = (hash(vec2(s, 3.3)) - 0.5) * 1.5;
        float c2 = (hash(vec2(s, 4.4)) - 0.5) * 2.6;
        float ctr = s + 0.5 + c1 * d + c2 * d * d;
        float dx = sxw - ctr;
        float halfw = 0.30 * (1.0 - 0.62 * d * d);
        float prof = smoothstep(halfw, halfw * 0.15, abs(dx));
        if (prof > best){
          best = prof;
          float ndx = clamp(abs(dx) / max(halfw, 1e-4), 0.0, 1.0);
          float cyl2 = sqrt(1.0 - ndx * ndx);
          float twist = 0.92 + 0.14 * sin(d * 34.0 + s * 2.0 + dx * 9.0);
          bc = pal(0.0) * (0.50 + 0.52 * cyl2) * twist * (0.86 + 0.20 * hash(vec2(s, 8.8)));
        }
      }
      col = mix(col, bc, best);
    }
  }

  // ---- the woven cloth ----
  // silhouette: fibre fuzz on every edge, a slow wobble down the sides
  float fuzz = (hash(gl_FragCoord.xy * 0.53) - 0.5) * wp * 0.9;
  float wob = (vnoise(vec2(q.y * 7.0, 3.7)) - 0.5) * wp * 1.6;
  float Xl = X0 + bow + wob + fuzz;
  float Xr = X1 - bow + wob * 0.7 + fuzz;

  if (q.x > Xl && q.x < Xr && q.y > Y0 + fuzz * 0.8 && q.y < min(fell, Y1e) + fuzz){
    // rows wander — a hand-beaten weft never lies ruler-straight
    float yr0 = (Y1e - q.y) / wh;
    float yr = yr0 + (vnoise(vec2(q.x * 20.0, yr0 * 0.10)) - 0.5) * 1.6;
    float ri = floor(yr);
    float fy = fract(yr);

    // gentle cloth undulation displaces the warp; each row seats a hair off
    float wave = sin(q.y * 9.0 + 1.8) + 0.55 * sin(q.y * 20.0 + 4.1);
    float xw = (q.x - X0 + 0.0016 * wave) / wp
             + (hash(vec2(ri, 8.1)) - 0.5) * 0.34;

    float prt = clamp(floor(yr / 3.0), 0.0, PR - 1.0);
    float pj = (hash(vec2(prt, 5.7)) - 0.5) * 0.5;     // motif edges waver
    float pcx = floor((xw + pj) / 2.0);

    float idx = pattern(pcx, prt);
    // selvedge: the outer pair of warps bound in dark wool
    if (xw < 2.0 || xw > WARP - 2.0) idx = mod(prt, 2.0) < 1.0 ? 6.0 : 4.0;
    vec3 wool = pal(idx);

    // brick: alternate rows seat their bumps between the row below's
    float bxc = xw + mod(ri, 2.0) * 0.5;
    float bi = floor(bxc);
    float bfx = fract(bxc);

    // heather: every finger of yarn its own dye lot
    wool *= 0.90 + 0.18 * hash(vec2(bi * 1.7, ri * 3.1));
    wool = mix(wool, wool * vec3(1.06, 1.0, 0.90), (hash(vec2(bi, ri + 41.0)) - 0.5) * 0.6);
    // abrash: whole dye batches drift row to row
    wool *= 0.94 + 0.11 * vnoise(vec2(yr * 0.045, 2.2));
    wool = mix(wool, wool * vec3(1.05, 1.005, 0.93), (vnoise(vec2(yr * 0.023, 9.1)) - 0.5) * 0.9);

    // kilim slits: where a colour field ends mid-row, a hairline shadow
    float xc = fract((xw + pj) / 2.0);
    float slit = 0.0;
    if (abs(pattern(pcx + 1.0, prt) - idx) > 0.5) slit = max(slit, smoothstep(0.55, 1.0, xc));
    if (abs(pattern(pcx - 1.0, prt) - idx) > 0.5) slit = max(slit, smoothstep(0.45, 0.0, xc));
    wool *= 1.0 - 0.16 * slit;

    // the weft bump: matte wool, deep occlusion in the grooves,
    // soft light raking from the upper left — no gloss anywhere
    float px = sin(bfx * PI);
    float py = sin(fy * PI);
    float bump = pow(px, 0.75) * (0.45 + 0.55 * py);
    wool *= 0.60 + 0.40 * smoothstep(0.02, 0.72, bump);
    wool *= 1.0 + 0.09 * cos(bfx * PI) + 0.07 * cos(fy * PI);

    // two plies twisted round each other
    wool *= 1.0 + 0.035 * sin((bfx * 2.0 - fy) * 2.0 * PI);
    // fibre: flecks, the lay of the staple, stray hairs catching light
    wool *= 0.94 + 0.12 * hash(gl_FragCoord.xy * 0.61);
    wool *= 0.95 + 0.10 * vnoise(vec2(q.x * 520.0, q.y * 80.0));
    wool += smoothstep(0.80, 0.97, vnoise(vec2(q.x * 240.0 + ri * 3.0, q.y * 330.0))) * 0.05;

    // fold light from the undulation
    wool *= 1.0 + 0.030 * cos(q.y * 9.0 + 1.8);
    // the working row sits a touch proud while the loom is dressed
    if (weave < 1.0 && abs(q.y - fell) < wh * 1.5) wool *= 1.05;

    col = wool;
  }

  // room finishing: a soft rake of gallery light, grain, vignette
  col *= 1.0 + 0.05 * (p.y - 0.5) - 0.03 * (p.x - 0.5);
  col += (hash(gl_FragCoord.xy * 0.71) - 0.5) * 0.02;
  float vig = smoothstep(1.35, 0.55, length(p - vec2(0.5, 0.5)));
  col *= mix(0.94, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008f");
const M = window.M8;
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;
let sh = null, start = null, prog = 0, raf = 0;

const F = FRAME.mount({
  num: 6, title: "Tapiz", subject: "Argentina vs. Cabo Verde",
  edition: "02/31", date: "06·07·2026",
  stack: "WebGL — GLSL", time: "3 hours",
  desc: "The match woven as a wall tapestry — 160 warps, 288 rows of beaten wool. Guarda pampa bands at the five goal minutes, a sol de mayo at the restart, gold picks at the cards, the field speckled 64/36 like the possession.",
  dark: false, onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    if (RM) prog = 1;
    cancelAnimationFrame(raf);
    if (prog >= 1) { render(0); return; }   // resized after the weave: redraw, don't rewind
    start = null;
    raf = requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

function render(tms) {
  window.__p = prog; // debug
  sh.gl.uniform1f(sh.extra.u_p, prog);
  sh.draw(tms / 1000, sf);
}
// woven once (10s), then it hangs still — no loop
function loop(tms) {
  if (!sh) return;
  if (start === null) start = tms - prog * 10000;
  prog = Math.min(1, (tms - start) / 10000);
  render(tms);
  if (prog < 1) raf = requestAnimationFrame(loop);
}
</script>
