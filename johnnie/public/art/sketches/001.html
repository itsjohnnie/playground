<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<canvas id="c"></canvas>
<script src="../art.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed;

// 001 · pool — soft color-field blobs breathing into each other.
// Each blob carries its own high-chroma ink; where fields overlap the
// colors mix like wet pigment. After Lieberman's color-blend studies.

float hash(float n){ return fract(sin(n*127.1+u_seed*311.7)*43758.5453); }

void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - u_res) / min(u_res.x, u_res.y);
  float t = u_time*0.22;

  // paper
  vec3 col = vec3(0.956, 0.937, 0.898);

  vec3 acc = vec3(0.0);
  float wsum = 0.0;

  for (int i = 0; i < 7; i++) {
    float fi = float(i);
    float h1 = hash(fi*3.1), h2 = hash(fi*7.7), h3 = hash(fi*13.3);
    // slow drifting orbits, each blob on its own rhythm
    vec2 p = vec2(
      sin(t*(0.5+h1*0.7) + h2*6.2832) * (0.35+h3*0.55),
      cos(t*(0.4+h2*0.8) + h1*6.2832) * (0.30+h1*0.5)
    );
    float r = 0.28 + h3*0.30;
    float d = length(uv - p);
    float w = exp(-(d*d)/(r*r));           // gaussian field

    // per-blob ink: saturated hues spread around the wheel
    float hue = fract(h1 + fi*0.145 + sin(t*0.3+fi)*0.02);
    vec3 ink = clamp(abs(mod(hue*6.0 + vec3(0.0,4.0,2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
    ink = ink*ink*(3.0-2.0*ink);
    ink = mix(vec3(0.5), ink, 0.9);        // keep chroma high but not neon

    acc += ink * w;
    wsum += w;
  }

  float density = 1.0 - exp(-wsum*1.6);            // how much pigment landed
  vec3 pigment = acc / max(wsum, 1e-4);            // blended hue
  // multiply-ish absorption: pigment darkens paper where dense
  col = mix(col, pigment * mix(vec3(1.0), col, 0.35), density);

  // soft vignette + grain so it sits like a print
  float vig = smoothstep(1.6, 0.5, length(uv));
  col *= mix(0.92, 1.0, vig);
  float g = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)))*43758.5453);
  col += (g-0.5)*0.035;

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
  const seed = ART.seed("2026-07-06-001");
  const canvas = ART.fit(document.getElementById("c"));
  const sh = ART.shader(canvas, document.getElementById("frag").textContent);
  const sf = ART.rng(seed)() * 100;
  (function loop(t) {
    sh.draw(t / 1000, sf);
    requestAnimationFrame(loop);
  })(0);
  ART.chrome({ n: "001", title: "pool", date: "2026-07-06" });
</script>
