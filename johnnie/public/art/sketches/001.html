<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-001.js"></script>
<script type="importmap">{ "imports": { "three": "../lib/three.module.min.js" } }</script>
<script type="module">
// #001 — terreno — the match as a survey plate.
// A black plate photographed in a dark room: x = the 90'+stoppage along the
// long axis, height = attacking pressure, depth = the width of the pitch
// (argentina works one half, argelia the other). Broad swells come from
// per-half xG rates, hills from all 17 shots (taller when on target),
// summits from the three goals — all argentina, all messi (17' 60' 76',
// his first world cup hat-trick). Argelia's side stays low ground: seven
// shots, none on target, one goal ruled offside at 8'. The choreography:
// the piece opens FLAT — a straight top-down plan, the plotter cursor
// sweeping left to right over ~7s while the bone-white contour lines
// emerge, so the first read is a 2D topographic map being drawn. The
// survey done, the camera makes one continuous eased move — tilting and
// turning down into the resting elevated-3/4 isometric — and the goal pins
// and labels arrive with the third dimension. Then the loop stops and the
// plate rests. Rested, it can be turned by hand: a drag yaws the plate and
// tilts the surveyor's view within clamps, 1:1 under the finger, then
// coasts on damped momentum to rest — rendering only while the hand or the
// momentum moves it (no idle loop). Reduced motion jumps straight to the
// resting isometric.
// data: counts, goal minutes and
// totals exact from M1 (see data-001.js for sources); per-half splits,
// individual shot minutes and across-pitch placement seeded (no location
// data exists). three.js · white ink on black.

import * as THREE from "three";

const seed = ART.seed("2026-06-16-001");
const M = window.M1;

const TOTAL = M.totalMin;                  // 90' + stoppage — no prórroga
const TL = 3.0, WL = 1.32;                 // world length (time) / depth (pitch width)
const SEG_T = 96, SEG_W = 48;
const C_ARG = -0.42, C_ALG = 0.42;         // team centres across the pitch (w in -1..1)
const H_MAX = 0.46;                        // tallest summit, world units
const NIGHT = new THREE.Color("#0a0a0c");
const BONE = new THREE.Color("#f2ece1");
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

let renderer, scene, camera, world, built = false, done = false;
let terraMat, pins = [], plateSprites = [];

const F = FRAME.mount({
  num: 1, title: "Terreno", subject: "Argentina vs. Algeria",
  edition: "01/31", date: "16·06·2026",
  stack: "Three.js + WebGL", time: "96 minutes",
  desc: "A survey plate of the opening match: attacking intensity raised into bone-white contour lines on a black ground, minute by minute along the long axis. The three summits are Messi’s goals — 17′, 60′, 76′, his first World Cup hat-trick — all rising from Argentina’s half of the plate; Algeria’s side stays low ground. The relief is drawn once, then rests.",
  ratio: 1.6, open: true, gesture: true,   // the drag is ours: it turns the plate
  dark: true, onResize(w, h, dpr) {
    if (!built) build();
    renderer.setPixelRatio(dpr);
    renderer.setSize(w / dpr, h / dpr, false);
    frameCamera(w / h);
    if (done) render();
  },
});

/* ---------- the heightmap ---------- */
const gauss = (d, s) => Math.exp(-(d * d) / (2 * s * s));

// per-half xG as a rate (per 45'), smoothly interpolated across the match
function phaseRate(team, min) {
  const rate = M.xgPhase[team].map((v, i) => v / [45, TOTAL - 45][i] * 45);
  const mids = [22.5, (45 + TOTAL) / 2];
  if (min <= mids[0]) return rate[0];
  if (min >= mids[1]) return rate[1];
  const t = (min - mids[0]) / (mids[1] - mids[0]);
  return rate[0] + (rate[1] - rate[0]) * (t * t * (3 - 2 * t));
}

// seeded shot events (real per-phase counts; goals + the disallowed at
// their true minutes)
function events(team) {
  const Rt = ART.rng(seed + "-ev-" + team);
  const phases = [[0, 45], [45, TOTAL]];
  const goals = M.goals.filter((g) => g.team === team);
  const dis = M.disallowed.filter((d) => d.team === team);
  const ev = [];
  M.shotsPhase[team].forEach((count, pi) => {
    const [a, b] = phases[pi];
    const fixed = goals.filter((g) => g.min > a && g.min <= b).length +
                  dis.filter((d) => d.min > a && d.min <= b).length;
    for (let i = 0; i < count - fixed; i++)
      ev.push({ min: a + 2 + Rt() * (b - a - 4), goal: null });
  });
  for (let i = ev.length - 1; i > 0; i--) {
    const j = (Rt() * (i + 1)) | 0;
    [ev[i], ev[j]] = [ev[j], ev[i]];
  }
  const nOn = M.onTarget[team] - goals.length;
  ev.forEach((e, i) => (e.on = i < nOn));
  dis.forEach((d) => ev.push({ min: d.min, on: false, dis: d }));
  goals.forEach((g) => ev.push({ min: g.min, on: true, goal: g }));
  const c = team === "arg" ? C_ARG : C_ALG;
  ev.forEach((e) => {
    e.w = c + (Rt() - 0.5) * (e.goal ? 0.22 : 0.55);
    e.amp = e.goal ? 0.225 : e.dis ? 0.068 : e.on ? 0.052 : 0.028;
    e.sMin = e.goal ? 2.6 : 1.5;
    e.sW = e.goal ? 0.27 : 0.17;
  });
  return ev;
}
const EV = { arg: events("arg"), alg: events("alg") };

// height at (minute, w)
function field(min, w) {
  let h = 0;
  h += phaseRate("arg", min) * 0.055 * (0.25 + 0.75 * gauss(w - C_ARG, 0.5));
  h += phaseRate("alg", min) * 0.055 * (0.25 + 0.75 * gauss(w - C_ALG, 0.5));
  for (const e of EV.arg) h += e.amp * gauss(min - e.min, e.sMin) * gauss(w - e.w, e.sW);
  for (const e of EV.alg) h += e.amp * gauss(min - e.min, e.sMin) * gauss(w - e.w, e.sW);
  return h;
}

/* ---------- text sprites (after the mono font loads) ---------- */
function textSprite(str, hex, px, hWorld) {
  const dpr = 3, pad = 8;
  const c = document.createElement("canvas");
  const g = c.getContext("2d");
  g.font = px * dpr + "px 'Geist Mono', ui-monospace, monospace";
  c.width = Math.ceil(g.measureText(str).width) + pad * 2;
  c.height = px * dpr + pad * 2;
  g.font = px * dpr + "px 'Geist Mono', ui-monospace, monospace";
  g.fillStyle = hex;
  g.textBaseline = "middle";
  g.fillText(str, pad, c.height / 2);
  const tex = new THREE.CanvasTexture(c);
  const m = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
  const sp = new THREE.Sprite(m);
  const h = hWorld || 0.062 * (px / 12);
  sp.scale.set(h * c.width / c.height, h, 1);
  return sp;
}

/* ---------- camera: surveyor's view, fit for landscape, turnable ---------- */
const TGT = new THREE.Vector3(0, 0.10, 0);
const YAW0 = -0.16, EL0 = 0.38;            // the resting pose: slight diagonal, 3/4 view
const EL_TOP = 1.535;                      // the opening pose: straight down — the plan
const YAW_LIM = 1.05;                      // how far the hand may turn it, either way
const EL_MIN = 0.14, EL_MAX = 0.92;        // never under the plate, never top-down
let yaw = 0, el = EL_TOP, dist = 6.6;      // born in plan view; finish() sets the rest pose
function frameCamera(aspect) {
  camera.aspect = aspect;
  camera.updateProjectionMatrix();
  const hf = Math.atan(Math.tan(camera.fov * Math.PI / 360) * aspect);
  dist = Math.max(1.86 / Math.tan(hf),                     // fit the plate's length
                  1.02 / Math.tan(camera.fov * Math.PI / 360)); // fit its height
  placeCamera();
}
function placeCamera() {
  camera.position.set(TGT.x, TGT.y + Math.sin(el) * dist, TGT.z + Math.cos(el) * dist);
  camera.lookAt(TGT);
  terraMat.uniforms.uDist.value = dist;        // depth fade tracks the dolly
}

/* ---------- build ---------- */
function build() {
  built = true;
  renderer = new THREE.WebGLRenderer({ canvas: F.canvas, antialias: true, alpha: true });
  renderer.autoClear = false;
  renderer.setClearColor(0x0d0a07, 0);   // open: the room shows through
  scene = new THREE.Scene();
  scene.background = null;                // open: no box, no ground of its own
  camera = new THREE.PerspectiveCamera(20, 1.6, 0.1, 80);

  world = new THREE.Group();
  world.rotation.y = yaw;                    // plan-aligned at birth; diagonal at rest
  scene.add(world);

  // --- terrain geometry: final heights baked, raised by the clock in-shader
  const geo = new THREE.PlaneGeometry(TL, WL, SEG_T, SEG_W);
  geo.rotateX(-Math.PI / 2);
  const p = geo.attributes.position;
  const n = p.count;
  const aH = new Float32Array(n), aMin = new Float32Array(n);
  let maxH = 0;
  const raw = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const min = (p.getX(i) / TL + 0.5) * TOTAL;
    const w = p.getZ(i) / (WL / 2);
    raw[i] = field(min, w);
    aMin[i] = min;
    if (raw[i] > maxH) maxH = raw[i];
  }
  for (let i = 0; i < n; i++) {
    p.setY(i, raw[i] / maxH * H_MAX);
    aH[i] = raw[i] / maxH;
  }
  p.needsUpdate = true;
  geo.computeVertexNormals();                // final-state normals for the raking light
  geo.setAttribute("aH", new THREE.BufferAttribute(aH, 1));
  geo.setAttribute("aMin", new THREE.BufferAttribute(aMin, 1));

  terraMat = new THREE.ShaderMaterial({
    uniforms: {
      uNight: { value: NIGHT },
      uBone: { value: BONE },
      uLevels: { value: 24.0 },
      uClock: { value: 0 },   // uncapped — keeps rising terrain past the whistle
      uCursor: { value: 0 },  // capped at TOTAL — the plotter's rule
      uSweep: { value: 1 },
      uPlate: { value: 0 },
      uDist: { value: 6.6 },
    },
    vertexShader: `
      attribute float aH, aMin;
      uniform float uClock;
      varying float vH, vMin, vRise, vLit, vZ;
      varying vec2 vUv;
      void main(){
        vH = aH; vMin = aMin; vUv = uv;
        float r = clamp((uClock - aMin) / 7.0, 0.0, 1.0);
        r = r * r * (3.0 - 2.0 * r);
        vRise = r;
        vec3 pos = position;
        pos.y *= r;
        // raking light from the upper left of the plate
        vLit = max(dot(normalize(normal), normalize(vec3(-0.55, 0.75, 0.4))), 0.0);
        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        vZ = -mv.z;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      precision highp float;
      uniform vec3 uNight, uBone;
      uniform float uLevels, uCursor, uSweep, uPlate, uDist;
      varying float vH, vMin, vRise, vLit, vZ;
      varying vec2 vUv;
      float h21(vec2 p){ p = fract(p * vec2(123.34, 345.45)); p += dot(p, p + 34.345); return fract(p.x * p.y); }
      float n2(vec2 p){
        vec2 i = floor(p), f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        return mix(mix(h21(i), h21(i + vec2(1.0, 0.0)), f.x),
                   mix(h21(i + vec2(0.0, 1.0)), h21(i + vec2(1.0, 1.0)), f.x), f.y);
      }
      float contour(float lv, float th){
        float f = fract(lv);
        float d = min(f, 1.0 - f);
        float w = fwidth(lv);
        return 1.0 - smoothstep(w * th * 0.6, w * th * 1.6, d);
      }
      float halo(float lv, float th){
        float f = fract(lv);
        float d = min(f, 1.0 - f);
        float w = fwidth(lv);
        return 1.0 - smoothstep(0.0, w * th * 6.0, d);
      }
      void main(){
        float hAbs = vH * vRise;
        // hand wobble: the pen wanders a hair off the true level (kept slow,
        // or the lines fragment into static)
        float wob = (n2(vUv * vec2(34.0, 15.0)) - 0.5) + (n2(vUv * vec2(88.0, 38.0)) - 0.5) * 0.35;
        float lv = hAbs * uLevels + wob * 0.11;
        float lvM = lv / 5.0 + wob * 0.02;
        // minor lines + heavier index lines every 5th, with a soft ink halo
        float minor = contour(lv, 1.0) * 0.5;
        float major = contour(lvM, 1.2) * 0.9;
        float crisp = max(minor, major);
        float glow = max(halo(lv, 1.0) * 0.05, halo(lvM, 1.2) * 0.10);
        float gate = smoothstep(0.006, 0.02, hAbs);
        float a = (crisp + glow) * gate;
        float bright = 0.62 + 0.38 * smoothstep(0.0, 0.85, hAbs);  // ink catches light on the summits
        // plate border
        float bd = min(min(vUv.x, 1.0 - vUv.x) / fwidth(vUv.x),
                       min(vUv.y, 1.0 - vUv.y) / fwidth(vUv.y));
        float borderA = (1.0 - smoothstep(0.7, 1.8, bd)) * 0.40 * uPlate;
        // period rules at 45 / 90 (the sliver past 90 is stoppage)
        float wm = fwidth(vMin) * 1.1;
        float pr = 0.0;
        pr = max(pr, 1.0 - smoothstep(wm * 0.6, wm * 1.7, abs(vMin - 45.0)));
        pr = max(pr, 1.0 - smoothstep(wm * 0.6, wm * 1.7, abs(vMin - 90.0)));
        float prA = pr * 0.14 * uPlate;
        // plotter cursor: a fine rule at the current minute, gone after the whistle
        float cur = (1.0 - smoothstep(wm * 0.7, wm * 2.4, abs(vMin - uCursor))) * uSweep * 0.45;
        // the plate face, barely lifted from the room by the raking light
        vec3 base = uNight + uBone * (vLit * vRise * 0.032 + hAbs * 0.02);
        vec3 col = base;
        col = mix(col, uBone * 0.52, clamp(borderA + prA, 0.0, 1.0));
        col = mix(col, uBone * bright, clamp(a, 0.0, 1.0));
        col = mix(col, uBone * 0.8, cur);
        // depth falls into the dark of the room (relative to the dolly)
        col = mix(col, uNight, smoothstep(uDist - 0.4, uDist + 2.4, vZ) * 0.35);
        gl_FragColor = vec4(col, 1.0);
        #include <colorspace_fragment>
      }`,
  });
  world.add(new THREE.Mesh(geo, terraMat));

  // --- goal pins + labels + plate captions (annotations in bone)
  const labels = [];
  for (const g of M.goals) {
    const e = EV[g.team].find((x) => x.goal === g);
    const x = (e.min / TOTAL - 0.5) * TL;
    const z = e.w * (WL / 2);
    const y = field(e.min, e.w) / maxH * H_MAX;
    const pinGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, y + 0.012, z), new THREE.Vector3(x, y + 0.17, z)]);
    const pinMat = new THREE.LineBasicMaterial({ color: BONE, transparent: true, opacity: 0 });
    world.add(new THREE.Line(pinGeo, pinMat));
    pins.push({ g, mat: pinMat, sprite: null });
    labels.push({ g, x, y, z });
  }
  document.fonts.ready.then(() => {
    for (const l of labels) {
      const txt = l.g.min + "’ " + l.g.player;      // 17' messi · 60' messi · 76' messi
      const s = textSprite(txt, "rgba(242,236,225,.95)", 12, 0.081);
      s.center.set(l.g.min > 50 ? 1 : 0, 0);   // late peaks label leftward, into the frame
      s.position.set(l.x, l.y + 0.185, l.z);
      s.material.opacity = 0;
      world.add(s);
      pins.find((pp) => pp.g === l.g).sprite = s;
    }
    // the one mark on argelia's side: the goal that wasn't (8', offside) —
    // a shorter, dimmer pin, lifted clear of the relief, read off the plate
    for (const d of M.disallowed) {
      const e = EV[d.team].find((x) => x.dis === d);
      const x = (e.min / TOTAL - 0.5) * TL;
      const z = e.w * (WL / 2);
      const y = field(e.min, e.w) / maxH * H_MAX;
      const pinGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, y + 0.012, z), new THREE.Vector3(x, y + 0.115, z)]);
      const pin = new THREE.Line(pinGeo,
        new THREE.LineBasicMaterial({ color: BONE, transparent: true, opacity: 0 }));
      world.add(pin);
      plateSprites.push({ s: pin, o: 0.3, line: true, tilt: true });
      const t = textSprite(d.min + "’ " + d.player + " · anulado", "rgba(242,236,225,.5)", 10, 0.058);
      t.center.set(1, 0);                     // extends leftward, into the empty room
      t.position.set(x, y + 0.125, z);
      t.material.opacity = 0;
      world.add(t);
      plateSprites.push({ s: t, o: 1, tilt: true });
    }
    // engraved captions off the near-left corner of the plate
    const capA = textSprite(M.home.name + " · xg " + M.xg.arg.toFixed(2) + " · " + M.shots.arg + " tiros",
      "rgba(242,236,225,.62)", 11, 0.068);
    capA.center.set(0, 0.5);
    capA.position.set(-TL / 2 + 0.07, -0.115, WL / 2 + 0.30);
    world.add(capA);
    plateSprites.push({ s: capA, o: 1 });
    const capC = textSprite(M.away.name + " · xg " + M.xg.alg.toFixed(2) + " · " + M.shots.alg + " tiros",
      "rgba(242,236,225,.62)", 11, 0.068);
    capC.center.set(0, 0.5);
    capC.position.set(-TL / 2 + 0.07, -0.195, WL / 2 + 0.30);
    world.add(capC);
    plateSprites.push({ s: capC, o: 1 });
    // the surveyor's minute scale along the near edge
    for (const m of [0, 45, 90]) {
      const t = textSprite(m + "’", "rgba(242,236,225,.55)", 10, 0.058);
      t.center.set(0.5, 1);
      t.position.set((m / TOTAL - 0.5) * TL, -0.02, WL / 2 + 0.10);
      t.material.opacity = 0;
      world.add(t);
      plateSprites.push({ s: t, o: 1 });
    }
    if (done) finish();                       // fonts landed after the plate rested
  });
  // open mode: no full-region grain overlay and no vignette — they would
  // silhouette the box / paint it back in. (The old overlay pass rendered
  // an empty scene every frame; removed outright.)
}

function render() {
  renderer.clear();
  renderer.render(scene, camera);
}

/* ---------- the one performance: plan, draw, tilt, rest ---------- */
// act i — the plan: straight top-down, the 94' plotted left to right in
// ~7.4s (a 2D contour map, drawn). act ii — the tilt: one continuous eased
// camera move down into the resting 3/4 isometric; the pins and goal labels
// fade in as the relief gains its third dimension. act iii — rest.
const DRAW = 7.4, LEAD = 0.5;                 // the survey sweep, after a beat
const T_TILT = 9.0, TILT = 2.2;               // tilt start (s) and duration
const clamp01 = (v) => Math.min(1, Math.max(0, v));
let t0 = null;

function finish() {
  if (!done) { yaw = YAW0; el = EL0; applyView(); }  // first rest only — never
  done = true;                                       // snap a hand-turned plate
  const U = terraMat.uniforms;
  U.uClock.value = TOTAL + 80;
  U.uCursor.value = TOTAL + 80;
  U.uSweep.value = 0;
  U.uPlate.value = 1;
  for (const ps of plateSprites) ps.s.material.opacity = ps.o;
  for (const pin of pins) {
    pin.mat.opacity = 0.55;
    if (pin.sprite) pin.sprite.material.opacity = 0.95;
  }
  render();                                    // the final frame IS the artwork
}

function loop(tms) {
  if (t0 === null) t0 = tms;
  const t = (tms - t0) / 1000;
  const clock = Math.max(0, t - LEAD) * (TOTAL / DRAW);
  const U = terraMat.uniforms;
  U.uClock.value = clock;
  U.uCursor.value = Math.min(TOTAL, clock);
  U.uSweep.value = clock < TOTAL ? 1 : clamp01(1 - (clock - TOTAL) / 5);
  const plateK = clamp01(t / 0.9);
  U.uPlate.value = plateK * plateK * (3 - 2 * plateK);
  for (const ps of plateSprites)
    if (!ps.tilt) ps.s.material.opacity = ps.o * plateK;   // map furniture, in plan
  // the tilt: plan → surveyor's 3/4, one confident move (strong ease-in-out)
  const k = clamp01((t - T_TILT) / TILT);
  const e5 = k * k * k * (k * (k * 6 - 15) + 10);
  el = EL_TOP + (EL0 - EL_TOP) * e5;
  yaw = YAW0 * e5;
  applyView();
  // pins and labels arrive with the third dimension
  const pk = clamp01((k - 0.3) / 0.55);
  for (const ps of plateSprites)
    if (ps.tilt) ps.s.material.opacity = ps.o * pk;
  for (const pin of pins) {
    pin.mat.opacity = pk * 0.55;
    if (pin.sprite) pin.sprite.material.opacity = pk * 0.95;
  }
  render();
  if (k >= 1) { finish(); return; }            // plotted, tilted, labelled — rest
  requestAnimationFrame(loop);
}

/* ---------- the hand: drag to turn the plate ---------- */
// 1:1 under the pointer, momentum with friction on release, hard-damped at
// the clamps (no springs). Renders on demand — once the momentum dies the
// rAF stops again and the plate rests.
const clampV = (v, a, b) => Math.min(b, Math.max(a, v));
let dragging = false, ptrId = null, lx = 0, ly = 0, lt = 0;
let vYaw = 0, vEl = 0, iRaf = 0, queued = false;

function applyView() {
  if (!built) return;
  world.rotation.y = yaw;
  placeCamera();
}
function kick() {                 // one on-demand frame, capped at display rate
  if (queued) return;
  queued = true;
  requestAnimationFrame(() => {
    queued = false;
    applyView();
    if (done && !iRaf) render();  // the intro/inertia loops render themselves
  });
}
function coast() {                // momentum: velocity, friction, rest
  if (iRaf) return;
  let pt = performance.now();
  const step = (t) => {
    const dt = Math.min(0.05, Math.max(0.001, (t - pt) / 1000));
    pt = t;
    yaw += vYaw * dt;
    el += vEl * dt;
    if (yaw <= YAW0 - YAW_LIM || yaw >= YAW0 + YAW_LIM) {   // damp to the limit,
      yaw = clampV(yaw, YAW0 - YAW_LIM, YAW0 + YAW_LIM);    // never past it
      vYaw = 0;
    }
    if (el <= EL_MIN || el >= EL_MAX) {
      el = clampV(el, EL_MIN, EL_MAX);
      vEl = 0;
    }
    const f = Math.exp(-dt / 0.35);                         // friction
    vYaw *= f; vEl *= f;
    applyView();
    if (done) render();
    if (!dragging && (Math.abs(vYaw) > 0.02 || Math.abs(vEl) > 0.02)) {
      iRaf = requestAnimationFrame(step);
    } else { iRaf = 0; }                                    // rest: no idle loop
  };
  iRaf = requestAnimationFrame(step);
}

const cv = F.canvas;
cv.style.touchAction = "none";    // full-screen stage on phones: the drag is ours
cv.style.cursor = "grab";
cv.addEventListener("pointerdown", (e) => {
  if (!done) return;              // the hand takes the plate only from rest
  if (ptrId !== null) return;     // first pointer only — this is not a pinch
  ptrId = e.pointerId;
  dragging = true;
  cv.setPointerCapture(ptrId);
  lx = e.clientX; ly = e.clientY; lt = e.timeStamp;
  vYaw = vEl = 0;
  if (iRaf) { cancelAnimationFrame(iRaf); iRaf = 0; }       // the hand takes over
  cv.style.cursor = "grabbing";
});
cv.addEventListener("pointermove", (e) => {
  if (!dragging || e.pointerId !== ptrId) return;
  const dYaw = (e.clientX - lx) / (cv.clientWidth || 1) * 2.6;   // full sweep ≈ 150°
  const dEl = (ly - e.clientY) / (cv.clientHeight || 1) * 1.6;   // drag up: look down on it
  const dt = Math.max(0.008, (e.timeStamp - lt) / 1000);
  yaw = clampV(yaw + dYaw, YAW0 - YAW_LIM, YAW0 + YAW_LIM);
  el = clampV(el + dEl, EL_MIN, EL_MAX);
  vYaw = 0.75 * vYaw + 0.25 * (dYaw / dt);                  // smoothed release velocity
  vEl = 0.75 * vEl + 0.25 * (dEl / dt);
  lx = e.clientX; ly = e.clientY; lt = e.timeStamp;
  kick();
});
const letGo = (e) => {
  if (e.pointerId !== ptrId) return;
  dragging = false;
  ptrId = null;
  cv.style.cursor = "grab";
  if (e.timeStamp - lt > 90) { vYaw = vEl = 0; return; }    // held still, then let go
  if (!REDUCED && (Math.abs(vYaw) > 0.05 || Math.abs(vEl) > 0.05)) coast();
};
cv.addEventListener("pointerup", letGo);
cv.addEventListener("pointercancel", letGo);

queueMicrotask(() => {
  if (!built) build();
  if (REDUCED) finish();
  else requestAnimationFrame(loop);
});
</script>
