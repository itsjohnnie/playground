<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script>
// 008 — j · órbitas — the goal as gravity, seen from above the plane.
// A tilted three-dimensional system: 33 shots ride inclined Kepler
// ellipses around a glowing torus (argentina clockwise in celeste,
// cabo verde counter in ember; on-target orbits tighter and faster).
// The five goals don't orbit — they spiral in at their minute, strike
// the ring, and leave a standing bell that keeps its note. The replay
// takes 26 seconds; after that the system simply keeps turning.

const seed = ART.seed("2026-07-06-008j");
const R = ART.rng(seed);
const M = window.M8;

const TILT = 1.02;                 // camera inclination
const CT = Math.cos(TILT), ST = Math.sin(TILT);

let W, H, DPR, U, CX, CY, bodies = [], strikers = [], dust = [];
const F = FRAME.mount({
  n: "008", v: "j", title: "órbitas", date: "06·07·2026",
  data: M.frameData, tech: "canvas · kepler 3d",
  dark: true,
  onResize(w, h, dpr) {
    W = w; H = h; DPR = dpr;
    U = Math.min(W, H * 0.75);
    CX = W / 2; CY = H / 2;
    build();
  },
});
const ctx = F.canvas.getContext("2d");

function build() {
  bodies = []; strikers = []; dust = [];
  const Rt = ART.rng(seed + "orbits");

  // seeded shot minutes per team/phase, on-target flags — house idiom
  for (const team of ["arg", "cpv"]) {
    const mins = [];
    M.shotsPhase[team].forEach((count, pi) => {
      const [a, b] = [[0, 45], [45, 90], [90, 120]][pi];
      for (let i = 0; i < count; i++) mins.push(a + 2 + Rt() * (b - a - 4));
    });
    for (let i = mins.length - 1; i > 0; i--) {
      const j = (Rt() * (i + 1)) | 0; [mins[i], mins[j]] = [mins[j], mins[i]];
    }
    mins.forEach((min, i) => {
      const on = i < M.onTarget[team];
      bodies.push({
        team, min, on,
        a: on ? 0.15 + Rt() * 0.10 : 0.28 + Rt() * 0.17,   // semi-major, U units
        e: 0.08 + Rt() * 0.25,
        incl: (Rt() - 0.5) * 0.55,
        node: Rt() * Math.PI * 2,
        phase: Rt() * Math.PI * 2,
        dir: team === "arg" ? 1 : -1,
        trail: [],
      });
    });
  }
  // one on-target body per goal leaves the shells — those are the strikers
  for (const g of M.goals) {
    const k = bodies.findIndex((b) => b.team === g.team && b.on);
    if (k >= 0) bodies.splice(k, 1);
    strikers.push({
      min: g.min, team: g.team, og: !!g.og,
      fromA: 0.34 + R() * 0.06, node: R() * Math.PI * 2,
      incl: (R() - 0.5) * 0.3, trail: [],
    });
  }
  // depth dust — a faint field behind everything
  for (let i = 0; i < 130; i++)
    dust.push({ x: R() * 1.6 - 0.8, y: R() * 2.2 - 1.1, a: 0.03 + R() * 0.09, r: 0.5 + R() });
}

// world → screen through the tilted, slowly drifting camera
function project(x, y, z, az) {
  const ca = Math.cos(az), sa = Math.sin(az);
  const wx = x * ca - y * sa, wy = x * sa + y * ca;
  return {
    x: CX + wx * U,
    y: CY + (wy * CT - z * ST) * U,
    z: wy * ST + z * CT,           // toward viewer
  };
}

// Kepler ellipse with the focus at the origin, inclined, node-rotated
function orbitPos(b, th) {
  const r = (b.a * (1 - b.e * b.e)) / (1 + b.e * Math.cos(th));
  let x = r * Math.cos(th), y = r * Math.sin(th);
  const ci = Math.cos(b.incl), si = Math.sin(b.incl);
  const zz = y * si; y = y * ci;
  const cn = Math.cos(b.node), sn = Math.sin(b.node);
  return [x * cn - y * sn, x * sn + y * cn, zz];
}

const RING = 0.068;                 // torus radius, U units
const easeOut = (t) => 1 - Math.pow(1 - Math.max(0, Math.min(1, t)), 3);
const COL = {
  arg: [143, 198, 234], argDim: [74, 123, 166],
  cpv: [240, 140, 100], cpvDim: [166, 74, 56],
};

function draw(tms) {
  const t = tms / 1000;
  const clock = Math.min(120, (t / 26) * 120);
  const az = 0.10 * Math.sin(t * 0.055) + t * 0.012;   // slow drift, never still

  ctx.fillStyle = "#07070b";
  ctx.fillRect(0, 0, W, H);

  // dust
  for (const d of dust) {
    const p = project(d.x, d.y, -0.05, az * 0.3);
    ctx.fillStyle = `rgba(200,210,225,${d.a})`;
    ctx.fillRect(p.x, p.y, d.r * DPR, d.r * DPR);
  }

  ctx.globalCompositeOperation = "lighter";

  // the torus — the goalmouth, breathing
  {
    const breathe = 1 + 0.03 * Math.sin(t * 1.7);
    for (let k = 3; k >= 0; k--) {
      ctx.strokeStyle = `rgba(244,240,229,${k ? 0.05 * k : 0.75})`;
      ctx.lineWidth = (k ? k * 4.5 : 1.8) * DPR;
      ctx.beginPath();
      ctx.ellipse(CX, CY, RING * U * breathe, RING * U * CT * breathe, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // bells — standing rings left by the goals
  ctx.font = Math.max(9 * DPR, 0.016 * U) + "px 'Geist Mono', ui-monospace, monospace";
  for (const s of strikers) {
    if (clock < s.min) continue;
    const age = t - (s.min / 120) * 26;
    if (age < 0) continue;
    const r = (RING + Math.min(0.24, age * 0.022)) * U;
    const fade = Math.max(0.14, 1 - age * 0.06);
    const [cr, cg, cb] = s.team === "arg" ? COL.arg : COL.cpv;
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${0.5 * fade})`;
    ctx.lineWidth = 1.4 * DPR;
    ctx.setLineDash(s.og ? [5 * DPR, 5 * DPR] : []);
    ctx.beginPath();
    ctx.ellipse(CX, CY, r, r * CT, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // the minute rides its ring at the goal's clock angle
    const ga = (s.min / 120) * Math.PI * 2 - Math.PI / 2;
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${Math.max(0.35, fade)})`;
    ctx.textAlign = "center";
    ctx.fillText(s.min + "’", CX + Math.cos(ga) * r, CY + Math.sin(ga) * r * CT - 5 * DPR);
  }

  // strikers mid-flight: spiral from the field into the torus over 2s
  for (const s of strikers) {
    const t0 = (s.min / 120) * 26 - 2;
    const k = (t - t0) / 2;
    if (k <= 0 || k >= 1) continue;
    const kk = easeOut(k);
    const th = s.node + kk * 5.2;
    const [x, y, z] = orbitPos({ a: s.fromA * (1 - kk) + RING * kk, e: 0, incl: s.incl * (1 - kk), node: 0 }, th);
    const p = project(x, y, z, az);
    s.trail.push([p.x, p.y]);
    if (s.trail.length > 26) s.trail.shift();
    const [cr, cg, cb] = s.team === "arg" ? COL.arg : COL.cpv;
    for (let i = 1; i < s.trail.length; i++) {
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(i / s.trail.length) * 0.5})`;
      ctx.lineWidth = 1.6 * DPR;
      ctx.beginPath();
      ctx.moveTo(s.trail[i - 1][0], s.trail[i - 1][1]);
      ctx.lineTo(s.trail[i][0], s.trail[i][1]);
      ctx.stroke();
    }
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 9 * DPR);
    g.addColorStop(0, "rgba(255,255,255,0.9)");
    g.addColorStop(0.4, `rgba(${cr},${cg},${cb},0.6)`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, 9 * DPR, 0, Math.PI * 2); ctx.fill();
    if (k > 0.93) {   // impact flash
      ctx.fillStyle = `rgba(255,252,240,${(k - 0.93) * 6})`;
      ctx.beginPath();
      ctx.ellipse(CX, CY, RING * U * 1.3, RING * U * CT * 1.3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // the shells — bodies sorted far → near
  const drawn = bodies
    .filter((b) => clock >= b.min)
    .map((b) => {
      const born = Math.min(1, (clock - b.min) / 3);
      const w = b.dir * (0.20 * 0.55) / Math.pow(b.a, 1.5);
      const th = b.phase + t * w;
      const [x, y, z] = orbitPos(b, th);
      return { b, p: project(x, y, z, az), born };
    })
    .sort((A, B) => A.p.z - B.p.z);

  for (const { b, p, born } of drawn) {
    b.trail.push([p.x, p.y]);
    if (b.trail.length > 34) b.trail.shift();
    const depth = 0.72 + 0.5 * Math.max(-0.6, Math.min(0.6, p.z));
    const [cr, cg, cb] = b.on
      ? (b.team === "arg" ? COL.arg : COL.cpv)
      : (b.team === "arg" ? COL.argDim : COL.cpvDim);
    for (let i = 1; i < b.trail.length; i++) {
      const a = (i / b.trail.length) * 0.34 * born * depth;
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a})`;
      ctx.lineWidth = 1.3 * DPR * depth;
      ctx.beginPath();
      ctx.moveTo(b.trail[i - 1][0], b.trail[i - 1][1]);
      ctx.lineTo(b.trail[i][0], b.trail[i][1]);
      ctx.stroke();
    }
    const rr = (b.on ? 2.6 : 2.0) * DPR * depth;
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr * 2.6);
    g.addColorStop(0, `rgba(255,255,255,${0.75 * born * depth})`);
    g.addColorStop(0.45, `rgba(${cr},${cg},${cb},${0.5 * born * depth})`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, rr * 2.6, 0, Math.PI * 2); ctx.fill();
  }

  ctx.globalCompositeOperation = "source-over";

  // gentle vignette
  const vg = ctx.createRadialGradient(CX, CY, U * 0.35, CX, CY, U * 0.95);
  vg.addColorStop(0, "rgba(7,7,11,0)");
  vg.addColorStop(1, "rgba(7,7,11,0.55)");
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
