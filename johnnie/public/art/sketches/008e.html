<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script>
// 008 — e · papel — the match as a torn-paper collage. Five shapes
// torn by hand — three celeste, two rojo, the own goal torn as a ring —
// settle onto layered paper fields, each with its white torn rim and
// its own shadow. 38 torn confetti bits are the shots (22 and 16), a
// gold scrap marks the moment at 111'. Placed once, then pressed flat.

const seed = ART.seed("2026-07-06-008e");
const R = ART.rng(seed);
const N = ART.makeNoise(seed);

let W, H, DPR, pieces = [], grain, done = false, start = null;
const F = FRAME.mount({
  n: "008", v: "e", title: "papel", date: "06·07·2026",
  data: window.M8.frameData, tech: "canvas · torn collage",
  dark: false,
  onResize(w, h, dpr) {
    W = w; H = h; DPR = dpr;
    build();
    done = false; start = null;
    requestAnimationFrame(loop);
  },
});
const ctx = F.canvas.getContext("2d");

// design → device px (width-anchored: x∈[0,0.75])
const U = () => W / 0.75;
const P = (x, y) => [x * U(), H / 2 + (y - 0.5) * U()];

// a torn edge: low-frequency shape + high-frequency tear jaggies
function tornPath(r, elong, rot, zs) {
  const pts = [];
  const Rt = ART.rng(seed + "torn" + zs);
  const STEPS = 110;
  for (let i = 0; i <= STEPS; i++) {
    const a = (i / STEPS) * Math.PI * 2;
    const low = N.fbm3(Math.cos(a) * 1.4, Math.sin(a) * 1.4, zs, 3) * 0.30;
    const jag = (Rt() - 0.5) * 0.05;
    const rr = r * (1 + low + jag) * (1 + elong * Math.abs(Math.cos(a - rot)));
    pts.push([Math.cos(a) * rr, Math.sin(a) * rr]);
  }
  return pts;
}

function build() {
  pieces = [];
  const u = U();
  // paper fields underneath — the bed of the composition
  pieces.push({ c: [0.42, 0.80], r: 0.40, elong: 0.55, rot: 0.3, col: "#ded5c0", zs: 11, d: 0.0 });
  pieces.push({ c: [0.30, 0.22], r: 0.32, elong: 0.75, rot: 1.8, col: "#e4dccb", zs: 23, d: 0.6 });

  // the five goals, in minute order; the own goal is a torn ring
  const goals = [
    { c: [0.245, 0.645], r: 0.150, col: "#7fb3d5", zs: 31 },
    { c: [0.525, 0.560], r: 0.118, col: "#c34a38", zs: 43 },
    { c: [0.360, 0.415], r: 0.142, col: "#4a7ba6", zs: 57 },
    { c: [0.168, 0.298], r: 0.098, col: "#8e3325", zs: 69 },
    { c: [0.548, 0.268], r: 0.115, col: "#a9c8dd", zs: 81, hole: true },
  ];
  goals.forEach((g, i) =>
    pieces.push({ elong: 0.15 + R() * 0.2, rot: R() * 3.14, d: 1.6 + i * 0.9, ...g }));

  // the gold scrap beside the ring
  pieces.push({ c: [0.618, 0.335], r: 0.028, elong: 0.3, rot: 1.0, col: "#d9a72e", zs: 93, d: 6.4 });

  // 38 confetti — 22 celeste, 16 rojo
  for (let i = 0; i < 38; i++) {
    pieces.push({
      c: [0.06 + R() * 0.63, 0.10 + R() * 0.80],
      r: 0.007 + R() * 0.011,
      elong: R() * 0.8, rot: R() * 3.14,
      col: i < 22 ? (R() < 0.5 ? "#7fb3d5" : "#4a7ba6") : (R() < 0.5 ? "#c34a38" : "#8e3325"),
      zs: 100 + i * 3, d: 7.0 + (i / 38) * 2.0, bit: true,
    });
  }

  // precompute torn outlines (device px)
  for (const pc of pieces) {
    pc.pts = tornPath(pc.r * u, pc.elong, pc.rot, pc.zs);
    if (pc.hole) pc.hpts = tornPath(pc.r * u * 0.45, 0.1, pc.rot + 1, pc.zs + 5).reverse();
  }

  grain = document.createElement("canvas");
  grain.width = W; grain.height = H;
  const g = grain.getContext("2d");
  const img = g.createImageData(W, H);
  const Rg = ART.rng(seed + "grain");
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 116 + Rg() * 24 | 0;
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = 22;
  }
  g.putImageData(img, 0, 0);
}

const easeOut = (t) => 1 - Math.pow(1 - Math.max(0, Math.min(1, t)), 3);

function drawPiece(pc, s) {
  if (s <= 0) return;
  const [px, py] = P(pc.c[0], pc.c[1]);
  const scale = 1.10 - 0.10 * s;               // pressed flat as it lands
  const lift = 1 - s;

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(lift * 0.10 * (pc.zs % 2 ? 1 : -1));
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, s * 1.6);

  const path = () => {
    ctx.beginPath();
    pc.pts.forEach(([x, y], i) => (i ? ctx.lineTo(x, y) : ctx.moveTo(x, y)));
    ctx.closePath();
    if (pc.hpts) {
      pc.hpts.forEach(([x, y], i) => (i ? ctx.lineTo(x, y) : ctx.moveTo(x, y)));
      ctx.closePath();
    }
  };

  // shadow + the white torn core (exposed fibre)
  ctx.shadowColor = "rgba(40,32,22," + (0.20 + lift * 0.25) + ")";
  ctx.shadowBlur = (6 + lift * 26) * DPR;
  ctx.shadowOffsetX = (3 + lift * 8) * DPR;
  ctx.shadowOffsetY = (5 + lift * 14) * DPR;
  ctx.fillStyle = "#f2ede0";
  path(); ctx.fill();
  ctx.shadowColor = "transparent";

  // the coloured face, inset and offset — the torn rim stays visible
  ctx.save();
  ctx.translate(-1.8 * DPR, -2.2 * DPR);
  ctx.scale(0.982, 0.982);
  ctx.fillStyle = pc.col;
  path(); ctx.fill();
  ctx.restore();
  ctx.restore();
}

function loop(tms) {
  if (done) return;
  if (start === null) start = tms;
  const t10 = Math.min(10, (tms - start) / 1000);

  ctx.fillStyle = "#e9e3d5";
  ctx.fillRect(0, 0, W, H);
  for (const pc of pieces) drawPiece(pc, easeOut((t10 - pc.d) / 1.4));

  ctx.globalCompositeOperation = "multiply";
  ctx.drawImage(grain, 0, 0);
  ctx.globalCompositeOperation = "source-over";

  if (t10 >= 10) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
