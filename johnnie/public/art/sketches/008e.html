<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — e · resonancia — a chladni plate sings the match. Fine sand on a
// dark steel plate migrates to the nodal lines while the drive frequency
// sweeps five resonance modes, one per goal — (2,3) 29' … (5,6) 111' —
// agitated while the tone moves, locking crisp when it lands. Every
// finished mode leaves ~8% of its figure behind: the plate remembers.
// Arrives once over 10s, then rests.

const float PI = 3.14159265358979;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }

float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1.,0.)), f.x),
             mix(hash(i+vec2(0.,1.)), hash(i+vec2(1.,1.)), f.x), f.y);
}

// square-plate chladni function, x,y in [-1,1]
float chl(vec2 pc, float n, float m){
  return cos(n*PI*pc.x)*cos(m*PI*pc.y) - cos(m*PI*pc.x)*cos(n*PI*pc.y);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 q = vec2(p.x*0.75, (p.y-0.5)*0.75/max(aspect,0.001) + 0.5);

  // the plate: square, centered, side 86% of the design width
  float hs = 0.3225;
  vec2 pc = (q - vec2(0.375, 0.5)) / hs;
  float ed = max(abs(pc.x), abs(pc.y));
  float inPlate = 1.0 - smoothstep(0.985, 1.0, ed);

  // ---- the drive: five modes, 2s each, smooth crossfades ----
  float m5 = clamp(u_p*5.0 - 0.5, 0.0, 4.0);
  float mi = floor(min(m5, 3.999));
  float mf = m5 - mi;
  float cf = smoothstep(0.25, 0.75, mf);
  float ms = mi + cf;                        // plateau-crossfade mode position
  float agit = cf*(1.0-cf)*4.0;              // crossfade derivative → agitation

  float w0 = clamp(1.0-abs(ms-0.0), 0.0, 1.0);
  float w1 = clamp(1.0-abs(ms-1.0), 0.0, 1.0);
  float w2 = clamp(1.0-abs(ms-2.0), 0.0, 1.0);
  float w3 = clamp(1.0-abs(ms-3.0), 0.0, 1.0);
  float w4 = clamp(1.0-abs(ms-4.0), 0.0, 1.0);

  // ---- sand as grains: one cell ≈ one grain ----
  float cell = max(1.25, u_res.x/430.0);
  vec2 id = floor(gl_FragCoord.xy / cell);
  float shake = step(0.05, agit);
  float h0 = hash(id + vec2(3.1, 17.0));
  vec2 jid = id + shake*floor(u_time*16.0 + h0*6.0)*vec2(3.0, 17.0);
  float h1 = hash(jid);
  float h2 = hash(jid + vec2(19.3, 7.7));

  // evaluate the field at the grain's cell center → whole grains, not gradients
  vec2 fc = (id + 0.5) * cell;
  vec2 pcen = fc / u_res;
  vec2 qc = vec2(pcen.x*0.75, (pcen.y-0.5)*0.75/max(aspect,0.001) + 0.5);
  vec2 pcc = (qc - vec2(0.375, 0.5)) / hs;
  // per-grain positional jitter while the plate is being retuned
  vec2 pj = pcc + (vec2(h1, h2) - 0.5) * 0.055 * agit;

  float A = w0*chl(pj,2.,3.) + w1*chl(pj,3.,4.) + w2*chl(pj,3.,5.)
          + w3*chl(pj,4.,5.) + w4*chl(pj,5.,6.);

  float sandIn = smoothstep(0.0, 0.06, u_p);
  float th = 0.30 + 0.26*agit;               // sand spreads while agitated
  float dens = pow(smoothstep(th, 0.0, abs(A)), 1.35);

  // rounded grain footprint inside the cell
  float shape = smoothstep(0.56, 0.30, length(fract(gl_FragCoord.xy/cell) - 0.5));

  float grain = step(1.0 - dens*0.92*sandIn, h1) * (0.55 + 0.45*h2);

  // stray grains scattered in the low-|A| basins
  float basin = smoothstep(1.15, 0.15, abs(A));
  float h3 = hash(id + vec2(57.0, 3.1));
  float stray = step(1.0 - 0.05*basin*sandIn, h3) * (0.30 + 0.40*h2);

  // sand in flight while the tone changes
  float h4 = hash(jid + vec2(101.0, 47.0));
  float flight = agit * 0.55 * step(0.962, h4);

  // ghost residue — each finished mode leaves ~8% of its figure
  float r0 = smoothstep(0.80, 1.05, ms);
  float r1 = smoothstep(1.80, 2.05, ms);
  float r2 = smoothstep(2.80, 3.05, ms);
  float r3 = smoothstep(3.80, 4.00, ms);
  float resDens =
      r0*smoothstep(0.16, 0.0, abs(chl(pcc,2.,3.)))
    + r1*smoothstep(0.16, 0.0, abs(chl(pcc,3.,4.)))
    + r2*smoothstep(0.16, 0.0, abs(chl(pcc,3.,5.)))
    + r3*smoothstep(0.16, 0.0, abs(chl(pcc,4.,5.)));
  float h5 = hash(id + vec2(211.0, 5.0));
  float resg = step(1.0 - clamp(resDens, 0.0, 1.0)*0.085, h5) * (0.35 + 0.30*h2);

  float sand = clamp(grain + stray + resg + flight, 0.0, 1.0) * shape;

  // the four bolts keep their circle clear of sand
  float bd = length(abs(pc) - vec2(0.90));
  sand *= smoothstep(0.045, 0.075, bd);
  sand *= inPlate * smoothstep(1.0, 0.965, ed);

  // ---- materials ----
  float lit = 1.0 - 0.5*smoothstep(0.0, 1.4, length(pc));        // center-lit
  float brush = vnoise(vec2(pc.y*230.0, pc.x*7.0));              // brushed along x
  vec3 plate = vec3(0.052, 0.055, 0.062) * (0.55 + 0.95*lit)
             + (brush - 0.5) * 0.022;
  vec3 voidc = vec3(0.012, 0.013, 0.016) * (0.8 + 0.5*p.y);
  vec3 col = mix(voidc, plate, inPlate);

  // machined rim: dark cut inside, lit chamfer just outside
  float litDir = 0.40 + 0.60*clamp(0.5 + 0.55*pc.y - 0.20*pc.x, 0.0, 1.0);
  float cut = smoothstep(0.014, 0.002, abs(ed - 0.992));
  col = mix(col, vec3(0.020, 0.021, 0.024), cut*0.8);
  float rim = smoothstep(0.010, 0.003, abs(ed - 1.012));
  col = mix(col, vec3(0.33, 0.34, 0.37)*litDir, rim*0.9);

  // corner bolts, barely lit
  float boltR = 0.034;
  float bolt = smoothstep(boltR, boltR - 0.010, bd) * inPlate;
  col = mix(col, vec3(0.070, 0.072, 0.078)*(0.7 + 0.6*lit), bolt);
  float boltRim = smoothstep(0.007, 0.0, abs(bd - boltR)) * inPlate;
  col = mix(col, vec3(0.22, 0.23, 0.25)*litDir, boltRim*0.5);

  // sand: warm bone with a hint of gold; celeste in argentina's modes,
  // warm in cabo verde's, neutral in the final superposition
  vec3 sandc = vec3(0.905, 0.865, 0.760);
  sandc = mix(sandc, vec3(0.700, 0.855, 0.950), (w0 + w2)*0.22);
  sandc = mix(sandc, vec3(0.945, 0.800, 0.640), (w1 + w3)*0.22);
  sandc *= 0.82 + 0.22*lit;
  col = mix(col, sandc, sand);

  // grain + vignette
  float g2 = hash(gl_FragCoord.xy*0.7);
  col += (g2 - 0.5)*0.028;
  float vig = smoothstep(1.30, 0.42, length(p - vec2(0.5)));
  col *= mix(0.78, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008e");
let sh = null, done = false, start = null;

const F = FRAME.mount({
  n: "008", v: "e", title: "resonancia", date: "06·07·2026",
  data: window.M8.frameData, tech: "glsl · chladni",
  dark: true,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;          // re-render after resize
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// the drive sweeps once (10s), locks the fifth figure, then the plate rests
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
