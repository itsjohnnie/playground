<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script>
// 008 — i · minutos — the match told only in typography. A huge minute
// counter ticks 1'→120' over the 26 s replay; goal minutes freeze the
// clock — the numeral slams wide, takes the team ink, the scorer
// typewrites in beside it, a hard rule stamps across — then the goal
// settles into a growing ledger. entretiempo and 90' interject as rules.
// After 120': the final tableau, 3–2 · prórroga. All real data; the
// freeze beats borrow ~9 s of the 26, ticking fills the rest.

const seed = ART.seed("2026-07-06-008i"); // determinism kept for parity; no randomness used
const M = window.M8;

const F = FRAME.mount({
  n: "008", v: "i", title: "minutos", date: "06·07·2026",
  data: M.frameData, tech: "dom · kinetic type", dark: false, noCanvas: true,
});

const css = document.createElement("style");
css.textContent = `
.k{position:absolute;inset:0;z-index:2;overflow:hidden;
  font-family:'Geist Mono',ui-monospace,monospace;
  text-transform:lowercase;color:rgb(23,21,17);
  --arg:${M.ink.argDeep};--cpv:${M.ink.cpvDeep}}
#flood{position:absolute;inset:0;background:#0d0d13;opacity:0;transition:opacity .9s ease}
#wash{position:absolute;inset:0;opacity:0;transition:opacity .45s ease-out}
.k .cut,.k .cut *{transition:none !important}
#rulTrack{position:absolute;left:6.8%;top:14%;height:72.5%;width:1px;
  background:rgba(23,21,17,.14)}
#rul{position:absolute;inset:0;background:rgba(23,21,17,.78);
  transform:scaleY(0);transform-origin:top}
#ctrWrap{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);
  text-align:center;white-space:nowrap}
#ctr{font-family:'Geist Pixel','Geist Mono',ui-monospace,monospace;
  font-size:20cqw;line-height:1;font-variant-numeric:tabular-nums;
  color:rgba(23,21,17,.34);transform:scale(1);transform-origin:50% 82%;
  transition:transform .38s cubic-bezier(.2,.9,.2,1),color .16s ease-out;
  will-change:transform}
#ctr.slam{transform:scale(1.7)}
#ctr.slam.arg{color:var(--arg)}
#ctr.slam.cpv{color:var(--cpv)}
#ctr.final{font-family:'Geist Pixel','Geist Mono',ui-monospace,monospace;
  font-size:30cqw;transform:none;color:rgba(244,240,229,.92);
  transition:transform .5s cubic-bezier(.2,.9,.2,1),color .6s ease,font-size .5s cubic-bezier(.2,.9,.2,1)}
.k.night{color:rgba(244,240,229,.9)}
.k.night #rulTrack{background:rgba(244,240,229,.16)}
.k.night #rul{background:rgba(244,240,229,.85)}
.k.night #sub{color:rgba(244,240,229,.6);text-transform:uppercase;letter-spacing:.36em}
.k.night #ledger .p{color:rgba(244,240,229,.72)}
.k.night #ledger .m.arg{color:#8fc6ea}
.k.night #ledger .m.cpv{color:#ff6b8f}
#sub{margin-top:3cqw;font-size:3.1cqw;letter-spacing:.3em;min-height:4.4cqw;
  color:rgba(23,21,17,.6);opacity:0;transition:opacity .25s ease-out}
#sub.on{opacity:1}
#sub.arg{color:var(--arg)}
#sub.cpv{color:var(--cpv)}
#stamp{position:absolute;left:8%;right:8%;top:57.5%;height:.55cqw;
  background:currentColor;transform:scaleX(0);transform-origin:left;
  transition:transform .26s cubic-bezier(.2,.9,.2,1),opacity .45s ease-out}
#stamp.arg{color:var(--arg)}
#stamp.cpv{color:var(--cpv)}
#stamp.on{transform:scaleX(1)}
#band{position:absolute;left:0;right:0;top:74.5%;padding:1.7cqw 0;
  text-align:center;font-size:3.2cqw;letter-spacing:.26em;
  border-top:1px solid rgba(23,21,17,.8);border-bottom:1px solid rgba(23,21,17,.8);
  color:rgba(23,21,17,.8);opacity:0;transform:scaleX(.35);
  transition:transform .3s cubic-bezier(.2,.9,.2,1),opacity .22s ease-out}
#band.show{opacity:1;transform:scaleX(1)}
#ledger{position:absolute;left:13.5%;top:63.5%;font-size:3cqw;line-height:1.85;
  letter-spacing:.12em}
#ledger .e{opacity:0;transform:translateY(1.1em);
  transition:transform .55s cubic-bezier(.2,.9,.2,1),opacity .4s ease-out}
#ledger .e.in{opacity:1;transform:none}
#ledger .m{display:inline-block;min-width:5.5ch}
#ledger .m.arg{color:var(--arg)}
#ledger .m.cpv{color:var(--cpv)}
#ledger .p{color:rgba(23,21,17,.72)}`;
document.head.appendChild(css);

const K = document.createElement("div");
K.className = "k";
K.innerHTML = `
  <div id="flood"></div><div id="wash"></div>
  <div id="rulTrack"><div id="rul"></div></div>
  <div id="ctrWrap"><div id="ctr">1’</div><div id="sub"></div></div>
  <div id="stamp"></div>
  <div id="band"></div>
  <div id="ledger"></div>`;
F.stage.appendChild(K);
const $ = (id) => K.querySelector("#" + id);
const ctr = $("ctr"), sub = $("sub"), stamp = $("stamp"),
      band = $("band"), ledger = $("ledger"), rul = $("rul"),
      flood = $("flood"), wash = $("wash");

// ---- timeline: 26 s replay = ticking + freeze beats ----
const GOAL_DUR = 1.5, BREAK_DUR = 0.9;
const events = [];
for (const g of M.goals)
  events.push({ min: g.min, dur: GOAL_DUR, goal: g });
events.push({ min: 45, dur: BREAK_DUR, label: "entretiempo · " + M.htScore.join("–") });
events.push({ min: 90, dur: BREAK_DUR, label: "final 90’ · " + M.ftScore.join("–") });
events.sort((a, b) => a.min - b.min);
const FROZEN = events.reduce((s, e) => s + e.dur, 0);
const RATE = 120 / (26 - FROZEN); // minutes per ticking second
{
  let acc = 0;
  for (const e of events) { e.start = e.min / RATE + acc; acc += e.dur; }
}
function stateAt(c) {
  let frozen = 0;
  for (const e of events) {
    if (c < e.start) return { mode: "tick", min: (c - frozen) * RATE };
    if (c < e.start + e.dur) return { mode: "freeze", e, phase: (c - e.start) / e.dur };
    frozen += e.dur;
  }
  return { mode: "tick", min: Math.min(120, (c - frozen) * RATE) };
}

// ---- state machine: the match plays ONCE, then the score rests ----
let active = null, fired = new Set(), finalOn = false, t0 = null, ended = false;

function ledgerEntry(g) {
  const e = document.createElement("div");
  e.className = "e";
  e.innerHTML = `<span class="m ${g.team}">${g.min}’</span><span class="p">${g.player}</span>`;
  ledger.appendChild(e);
  requestAnimationFrame(() => requestAnimationFrame(() => e.classList.add("in")));
}

function reset() {
  K.classList.add("cut");
  active = null; fired = new Set(); finalOn = false;
  ledger.innerHTML = "";
  ctr.className = ""; ctr.textContent = "1’";
  sub.className = ""; sub.textContent = "";
  stamp.className = ""; stamp.style.opacity = "";
  band.className = "";
  rul.style.transform = "scaleY(0)";
  K.offsetHeight; // flush, so the cut is instant
  requestAnimationFrame(() => K.classList.remove("cut"));
}

function tick(now) {
  if (ended) return;
  if (t0 === null) t0 = now;
  const cycle = (now - t0) / 1000;

  if (cycle < 26) {
    const st = stateAt(cycle);
    const clock = st.mode === "tick" ? st.min : st.e.min;
    rul.style.transform = "scaleY(" + Math.min(1, clock / 120) + ")";

    if (st.mode === "tick") {
      if (active) { // leaving a freeze — everything settles
        ctr.classList.remove("slam", "arg", "cpv");
        sub.classList.remove("on");
        stamp.classList.remove("on");
        stamp.style.opacity = 0;
        band.classList.remove("show");
        active = null;
      }
      ctr.textContent = Math.max(1, Math.min(120, Math.floor(st.min) + 1)) + "’";
    } else {
      const e = st.e, p = st.phase;
      if (active !== e) { // entering the freeze
        active = e;
        ctr.textContent = e.min + "’";
        if (e.goal) {
          ctr.classList.add("slam", e.goal.team);
          stamp.className = e.goal.team;
          stamp.style.opacity = "";
          stamp.offsetWidth;
          stamp.classList.add("on");
          sub.className = "on " + e.goal.team;
          sub.textContent = "";
          // the stadium gasps — a wash of the scorer's color
          wash.style.background = e.goal.team === "arg" ? M.ink.arg : M.ink.cpv;
          wash.style.opacity = 0.16;
        } else {
          band.textContent = e.label;
          band.classList.add("show");
        }
      }
      if (e.goal) {
        // scorer typewrites over the heart of the beat
        const full = "gol · " + e.goal.player;
        const k = Math.max(0, Math.min(full.length,
          Math.round(((p - 0.12) / 0.55) * full.length)));
        const cut = full.slice(0, k);
        if (sub.textContent !== cut) sub.textContent = cut;
        if (p > 0.78) { // release: shrink back, stamp fades, ledger takes it
          ctr.classList.remove("slam", "arg", "cpv");
          stamp.style.opacity = 0;
          sub.classList.remove("on");
          wash.style.opacity = 0;
          if (!fired.has(e.min)) { fired.add(e.min); ledgerEntry(e.goal); }
        }
      } else if (p > 0.8) {
        band.classList.remove("show");
      }
    }
  } else if (!finalOn) { // ---- the final: night falls, the score stays ----
    finalOn = true;
    rul.style.transform = "scaleY(1)";
    for (const e of events) // safety: full ledger even if a beat was skipped
      if (e.goal && !fired.has(e.min)) { fired.add(e.min); ledgerEntry(e.goal); }
    wash.style.opacity = 0;
    stamp.style.opacity = 0;
    band.classList.remove("show");
    K.classList.add("night");
    flood.style.opacity = 1;
    F.setTone(true);   // the frame stays legible as night falls
    ctr.classList.remove("slam", "arg", "cpv");
    ctr.classList.add("final");
    ctr.innerHTML =
      `<span style="color:#8fc6ea">3</span>` +
      `<span style="color:rgba(244,240,229,.3)">–</span>` +
      `<span style="color:#ff6b8f">2</span>`;
    sub.className = "on";
    sub.textContent = "prórroga · miami · 03·07";
    // the poster is finished — stop the clock for good
    setTimeout(() => { ended = true; }, 2000);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
