<script>
// 005 · embate — Argentina 3–2 Egypt as two ink fronts colliding in still
// water, forever. A genuine fluid simulation (stable fluids: semi-Lagrangian
// advection + Jacobi pressure projection, ping-pong half-float FBOs at low
// resolution) carries two dyes — pharaonic ochre pressing down from above,
// celeste rising from below — and the match's own clock drives the forcing:
// Egypt's goals at 15' and 67' shove the shear line down; the 21' penalty is
// a celeste thrust that dies against it; the 58' VAR goal an ochre surge
// pulled back; then the late pressure builds through 79' and 83' until, at
// 90+2', a narrow celeste jet breaks through the ochre line — one breath of
// gold — the whistle releases the strain, the waters regather, and the clash
// begins again. One match per 40-second cycle; the simulation never cuts, so
// there is no seam — each remontada rises out of the residue of the last.
// All event minutes and the score-state line come from data-005.js (M5).

const seed = ART.seed("2026-07-07-005");
const M = window.M5;
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------------- choreography: the match as forcing ---------------- */

const T = 40;                                   // seconds per cycle
const PLAY = 34;                                // 0'..90+12' live; then release
const tm = (m) => (m / M.totalMin) * PLAY;

// smoothstep keyframe envelope
function env(t, ks) {
  if (t <= ks[0][0]) return ks[0][1];
  for (let i = 1; i < ks.length; i++) {
    if (t <= ks[i][0]) {
      const a = ks[i - 1], b = ks[i];
      const u = (t - a[0]) / Math.max(b[0] - a[0], 1e-6);
      return a[1] + (b[1] - a[1]) * u * u * (3 - 2 * u);
    }
  }
  return ks[ks.length - 1][1];
}
const K = {
  // drive: how hard each front presses (celeste up, ochre down)
  da: [[0, 1.0], [tm(14), 0.95], [tm(18), 0.85], [tm(60), 0.80], [tm(70), 0.72],
       [tm(76), 0.92], [tm(84), 1.25], [tm(90), 1.28], [34.2, 1.10], [37, 1.0]],
  de: [[0, 1.0], [tm(14), 1.10], [tm(18), 1.38], [tm(60), 1.48], [tm(70), 1.62],
       [tm(78), 1.35], [tm(84), 1.08], [tm(90), 1.06], [34.2, 1.00], [37, 1.0]],
  // where the front holds — the score state as a waterline
  eta: [[0, 0.50], [tm(13), 0.49], [tm(19), 0.40], [tm(56), 0.37], [tm(66), 0.35],
        [tm(71), 0.285], [tm(78), 0.32], [tm(81), 0.41], [tm(85), 0.50],
        [tm(91), 0.53], [34.2, 0.54], [37.5, 0.50]],
  // opposing drift along the interface — the shear that makes the billows
  sh: [[0, 0.55], [tm(15), 0.90], [tm(45), 1.05], [tm(70), 1.30],
       [tm(90), 1.50], [34.5, 0.80], [37, 0.55]],
};
const gauss = (t, c, w) => Math.exp(-((t - c) / w) * ((t - c) / w));
const relOf = (t) => {                          // the whistle's release window
  const s = (a, b, x) => Math.min(1, Math.max(0, (x - a) / (b - a)));
  const u1 = s(33.8, 35.2, t), u2 = 1 - s(37.4, 39.2, t);
  return (u1 * u1 * (3 - 2 * u1)) * (u2 * u2 * (3 - 2 * u2));
};

// event impulses, seeded across the pitch, built from the record
const Rx = ART.rng(seed + "-x");
const exs = [];
for (let i = 0; i < 8; i++) exs.push(0.22 + 0.56 * Rx());
const PU = [];
{
  const g = M.goals;
  // goals: a shove from within the mass toward the other goal
  PU.push({ t: tm(g[0].min), dur: 1.3, x: exs[0], yo: +0.10, dir: -1, amp: 340, w: 0.085, ink: -0.9 });
  PU.push({ t: tm(g[1].min), dur: 1.4, x: exs[1], yo: +0.10, dir: -1, amp: 380, w: 0.090, ink: -1.0 });
  PU.push({ t: tm(g[2].min), dur: 1.2, x: exs[2], yo: -0.10, dir: +1, amp: 360, w: 0.080, ink: +0.9 });
  PU.push({ t: tm(g[3].min), dur: 1.2, x: exs[3], yo: -0.10, dir: +1, amp: 400, w: 0.080, ink: +1.0 });
  // 90+2 — the breakthrough: narrow, sustained, rising through the line
  PU.push({ t: tm(g[4].min), dur: 1.7, x: exs[4], yo: -0.06, dir: +1, amp: 800, w: 0.055, ink: +1.1, rise: 0.42 });
  // 21' — the penalty: a thrust that dies against the line
  const p = M.penaltyMissed;
  PU.push({ t: tm(p.min), dur: 0.8, x: exs[5], yo: -0.10, dir: +1, amp: 300, w: 0.060, ink: +0.5 });
  PU.push({ t: tm(p.min) + 0.55, dur: 0.9, x: exs[5], yo: +0.04, dir: -1, amp: 340, w: 0.075, ink: -0.7 });
  // 58' — the VAR goal: a surge pulled back
  const v = M.disallowed[0];
  PU.push({ t: tm(v.min), dur: 0.9, x: exs[6], yo: +0.10, dir: -1, amp: 320, w: 0.070, ink: -0.8 });
  PU.push({ t: tm(v.min) + 0.7, dur: 1.0, x: exs[6], yo: -0.02, dir: +1, amp: 260, w: 0.090, ink: 0 });
}
const tBreak = tm(M.goals[4].min);              // 90+2 → the gold instant
const gxBreak = exs[4];

function chor(tau) {
  const rel = relOf(tau);
  const da = env(tau, K.da), de = env(tau, K.de);
  const eta = env(tau, K.eta), sh = env(tau, K.sh);
  const kline = 70 * (1 - 0.55 * gauss(tau, tBreak + 0.85, 1.1)) * (1 - 0.3 * rel);
  const pulses = [];
  for (const e of PU) {
    const u = (tau - e.t) / e.dur;
    if (u <= 0 || u >= 1 || pulses.length >= 2) continue;
    const w = Math.sin(Math.PI * u) ** 2;
    const y = eta + e.yo + (e.rise ? e.rise * u : 0);
    pulses.push({ x: e.x, y, fy: e.dir * e.amp * w, ink: e.ink * w, w: e.w });
  }
  while (pulses.length < 2) pulses.push({ x: 0, y: -9, fy: 0, ink: 0, w: 0.06 });
  return {
    da, de, eta, sh, kline, rel, pulses,
    noise: 5 + 6 * Math.max(0, sh - 0.55),
    gold: gauss(tau, tBreak + 0.95, 0.85),
    srcO: 0.85 * de * (1 + 0.45 * rel),
    srcC: 0.85 * da * (1 + 0.45 * rel),
  };
}

/* ---------------- shaders ---------------- */

const VS = "attribute vec2 a;varying vec2 vUv;void main(){vUv=a*0.5+0.5;gl_Position=vec4(a,0.,1.);}";
const NOISE = `
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 3; i++){ s += a*vnoise(p); p = p*2.03 + 11.7; a *= 0.5; }
  return s;
}`;

// still water, formed fronts — the state the loop keeps returning to
const FS_INIT = `precision highp float;varying vec2 vUv;uniform float u_seed;
${NOISE}
void main(){
  float wob = (vnoise(vec2(vUv.x*2.6 + u_seed*0.13, 3.7)) - 0.5) * 0.10;
  float s = vUv.y - (0.5 + wob);
  float od = smoothstep(-0.02, 0.06, s) * (0.55 + 0.40*vnoise(vUv*5.0 + 1.0));
  float cd = smoothstep(0.02, -0.06, s) * (0.55 + 0.40*vnoise(vUv*5.0 + 7.0));
  gl_FragColor = vec4(od, cd, 0.0, 1.0);
}`;

const FS_ADVECT = `precision highp float;varying vec2 vUv;
uniform sampler2D u_vel, u_src;uniform vec2 u_px;uniform float u_dt, u_diss;
void main(){
  vec2 v = texture2D(u_vel, vUv).xy;
  gl_FragColor = texture2D(u_src, vUv - v * u_dt * u_px) * u_diss;
}`;

const FS_FORCE = `precision highp float;varying vec2 vUv;
uniform sampler2D u_vel, u_dye;
uniform float u_dt, u_seed, u_time, u_asp;
uniform vec4 u_drv;   // da, de, eta, shear
uniform vec3 u_msc;   // kline, noiseAmp, velKeep
uniform vec4 u_pa, u_pb;   // x, y, fy, ink (ink unused here)
uniform vec2 u_pw;
${NOISE}
float blob(vec2 c, float w){
  vec2 q = (vUv - c) * vec2(u_asp, 1.0);
  return exp(-dot(q, q) / (w*w));
}
void main(){
  vec2 v = texture2D(u_vel, vUv).xy;
  vec4 d = texture2D(u_dye, vUv);
  float od = d.r, cd = d.g;
  // the duel: each front presses toward the line, not past it — the strain
  // lives at the interface; whatever crosses is pulled back and regathers
  float sideC = smoothstep(u_drv.z + 0.22, u_drv.z - 0.06, vUv.y);
  float sideO = smoothstep(u_drv.z - 0.22, u_drv.z + 0.06, vUv.y);
  float fy = 20.0 * (u_drv.x*cd*sideC - u_drv.y*od*sideO);
  // both masses are held against the score line — compression, strain
  fy += u_msc.x * (u_drv.z - vUv.y) * (od + cd);
  // opposing drift ONLY where the fronts touch — shear billows at the line,
  // no net migration inside either mass
  float mz = smoothstep(0.02, 0.25, od*cd*6.0);
  float fx = u_drv.w * (od - cd) * 26.0 * mz;
  // a seeded stir keeps the water alive
  fx += (vnoise(vUv*vec2(3.0,2.2) + vec2(u_time*0.05, u_seed)) - 0.5) * u_msc.y;
  fy += (vnoise(vUv*vec2(2.6,3.4) + vec2(7.7 + u_seed, u_time*0.045)) - 0.5) * u_msc.y;
  // the match's shoves
  fy += u_pa.z * blob(u_pa.xy, u_pw.x);
  fy += u_pb.z * blob(u_pb.xy, u_pw.y);
  v += vec2(fx, fy) * u_dt;
  // still water at the walls
  float wm = smoothstep(0.0, 0.05, vUv.x) * smoothstep(1.0, 0.95, vUv.x)
           * smoothstep(0.0, 0.04, vUv.y) * smoothstep(1.0, 0.96, vUv.y);
  v *= mix(0.94, 1.0, wm) * u_msc.z;
  float sp = length(v);
  if (sp > 85.0) v *= 85.0/sp;
  gl_FragColor = vec4(v, 0.0, 1.0);
}`;

const FS_DIV = `precision highp float;varying vec2 vUv;
uniform sampler2D u_vel;uniform vec2 u_px;
void main(){
  float l = texture2D(u_vel, vUv - vec2(u_px.x,0.)).x;
  float r = texture2D(u_vel, vUv + vec2(u_px.x,0.)).x;
  float b = texture2D(u_vel, vUv - vec2(0.,u_px.y)).y;
  float t = texture2D(u_vel, vUv + vec2(0.,u_px.y)).y;
  gl_FragColor = vec4((r - l + t - b) * 0.5, 0., 0., 1.);
}`;

const FS_JAC = `precision highp float;varying vec2 vUv;
uniform sampler2D u_prs, u_div;uniform vec2 u_px;
void main(){
  float l = texture2D(u_prs, vUv - vec2(u_px.x,0.)).x;
  float r = texture2D(u_prs, vUv + vec2(u_px.x,0.)).x;
  float b = texture2D(u_prs, vUv - vec2(0.,u_px.y)).x;
  float t = texture2D(u_prs, vUv + vec2(0.,u_px.y)).x;
  float dv = texture2D(u_div, vUv).x;
  gl_FragColor = vec4((l + r + b + t - dv) * 0.25, 0., 0., 1.);
}`;

const FS_GRAD = `precision highp float;varying vec2 vUv;
uniform sampler2D u_prs, u_vel;uniform vec2 u_px;
void main(){
  float l = texture2D(u_prs, vUv - vec2(u_px.x,0.)).x;
  float r = texture2D(u_prs, vUv + vec2(u_px.x,0.)).x;
  float b = texture2D(u_prs, vUv - vec2(0.,u_px.y)).x;
  float t = texture2D(u_prs, vUv + vec2(0.,u_px.y)).x;
  vec2 v = texture2D(u_vel, vUv).xy - vec2(r - l, t - b) * 0.5;
  gl_FragColor = vec4(v, 0., 1.);
}`;

// the flow map: two advected coordinate fields, re-seeded out of phase and
// crossfaded, so the fine cloud structure travels, shears and folds WITH the
// currents instead of sitting on them — liquid, not a screensaver
const FS_DINIT = `precision highp float;varying vec2 vUv;
void main(){ gl_FragColor = vec4(vUv, vUv); }`;

const FS_DET = `precision highp float;varying vec2 vUv;
uniform sampler2D u_vel, u_det;uniform vec2 u_px;uniform float u_dt;uniform vec2 u_rst;
void main(){
  vec2 v = texture2D(u_vel, vUv).xy;
  vec4 c = texture2D(u_det, vUv - v * u_dt * u_px);
  if (u_rst.x > 0.5) c.rg = vUv;
  if (u_rst.y > 0.5) c.ba = vUv;
  gl_FragColor = c;
}`;

const FS_DYE = `precision highp float;varying vec2 vUv;
uniform sampler2D u_vel, u_dye;
uniform vec2 u_px;uniform float u_dt, u_keep, u_seed, u_time, u_asp;
uniform vec2 u_srcv;       // ochre bank, celeste bank
uniform vec4 u_pa, u_pb;   // x, y, fy, ink
uniform vec2 u_pw;
${NOISE}
float blob(vec2 c, float w){
  vec2 q = (vUv - c) * vec2(u_asp, 1.0);
  return exp(-dot(q, q) / (w*w));
}
void main(){
  vec2 v = texture2D(u_vel, vUv).xy;
  vec2 d = texture2D(u_dye, vUv - v * u_dt * u_px).rg * u_keep;
  // the banks: each front is fed from its own dark — a column, not a wall
  float sxw = smoothstep(0.02, 0.24, vUv.x) * smoothstep(0.98, 0.76, vUv.x);
  float xo = (0.55 + 0.65*vnoise(vec2(vUv.x*3.1 + u_seed, u_time*0.06))) * sxw;
  float xc = (0.55 + 0.65*vnoise(vec2(vUv.x*2.7 + u_seed + 40.0, u_time*0.055))) * sxw;
  d.r += exp(-pow((vUv.y - 0.965)/0.030, 2.0)) * u_srcv.x * xo * u_dt;
  d.g += exp(-pow((vUv.y - 0.035)/0.030, 2.0)) * u_srcv.y * xc * u_dt;
  // event ink rides the shove
  float ga = blob(u_pa.xy, u_pw.x), gb = blob(u_pb.xy, u_pw.y);
  if (u_pa.w > 0.0) d.g += u_pa.w*ga*u_dt*2.0; else d.r += -u_pa.w*ga*u_dt*2.0;
  if (u_pb.w > 0.0) d.g += u_pb.w*gb*u_dt*2.0; else d.r += -u_pb.w*gb*u_dt*2.0;
  gl_FragColor = vec4(min(d, vec2(1.6)), 0., 1.);
}`;

const FS_SHOW = `precision highp float;varying vec2 vUv;
uniform sampler2D u_dye, u_det;
uniform vec2 u_dpx, u_res;
uniform float u_seed, u_gold, u_gx, u_expo, u_dwA;
${NOISE}
float dens(vec2 p){ vec2 d = texture2D(u_dye, p).rg; return d.r + d.g; }
void main(){
  float asp = u_res.x / u_res.y;
  vec2 uv = vUv;
  vec4 d0 = texture2D(u_dye, uv);
  // the mottle rides the flow map — pigment carried, stretched and folded
  // by the currents themselves; only the film grain is allowed to sit still
  vec4 cw = texture2D(u_det, uv);
  vec2 sA = cw.rg * vec2(asp, 1.0), sB = cw.ba * vec2(asp, 1.0);
  float m  = mix(fbm(sB*9.0 + u_seed),  fbm(sA*9.0 + u_seed),  u_dwA);
  float hi = mix(vnoise(sB*44.0 + u_seed), vnoise(sA*44.0 + u_seed), u_dwA);
  float lu = mix(vnoise(sB*90.0 + u_seed*3.0), vnoise(sA*90.0 + u_seed*3.0), u_dwA);
  float mo = 0.62 + 0.52*m + 0.26*(hi - 0.5);
  float mc = 0.62 + 0.52*(1.0 - m) + 0.26*(hi - 0.5);
  float od = d0.r * mo;
  float cd = d0.g * mc;
  float oD = 1.0 - exp(-od*1.25);
  float cD = 1.0 - exp(-cd*1.25);

  // one soft raking light on the density field — fronts, not plastic
  vec2 e = u_dpx;
  float gxd = dens(uv + vec2(e.x,0.)) - dens(uv - vec2(e.x,0.));
  float gyd = dens(uv + vec2(0.,e.y)) - dens(uv - vec2(0.,e.y));
  vec3 n = normalize(vec3(-gxd*3.2, -gyd*3.2, 1.0));
  vec3 L = normalize(vec3(-0.42, 0.58, 0.70));
  float diff = max(dot(n, L), 0.0);
  float spec = pow(max(2.0*n.z*dot(n,L) - L.z, 0.0), 34.0);

  // the room
  vec2 rc = (uv - vec2(0.5, 0.62)) * vec2(asp, 1.0);
  vec3 room = vec3(0.051, 0.040, 0.028) * (0.72 + 0.50*vnoise(uv*vec2(asp,1.0)*46.0));
  room *= 0.82 + 0.34*smoothstep(1.15, 0.2, length(rc));

  // the inks — desaturated pharaonic ochre, gray-blue celeste; churn muddies
  vec3 oc = mix(vec3(0.165,0.080,0.048), vec3(0.548,0.270,0.152), pow(oD, 1.5));
  vec3 cc = mix(vec3(0.058,0.118,0.176), vec3(0.442,0.630,0.768), pow(cD, 1.5));
  float aI = 1.0 - (1.0-oD)*(1.0-cD);
  vec3 pig = (oc*oD + cc*cD) / max(oD + cD, 1e-4);
  pig = mix(pig, vec3(0.148,0.098,0.080), smoothstep(0.06, 0.42, oD*cD)*0.55);
  vec3 lit = pig * (0.74 + 0.38*diff) + vec3(1.0,0.96,0.88)*spec*0.05*aI;
  lit *= 0.88 + 0.24*lu;

  // the breath of gold where the celeste breaks through
  float g = u_gold * cD * smoothstep(0.60, 0.84, uv.y)
          * exp(-pow((uv.x - u_gx)*asp/0.22, 2.0));
  lit += vec3(0.86,0.63,0.21) * min(g, 0.4) * (0.5 + 0.8*diff);

  // the currents float in the room — darkness owns the edges, no box
  float em = smoothstep(0.0, 0.17, uv.x) * smoothstep(1.0, 0.83, uv.x)
           * smoothstep(0.0, 0.10, uv.y) * smoothstep(1.0, 0.90, uv.y);
  em = pow(em, 1.2);
  vec3 col = mix(room, lit, min(aI * 1.1, 1.0) * 0.95 * em);

  col *= u_expo;
  col += (hash(gl_FragCoord.xy*0.77 + u_seed) - 0.5) * 0.022;
  col *= mix(0.88, 1.0, smoothstep(1.42, 0.45, length((uv - 0.5)*vec2(asp,1.0)*1.1)));
  gl_FragColor = vec4(col, 1.0);
}`;

/* ---------------- mount ---------------- */

let gl = null, ready = false, freeze = false;
let tau = 0, last = 0, lifeT = 0, raf = 0;
let simW = 0, simH = 0;

const F = FRAME.mount({
  num: 5, title: "Embate", subject: "Argentina vs. Egypt",
  edition: "05/31", date: "07·07·2026",
  stack: "WebGL — fluid sim, ping-pong FBOs", time: "148 minutes",
  desc: "Two ink fronts in still water — pharaonic ochre pressing from above, celeste rising to meet it — stirred on the match's own clock. Egypt's weight holds the line low for an hour; a thrust at 21' dies against it, a surge at 58' is pulled back. Then the late pressure builds until, at 90+2', the celeste finds a seam and breaks through — a breath of gold — the whistle releases, and the waters regather to clash again.",
  dark: true, open: true, onResize(w, h) {
    if (!gl) boot();
    if (!gl) return;
    alloc(w, h);
  },
});
const sfN = ART.rng(seed)() * 37;               // seed float for the shaders

/* ---------------- gl plumbing ---------------- */

let progs = {}, quad = null, halfType = 0, innerFmt = 0;
let vel, prs, div, dye, det;
const DETP = 7.0;                               // flow-map re-seed period (s)

function boot() {
  gl = F.canvas.getContext("webgl2", { antialias: false, alpha: false, depth: false, preserveDrawingBuffer: false });
  if (gl) {
    if (!gl.getExtension("EXT_color_buffer_float")) { gl = null; }
    else { halfType = gl.HALF_FLOAT; innerFmt = gl.RGBA16F; }
  }
  if (!gl) {
    gl = F.canvas.getContext("webgl", { antialias: false, alpha: false, depth: false });
    if (!gl) { console.warn("embate: webgl unavailable"); return; }
    const e1 = gl.getExtension("OES_texture_half_float");
    gl.getExtension("OES_texture_half_float_linear");
    if (!e1) { console.warn("embate: half-float unavailable"); gl = null; return; }
    halfType = e1.HALF_FLOAT_OES; innerFmt = gl.RGBA;
  }
  quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  const mk = (fs) => {
    const c = (ty, src) => {
      const s = gl.createShader(ty);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
      return s;
    };
    const p = gl.createProgram();
    gl.attachShader(p, c(gl.VERTEX_SHADER, VS));
    gl.attachShader(p, c(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
    const loc = gl.getAttribLocation(p, "a");
    const U = {}, n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
    for (let i = 0; i < n; i++) {
      const inf = gl.getActiveUniform(p, i);
      U[inf.name] = gl.getUniformLocation(p, inf.name);
    }
    return { p, loc, U };
  };
  progs = { init: mk(FS_INIT), adv: mk(FS_ADVECT), frc: mk(FS_FORCE), div: mk(FS_DIV),
            jac: mk(FS_JAC), grd: mk(FS_GRAD), dye: mk(FS_DYE), show: mk(FS_SHOW),
            dinit: mk(FS_DINIT), det: mk(FS_DET) };
}

function target(w, h) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, innerFmt, w, h, 0, gl.RGBA, halfType, null);
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  return { t, f, w, h };
}
const pair = (w, h) => ({ r: target(w, h), w: target(w, h),
  swap() { const x = this.r; this.r = this.w; this.w = x; } });

function run(pr, dst, set) {
  gl.useProgram(pr.p);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst ? dst.f : null);
  gl.viewport(0, 0, dst ? dst.w : F.canvas.width, dst ? dst.h : F.canvas.height);
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.enableVertexAttribArray(pr.loc);
  gl.vertexAttribPointer(pr.loc, 2, gl.FLOAT, false, 0, 0);
  set(pr.U);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}
function bindT(unit, tex) {
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, tex.t);
  return unit;
}

function alloc(w, h) {
  simH = 384;
  simW = Math.max(128, Math.min(480, Math.round(simH * (w / h))));
  vel = pair(simW, simH); prs = pair(simW, simH);
  div = target(simW, simH); dye = pair(simW, simH); det = pair(simW, simH);
  for (const tg of [vel.r, vel.w, prs.r, prs.w, div]) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, tg.f);
    gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
  }
  run(progs.init, dye.r, (U) => gl.uniform1f(U.u_seed, sfN));
  run(progs.dinit, det.r, () => {});
  tau = 0; lifeT = 0; last = 0;
  ready = true;
  if (RM) { still(); return; }
  if (!raf) raf = requestAnimationFrame(frame);
}

/* ---------------- the tick: one step of the collision ---------------- */

function tick(dt, t) {
  const C = chor(t);
  const px = [1 / simW, 1 / simH];
  const asp = simW / simH;
  const velKeep = Math.exp(-(0.50 + 1.6 * C.rel) * dt);
  const dyeKeep = Math.exp(-(0.085 + 0.34 * C.rel) * dt);
  const pa = C.pulses[0], pb = C.pulses[1];

  run(progs.adv, vel.w, (U) => {
    gl.uniform1i(U.u_vel, bindT(0, vel.r)); gl.uniform1i(U.u_src, bindT(1, vel.r));
    gl.uniform2f(U.u_px, px[0], px[1]); gl.uniform1f(U.u_dt, dt); gl.uniform1f(U.u_diss, 1.0);
  }); vel.swap();

  run(progs.frc, vel.w, (U) => {
    gl.uniform1i(U.u_vel, bindT(0, vel.r)); gl.uniform1i(U.u_dye, bindT(1, dye.r));
    gl.uniform1f(U.u_dt, dt); gl.uniform1f(U.u_seed, sfN);
    gl.uniform1f(U.u_time, lifeT); gl.uniform1f(U.u_asp, asp);
    gl.uniform4f(U.u_drv, C.da, C.de, C.eta, C.sh);
    gl.uniform3f(U.u_msc, C.kline, C.noise, velKeep);
    gl.uniform4f(U.u_pa, pa.x, pa.y, pa.fy, pa.ink);
    gl.uniform4f(U.u_pb, pb.x, pb.y, pb.fy, pb.ink);
    gl.uniform2f(U.u_pw, pa.w, pb.w);
  }); vel.swap();

  run(progs.div, div, (U) => {
    gl.uniform1i(U.u_vel, bindT(0, vel.r));
    gl.uniform2f(U.u_px, px[0], px[1]);
  });
  for (let i = 0; i < 14; i++) {
    run(progs.jac, prs.w, (U) => {
      gl.uniform1i(U.u_prs, bindT(0, prs.r)); gl.uniform1i(U.u_div, bindT(1, div));
      gl.uniform2f(U.u_px, px[0], px[1]);
    }); prs.swap();
  }
  run(progs.grd, vel.w, (U) => {
    gl.uniform1i(U.u_prs, bindT(0, prs.r)); gl.uniform1i(U.u_vel, bindT(1, vel.r));
    gl.uniform2f(U.u_px, px[0], px[1]);
  }); vel.swap();

  // carry the flow map; re-seed each layer on its own beat
  const rA = Math.floor((lifeT + dt) / DETP) > Math.floor(lifeT / DETP) ? 1 : 0;
  const rB = Math.floor((lifeT + dt) / DETP + 0.5) > Math.floor(lifeT / DETP + 0.5) ? 1 : 0;
  run(progs.det, det.w, (U) => {
    gl.uniform1i(U.u_vel, bindT(0, vel.r)); gl.uniform1i(U.u_det, bindT(1, det.r));
    gl.uniform2f(U.u_px, px[0], px[1]);
    gl.uniform1f(U.u_dt, dt); gl.uniform2f(U.u_rst, rA, rB);
  }); det.swap();

  run(progs.dye, dye.w, (U) => {
    gl.uniform1i(U.u_vel, bindT(0, vel.r)); gl.uniform1i(U.u_dye, bindT(1, dye.r));
    gl.uniform2f(U.u_px, px[0], px[1]);
    gl.uniform1f(U.u_dt, dt); gl.uniform1f(U.u_keep, dyeKeep);
    gl.uniform1f(U.u_seed, sfN); gl.uniform1f(U.u_time, lifeT); gl.uniform1f(U.u_asp, asp);
    gl.uniform2f(U.u_srcv, C.srcO, C.srcC);
    gl.uniform4f(U.u_pa, pa.x, pa.y, pa.fy, pa.ink);
    gl.uniform4f(U.u_pb, pb.x, pb.y, pb.fy, pb.ink);
    gl.uniform2f(U.u_pw, pa.w, pb.w);
  }); dye.swap();

  lifeT += dt;
}

function draw(t, expo) {
  const C = chor(t);
  const dwA = 1 - Math.abs(2 * ((lifeT / DETP) % 1) - 1);   // layer A weight
  run(progs.show, null, (U) => {
    gl.uniform1i(U.u_dye, bindT(0, dye.r));
    gl.uniform1i(U.u_det, bindT(1, det.r));
    gl.uniform2f(U.u_dpx, 1 / simW, 1 / simH);
    gl.uniform2f(U.u_res, F.canvas.width, F.canvas.height);
    gl.uniform1f(U.u_seed, sfN); gl.uniform1f(U.u_dwA, dwA);
    gl.uniform1f(U.u_gold, C.gold); gl.uniform1f(U.u_gx, gxBreak);
    gl.uniform1f(U.u_expo, expo);
  });
}

/* ---------------- the loop: no seam, ever ---------------- */

let accDt = 0, frameN = 0;
function frame(now) {
  raf = requestAnimationFrame(frame);
  if (!ready || freeze || document.hidden) { last = now; return; }
  if (!last) last = now;
  const dt = Math.min(0.045, Math.max(0.006, (now - last) / 1000));
  last = now;
  tau = (tau + dt) % T;
  accDt += dt;
  frameN++;
  // the sim ticks at half the display rate — invisible, and the loop
  // runs forever, so every frame is on a budget
  if (frameN & 1) { tick(Math.min(accDt, 0.075), tau); accDt = 0; }
  draw(tau, Math.min(1, lifeT / 2.2));           // the light comes up once
}

// reduced motion: settle straight into the breakthrough and hold it —
// chunked across frames (a quick fade-in, never a blocked main thread)
function still() {
  const plan = [];
  for (let i = 0; i < 130; i++) plan.push([1 / 36, tm(86)]);
  for (let i = 0; i < 55; i++) plan.push([1 / 36, tBreak + (i / 55) * 1.5]);
  let k = 0;
  const step = () => {
    const n = Math.min(12, plan.length - k);
    for (let i = 0; i < n; i++, k++) tick(plan[k][0], plan[k][1]);
    draw(tBreak + 0.95, Math.min(1, (k / plan.length) * 1.25));
    if (k < plan.length) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}
</script>
</body>
