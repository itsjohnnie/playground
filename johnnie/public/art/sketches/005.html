<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-005.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;
uniform sampler2D u_map;

// 005 — sello — the remontada set as a compositor's forme and proofed on
// cotton rag. A sheet of handmade paper on dark felt; the locked-up type
// presses the whole page blind into the fibres (a true height field under
// one raking light), then the ink arrives in match order — so the page
// goes wrong before it goes right. The ninety minutes are ninety sorts in
// six lines of fifteen, extra leading at half-time, then the stoppage
// line: twelve smaller sorts, the line the whistle cut short. Goals stand
// type-high and take their team's ink — Egypt's red ochre lands first;
// the 21' sort stands type-high but never takes ink (the penalty Shobeir
// saved); the 58' sort gets only a starved, broken film (the goal VAR
// withdrew); the four late bookings are gilt rules through their sorts in
// the last line. A small sol de mayo survives as the printer's head-piece,
// and the score line may only be inked after 90+2. Pressed once, inked
// once, then it rests. Match constants (#defines) come from data-005.js.

const float TAU = 6.28318530718;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 3; i++){ s += a*vnoise(p); p = p*2.03 + 11.7; a *= 0.5; }
  return s;
}
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }
float band(float d, float w, float aa){ return smoothstep(w + aa, w - aa, abs(d)); }
float rsdf(vec2 p, vec2 b, float r){
  vec2 d = abs(p) - b + r;
  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;
}

// each printed element inks in at its minute of the match
float cue(float m){ return ease((u_p - (0.50 + m/MINS*0.30)) / 0.07); }
float goalMin(int i){ return i==0 ? G0 : i==1 ? G1 : i==2 ? G2 : i==3 ? G3 : G4; }
vec2 mapUV(vec2 u){ return vec2((u.x + 0.35)/0.70, (0.45 - u.y)/0.90); }

// the forme: returns (blind deboss depth, celeste ink, ochre ink, gold ink)
vec4 plate(vec2 u, float aa){
  float press = ease((u_p - 0.14) / 0.28);
  vec4 o = vec4(0.0);

  // the pressed lettering (baked type — R carries the whole strike)
  o.x = max(o.x, texture2D(u_map, mapUV(u)).r * 0.92);

  // the sol de mayo, reduced to the printer's head-piece ornament
  {
    vec2 v = u - vec2(0.0, ORNY);
    float r = length(v);
    if (r < 0.030){
      float phi = atan(v.x, v.y);
      float face = smoothstep(aa, -aa, r - 0.0095);
      float t16 = phi/TAU*16.0;
      float i16 = floor(t16 + 0.5);
      float fr = abs(t16 - i16);
      float L = mix(0.0245, 0.0195, mod(i16, 2.0));
      float wu = 0.20 * clamp((L - r) / (L - 0.0115), 0.0, 1.0);
      float ray = smoothstep(aa, -aa, (fr - wu) * (TAU/16.0) * max(r, 1e-3))
                * smoothstep(0.0115 - aa, 0.0115 + aa, r)
                * smoothstep(L, L - 0.0015, r);
      float sun = max(face, ray);
      o.x = max(o.x, sun);
      o.w = max(o.w, sun * ease((u_p - 0.875) / 0.11));
    }
  }

  // the forme — ninety minute-sorts in six lines of fifteen, extra leading
  // at half-time, then the stoppage line: twelve smaller sorts, the line
  // the whistle cut short. Quads press low (furniture); events stand
  // type-high.
  {
    float col = floor((u.x - FX0) / GX);
    float yy = FTOP - u.y;
    float gap = step(3.0*GY, yy) * (1.0 - step(3.0*GY + HTG, yy));
    if (yy >= 3.0*GY + HTG) yy -= HTG;
    float row = floor(yy / GY);
    float maxCol = row > 5.5 ? 11.0 : 14.0;
    if (gap < 0.5 && yy >= 0.0 && row >= 0.0 && row <= 6.0 && col >= 0.0 && col <= maxCol){
      float m = row < 5.5 ? row*15.0 + col + 1.0 : 91.0 + col;
      float h = row < 5.5 ? BH : BHC;
      // hand-set: every sort sits a hair off its socket, at its own height
      float jx = (hash(vec2(col*1.7 + 3.1, row*2.3 + 1.4)) - 0.5) * 0.0022;
      float jy = (hash(vec2(row*5.1 + 0.7, col*3.9 + 2.2)) - 0.5) * 0.0022;
      vec2 bp = vec2(u.x - (FX0 + (col + 0.5)*GX) - jx, yy - row*GY - h*0.5 - jy);
      float sdb = rsdf(bp, vec2(BW*0.5, h*0.5), 0.0022);
      float mq = smoothstep(aa, -aa, sdb);           // the sort's body
      float mf = smoothstep(aa, -aa, sdb + 0.0024);  // its face, for the ink
      float depth = 0.26 + 0.18 * hash(vec2(m*1.3 + 0.4, 5.9));

      for (int i = 0; i < 5; i++){
        if (abs(m - goalMin(i)) < 0.5){
          depth = 1.0;                               // a goal stands type-high
          float c = mf * cue(goalMin(i));
          if (ISARG(i)) o.y = max(o.y, c); else o.z = max(o.z, c);
        }
      }
      if (abs(m - PEN) < 0.5) depth = 1.0;     // set type-high, never inked
      if (abs(m - GHOST) < 0.5) depth = 1.0;   // its starved ink lands in main
      for (int i = 0; i < 4; i++){
        float cm = i == 0 ? C0 : i == 1 ? C1 : i == 2 ? C2 : C3;
        if (abs(m - cm) < 0.5){                // a booking — gilt rule through the sort
          float hl = band(bp.x, 0.0011, aa)
                   * smoothstep(h*0.5 + 0.0085, h*0.5 + 0.006, abs(bp.y));
          o.x = max(o.x, hl * 0.85);
          o.w = max(o.w, hl * cue(cm));
        }
      }
      o.x = max(o.x, mq * depth);
    }
  }

  // the score row — five bullets in goal order: ochre, ochre, then celeste
  for (int i = 0; i < 5; i++){
    vec2 sp = vec2((float(i) - 2.0) * 0.036, -0.245);
    float sr = length(u - sp);
    float m = smoothstep(aa, -aa, sr - 0.0075);
    o.x = max(o.x, m);
    float c = m * cue(goalMin(i));
    if (ISARG(i)) o.y = max(o.y, c); else o.z = max(o.z, c);
  }

  o.x *= press;
  return o;
}

// the sheet, with deckled edges
float sheetSD(vec2 u){
  float sd = rsdf(u, vec2(0.315, 0.425), 0.010);
  sd += (fbm(u*34.0 + 5.7) - 0.5) * 0.009;
  return sd;
}

// the surface: felt board, paper thickness, cockle, the deboss, tooth
float heightAt(vec2 u, float aa){
  float sd = sheetSD(u);
  float sm = smoothstep(0.002, -0.002, sd);
  float d = plate(u, aa).x;
  float h = sm * 0.0050;
  h += sm * (fbm(u*7.0 + 2.3) - 0.5) * 0.0042;
  h += sm * (fbm(u*26.0 + 9.1) - 0.5) * 0.0013;
  h -= sm * d * 0.0036;
  h += (vnoise(u*480.0) - 0.5) * 0.00034 * mix(0.55, 1.0, sm) * (1.0 - d*0.7);
  h += (vnoise(u*150.0 + 3.3) - 0.5) * 0.00016 * sm * (1.0 - d*0.7);
  return h;
}

vec3 inkLayer(vec3 base, float m, vec3 deep, float mot){
  float solid = smoothstep(0.50, 0.78, m);
  float rim = smoothstep(0.10, 0.45, m) * (1.0 - smoothstep(0.60, 0.95, m));
  float a = clamp(solid * (0.72 + 0.28*mot) + rim * 0.85, 0.0, 1.0);
  return base * mix(vec3(1.0), deep * mix(1.0, 0.70, rim), a);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  // on tall phones the sheet composes smaller — an object on the felt
  float sc = 0.75 * (1.0 + 0.22 * smoothstep(0.75, 0.45, aspect));
  sc = max(sc, 0.88 * aspect);
  vec2 q = vec2(p.x * sc, (p.y - 0.5) * sc / max(aspect, 0.001) + 0.5);
  float px = sc / u_res.x;
  float aa = px * 0.9;

  // the sheet sits a hair off true — placed by hand
  float rot = (hash(vec2(3.1, 7.7)) - 0.5) * 0.035;
  vec2 uc = q - vec2(sc * 0.5, 0.5);
  float cs = cos(rot), sn = sin(rot);
  vec2 u = vec2(uc.x*cs + uc.y*sn, -uc.x*sn + uc.y*cs);

  // dark felt board
  vec3 col = vec3(0.094, 0.079, 0.067) * (0.80 + 0.42*fbm(q*70.0));
  col *= 0.92 + 0.20 * (1.0 - length(p - vec2(0.34, 0.76)));

  // the shadow the sheet throws
  float ssd = rsdf(u - vec2(0.011, -0.013), vec2(0.315, 0.425), 0.010);
  col *= 1.0 - ((1.0 - smoothstep(0.0, 0.05, ssd)) * 0.45 + (1.0 - smoothstep(0.0, 0.012, ssd)) * 0.25);

  // surface normal from the true height field
  float eps = px * 1.4;
  float h0 = heightAt(u, aa);
  float hx = heightAt(u + vec2(eps, 0.0), aa);
  float hy = heightAt(u + vec2(0.0, eps), aa);
  vec3 n = normalize(vec3(-(hx - h0)/eps * 1.15, -(hy - h0)/eps * 1.15, 1.0));

  float sd = sheetSD(u);
  float sm = smoothstep(0.002, -0.002, sd);
  vec4 pl = plate(u, aa);

  // cotton rag
  vec3 paper = vec3(0.936, 0.906, 0.842);
  paper *= 0.972 + 0.048 * fbm(u*20.0 + 1.2);
  paper *= 0.988 + 0.024 * vnoise(u*300.0);
  vec3 base = mix(col, paper, sm);
  base *= 1.0 - 0.10 * pl.x * sm;             // fibres crushed in the valley

  // one raking light, upper left
  vec3 Ldir = normalize(vec3(-0.48, 0.60, 0.64));
  float diff = max(dot(n, Ldir), 0.0);
  float specBase = max(2.0 * n.z * dot(n, Ldir) - Ldir.z, 0.0);
  vec3 lit = base * (0.36 + 0.82 * diff) * vec3(1.015, 1.0, 0.97);
  lit += pow(specBase, 20.0) * 0.10 * (0.25 + 0.75 * pl.x) * sm;   // pressed fibres shine

  // the ink rides the forme — only a hair of slur, never off its socket
  vec2 mis = (vec2(hash(vec2(1.3, 9.2)), hash(vec2(8.4, 2.6))) - 0.5) * 0.0012;
  vec4 ink = plate(u + mis, max(aa, 0.0020));
  float mot = clamp(0.78 + 0.30 * fbm(u*95.0 + 4.4), 0.0, 1.0);
  lit = inkLayer(lit, ink.y * sm, vec3(0.196, 0.455, 0.641), mot);        // celeste
  lit = inkLayer(lit, ink.z * sm, vec3(0.575, 0.235, 0.115), mot);        // red ochre

  // the pressed lettering takes its iron-black by cue: the fixed lines
  // right after the strike, the score line only once it has come true
  vec3 tk = texture2D(u_map, mapUV(u + mis)).rgb;
  float tA = max(tk.g * ease((u_p - 0.44) / 0.08),
                 tk.b * ease((u_p - 0.845) / 0.08));
  lit = inkLayer(lit, tA * sm, vec3(0.262, 0.240, 0.203), mot);

  // the VAR ghost — a starved, broken film of ochre on the 58' sort
  {
    vec2 gp = (u + mis * 1.8) - vec2(GHX, GHY);
    float gsd = rsdf(gp, vec2(BW*0.5 - 0.0012, BH*0.5 - 0.0012), 0.002);
    float hm = smoothstep(0.0022, -0.0022, gsd);
    float film = smoothstep(0.30, 0.80, fbm(u*150.0 + 8.2));
    lit = mix(lit, lit * vec3(0.62, 0.34, 0.23), hm * sm * cue(GHOST) * (0.14 + 0.40*film));
  }

  float aG = smoothstep(0.45, 0.75, ink.w * sm);
  vec3 gold = vec3(0.833, 0.647, 0.204) * (0.35 + 0.90 * diff)
            + vec3(1.0, 0.92, 0.70) * pow(specBase, 34.0) * 0.9;
  lit = mix(lit, gold * (0.94 + 0.10 * mot), aG * 0.94);

  // the light comes up, the photograph settles
  lit *= mix(0.30, 1.0, ease(u_p / 0.16));
  lit += (hash(gl_FragCoord.xy * 0.83) - 0.5) * 0.020;
  float vig = smoothstep(1.30, 0.45, length(p - vec2(0.5, 0.5)));
  lit *= mix(0.90, 1.0, vig);

  gl_FragColor = vec4(lit, 1.0);
}
</script>
<script>
// 005 · sello — Argentina 3–2 Egypt, the remontada, proofed as a
// compositor's forme in letterpress. The forme's match constants and grid
// geometry are generated from data-005.js and injected as #defines, so the
// data file drives the type. The lettering is baked once with Canvas 2D
// (Geist Sans) into a small texture: R = the blind strike, G = the fixed
// lines (inked just after the press), B = the score line (inked only after
// 90+2, when it has come true). Settles once over ~9s — press, then ink in
// match order — and the rAF loop stops.

const seed = ART.seed("2026-07-07-005");
const M = window.M5;

// the forme's geometry: six lines of fifteen sorts + the stoppage line
const FX0 = -0.25, GX = 0.5 / 15, FTOP = 0.27, GY = 0.068, HTG = 0.022;
const BW = 0.024, BH = 0.050, BHC = 0.034, ORNY = 0.386;
const sortX = (m) => FX0 + (((m - 1) % 15) + 0.5) * GX;
const sortY = (m) => {
  const row = Math.floor((m - 1) / 15);
  return FTOP - (row * GY + (row >= 3 ? HTG : 0)) - BH / 2;
};

// data → the forme
const MINS = M.totalMin;
const gm = M.disallowed[0].min;
const defs =
  "#define MINS " + MINS.toFixed(1) + "\n" +
  M.goals.map((g, i) => "#define G" + i + " " + g.min.toFixed(1)).join("\n") + "\n" +
  "#define ISARG(i) (" +
    M.goals.map((g, i) => (g.team === "arg" ? "i==" + i : null)).filter(Boolean).join("||") + ")\n" +
  "#define PEN " + M.penaltyMissed.min.toFixed(1) + "\n" +
  "#define GHOST " + gm.toFixed(1) + "\n" +
  M.cards.map((c, i) => "#define C" + i + " " + c.min.toFixed(1)).join("\n") + "\n" +
  "#define FX0 (" + FX0.toFixed(5) + ")\n" +
  "#define GX " + GX.toFixed(5) + "\n" +
  "#define FTOP " + FTOP.toFixed(5) + "\n" +
  "#define GY " + GY.toFixed(5) + "\n" +
  "#define HTG " + HTG.toFixed(5) + "\n" +
  "#define BW " + BW.toFixed(5) + "\n" +
  "#define BH " + BH.toFixed(5) + "\n" +
  "#define BHC " + BHC.toFixed(5) + "\n" +
  "#define ORNY " + ORNY.toFixed(5) + "\n" +
  "#define GHX " + sortX(gm).toFixed(5) + "\n" +
  "#define GHY " + sortY(gm).toFixed(5) + "\n";

let sh = null, gl = null, tex = null, done = false, start = null, fontsOK = false;

const F = FRAME.mount({
  num: 5, title: "Sello", subject: "Argentina vs. Egypt",
  edition: "05/31", date: "07·07·2026",
  stack: "WebGL — GLSL + baked type", time: "128 minutes",
  desc: "Letterpress on cotton rag — the match set as a compositor's forme: ninety minute-sorts in six lines of fifteen, leading at half-time, then the stoppage line the whistle cut at twelve. Inked in match order, the page goes wrong before it goes right — Egypt's ochre lands first, the 21' sort stands type-high but never inked (the penalty), the 58' sort is starved (the goal VAR withdrew), and three celeste crowd the final line and a half. The score is set only after 90+2.",
  dark: true, onResize() {
    if (!sh) {
      sh = ART.shader(F.canvas, defs + document.getElementById("frag").textContent, ["u_p", "u_map"]);
      gl = sh.gl;
      tex = gl.createTexture();
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
                    new Uint8Array([0, 0, 0, 255]));
      gl.uniform1i(sh.extra.u_map, 0);
    }
    bake();
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;
const DUR = RM ? 500 : 9000;

/* ---- the type, baked in sheet space: u ∈ [-0.35, 0.35] × [-0.45, 0.45].
   R = every letter's blind deboss; G = the fixed lines; B = the score
   line, which the page may only ink after the comeback is complete. ---- */
const tcv = document.createElement("canvas");
function bake() {
  if (!gl) return;
  const TW = Math.min(1152, Math.max(512, Math.round(F.W * 0.9)));
  const TH = Math.round(TW * (0.90 / 0.70));
  tcv.width = TW; tcv.height = TH;
  const x = tcv.getContext("2d");
  x.fillStyle = "#000"; x.fillRect(0, 0, TW, TH);
  x.globalCompositeOperation = "lighter";
  const Y = (sy) => ((0.45 - sy) / 0.90) * TH;
  function line(text, sy, size, col) {
    let fpx = (size / 0.70) * TW;
    const set = (v) => {
      if ("letterSpacing" in x) x.letterSpacing = (v * 0.15).toFixed(1) + "px";
      x.font = "600 " + v.toFixed(1) + "px 'Geist', ui-sans-serif, system-ui, sans-serif";
      x.textAlign = "center"; x.textBaseline = "middle";
    };
    set(fpx);
    const maxW = (0.485 / 0.70) * TW;
    const w = x.measureText(text).width;
    if (w > maxW) { fpx *= maxW / w; set(fpx); }
    x.fillStyle = col;
    // a soft shoulder under a crisp strike — the press, not a print-out
    x.save();
    x.filter = "blur(" + (TW * 0.0016).toFixed(1) + "px)";
    x.globalAlpha = 0.85;
    x.fillText(text, TW / 2, Y(sy));
    x.restore();
    x.filter = "none";
    x.fillText(text, TW / 2, Y(sy));
  }
  line("MUNDIAL 2026 · OCTAVOS DE FINAL", 0.335, 0.0170, "rgb(255,255,0)");
  line("ARGENTINA 3 – EGIPTO 2", -0.295, 0.0205, "rgb(255,0,255)");
  line("ATLANTA · 07·07·2026", -0.333, 0.0160, "rgb(255,255,0)");
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tcv);
}

// re-strike the type once the real face arrives (usually mid-press)
Promise.race([
  document.fonts.load('600 32px "Geist"'),
  new Promise((r) => setTimeout(r, 1600)),
]).then(() => {
  fontsOK = true;
  if (!sh) return;
  bake();
  if (done) { gl.uniform1f(sh.extra.u_p, 1); sh.draw(0, sf); }
});

// pressed once, inked once (~9s), then it rests — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / DUR);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
