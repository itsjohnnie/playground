<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<canvas id="c"></canvas>
<script src="../art.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed;

// 003 · misregistration — two riso ink layers of warped stripes printed
// slightly off-register. The moiré is the drawing.

float hash(float n){ return fract(sin(n*127.1 + u_seed*311.7)*43758.5453); }

vec2 rot(vec2 p, float a){
  float c = cos(a), s = sin(a);
  return vec2(c*p.x - s*p.y, s*p.x + c*p.y);
}

// one ink layer: stripes bent by stacked sines
float layer(vec2 uv, float phase, float freq, float ang){
  vec2 p = rot(uv, ang);
  float warp =
      0.22*sin(p.y*2.1 + phase)
    + 0.11*sin(p.y*4.7 - phase*0.7 + 2.0)
    + 0.05*sin(p.y*9.3 + phase*1.3);
  float s = sin((p.x + warp)*freq);
  return smoothstep(0.0, 0.25, s);   // fat soft stripes
}

void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - u_res) / min(u_res.x, u_res.y);
  float t = u_time*0.12;

  float a1 = (hash(1.0)-0.5)*0.5;
  float a2 = a1 + 0.04 + hash(2.0)*0.06;      // nearly parallel → moiré
  float f  = 28.0 + hash(3.0)*18.0;

  float L1 = layer(uv, t, f, a1);
  // second pass drifts off-register, like a misfed sheet
  vec2 off = vec2(sin(t*0.43)*0.012, cos(t*0.31)*0.012);
  float L2 = layer(uv + off, t*1.07 + 3.0, f*1.015, a2);

  // riso: multiply translucent inks on paper
  vec3 paper = vec3(0.965, 0.949, 0.912);
  vec3 blue  = vec3(0.145, 0.259, 0.725);     // riso blue
  vec3 pink  = vec3(0.968, 0.220, 0.478);     // fluorescent pink
  vec3 col = paper;
  col *= mix(vec3(1.0), blue, L1*0.85);
  col *= mix(vec3(1.0), pink, L2*0.80);

  // ink starvation near edges + grain
  float vig = smoothstep(1.75, 0.6, length(uv));
  col = mix(paper, col, mix(0.85, 1.0, vig));
  float g = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)))*43758.5453);
  col += (g-0.5)*0.04;

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
  const seed = ART.seed("2026-07-06-003");
  const canvas = ART.fit(document.getElementById("c"));
  const sh = ART.shader(canvas, document.getElementById("frag").textContent);
  const sf = ART.rng(seed)() * 100;
  (function loop(t) {
    sh.draw(t / 1000, sf);
    requestAnimationFrame(loop);
  })(0);
  ART.chrome({ n: "003", title: "misregistration", date: "2026-07-06" });
</script>
