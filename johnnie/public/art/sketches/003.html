<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-003.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;
uniform vec4 u_team; uniform float u_snap;

// 003 — resonancia — a chladni plate sings the match (jordan 1–3 argentina,
// mundial 2026 grupo j, dallas, 27·06 — data in data-003.js). The dark steel
// plate IS the whole slot, edge to edge (bleed): fine sand migrates to the
// nodal lines of rectangular-plate modes cos(nπx/a)·cos(mπy/b), mixed in
// pairs the way near-degenerate resonances superpose on a real plate. The
// drive sweeps four resonances, one per goal in minute order — lo celso 19',
// lautaro 31' (penalty: no slow retune, the tone lands as ONE hard strike),
// al-tamari 55' (jordan's answer, its sand inked a desaturated kit-red),
// messi 80' — sand agitated while the tone moves, locking crisp when it
// lands. Every finished mode leaves ~8% of its figure behind, and grains
// drift a touch denser toward the rim, as on a real plate. A small driver
// post holds the center clear. u_team flags each mode's scorer (1 =
// argentina/celeste), u_snap is the transition that snaps (the penalty);
// both are derived from window.M3 at mount. Arrives once over 10s, rests.

const float PI = 3.14159265358979;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }

float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1.,0.)), f.x),
             mix(hash(i+vec2(0.,1.)), hash(i+vec2(1.,1.)), f.x), f.y);
}

// rectangular-plate chladni pair — x,y normalized to the plate's own edges
// [-1,1], so the figure composes across the full rectangle. s mixes the
// companion mode (−1: antisymmetric pair, +1: symmetric pair).
float chl(vec2 pc, float n, float m, float s){
  return cos(n*PI*pc.x)*cos(m*PI*pc.y) + s*cos(m*PI*pc.x)*cos(n*PI*pc.y);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  vec2 pc = p*2.0 - 1.0;                     // the plate is the slot

  // ---- the drive: four modes, 2.5s each, smooth crossfades — except the
  // penalty's arrival (segment u_snap), which lands as one hard snap ----
  float m4 = clamp(u_p*4.0 - 0.5, 0.0, 3.0);
  float mi = floor(min(m4, 2.999));
  float mf = m4 - mi;
  float snap = 1.0 - step(0.5, abs(mi - u_snap));
  float cf = smoothstep(mix(0.25, 0.46, snap), mix(0.75, 0.54, snap), mf);
  float ms = mi + cf;                        // plateau-crossfade mode position
  float agit = cf*(1.0-cf)*4.0;              // crossfade derivative → agitation

  float w0 = clamp(1.0-abs(ms-0.0), 0.0, 1.0);
  float w1 = clamp(1.0-abs(ms-1.0), 0.0, 1.0);
  float w2 = clamp(1.0-abs(ms-2.0), 0.0, 1.0);
  float w3 = clamp(1.0-abs(ms-3.0), 0.0, 1.0);

  // ---- sand as grains: one cell ≈ one grain ----
  float cell = max(1.25, u_res.x/430.0);
  vec2 id = floor(gl_FragCoord.xy / cell);
  float shake = step(0.05, agit);
  float h0 = hash(id + vec2(3.1, 17.0));
  vec2 jid = id + shake*floor(u_time*16.0 + h0*6.0)*vec2(3.0, 17.0);
  float h1 = hash(jid);
  float h2 = hash(jid + vec2(19.3, 7.7));

  // evaluate the field at the grain's cell center → whole grains, not gradients
  vec2 pcc = ((id + 0.5)*cell)/u_res*2.0 - 1.0;
  // per-grain positional jitter while the plate is being retuned
  vec2 pj = pcc + (vec2(h1, h2) - 0.5) * 0.055 * agit;

  // the symmetric pairs are amplified — (1,4) ×1.6, (3,5) ×2.1: their fields
  // are shallow, and unscaled they flood the plate instead of drawing thin
  // nodal ridges. minute order: 19' → 31' (pen) → 55' (jor) → 80'.
  float A = w0*chl(pj,2.,3.,-1.) + w1*1.6*chl(pj,1.,4., 1.)
          + w2*chl(pj,3.,4.,-1.) + w3*2.1*chl(pj,3.,5., 1.);

  float sandIn = smoothstep(0.0, 0.06, u_p);
  float th = 0.30 + 0.26*agit;               // sand spreads while agitated
  float dens = pow(smoothstep(th, 0.0, abs(A)), 1.35);

  // sand drifts a touch denser toward the borders, like a real plate's rim
  float bord = max(abs(pcc.x), abs(pcc.y));
  float rimAcc = smoothstep(0.86, 1.0, bord);
  dens = min(1.0, dens*(1.0 + 0.22*rimAcc));

  // rounded grain footprint inside the cell
  float shape = smoothstep(0.56, 0.30, length(fract(gl_FragCoord.xy/cell) - 0.5));

  float grain = step(1.0 - dens*0.92*sandIn, h1) * (0.55 + 0.45*h2);

  // stray grains scattered in the low-|A| basins, plus a sparse rim drift
  float basin = smoothstep(1.15, 0.15, abs(A));
  float h3 = hash(id + vec2(57.0, 3.1));
  float stray = step(1.0 - (0.05*basin + 0.024*rimAcc)*sandIn, h3) * (0.30 + 0.40*h2);

  // sand in flight while the tone changes
  float h4 = hash(jid + vec2(101.0, 47.0));
  float flight = agit * 0.55 * step(0.962, h4);

  // ghost residue — each finished mode leaves ~8% of its figure
  float r0 = smoothstep(0.80, 1.05, ms);
  float r1 = smoothstep(1.80, 2.05, ms);
  float r2 = smoothstep(2.80, 3.00, ms);
  float resDens =
      r0*smoothstep(0.16, 0.0, abs(chl(pcc,2.,3.,-1.)))
    + r1*smoothstep(0.16, 0.0, abs(1.6*chl(pcc,1.,4., 1.)))
    + r2*smoothstep(0.16, 0.0, abs(chl(pcc,3.,4.,-1.)));
  float h5 = hash(id + vec2(211.0, 5.0));
  float resg = step(1.0 - clamp(resDens, 0.0, 1.0)*0.085, h5) * (0.35 + 0.30*h2);

  float sand = clamp(grain + stray + resg + flight, 0.0, 1.0) * shape;

  // the driver post at the plate's center keeps its footprint clear
  float dpix = length(gl_FragCoord.xy - 0.5*u_res);
  float postR = 0.012*min(u_res.x, u_res.y);
  sand *= smoothstep(postR*0.95, postR*1.55, dpix);

  // ---- materials: the whole surface is the plate ----
  float lit = 1.0 - 0.42*smoothstep(0.15, 1.85, length(pc - vec2(-0.18, 0.30)));
  float brush = vnoise(vec2(pc.y*230.0, pc.x*7.0));       // brushed along x
  float patina = vnoise(pc*3.1 + 7.0);                    // faint mottling
  vec3 col = vec3(0.052, 0.055, 0.062) * (0.55 + 0.95*lit)
           + (brush - 0.5) * 0.022
           + (patina - 0.5) * 0.012;

  // the driver post: a darker machined disc, one lit arc
  float post = smoothstep(postR + 1.5, postR - 1.5, dpix);
  col = mix(col, vec3(0.040, 0.042, 0.048)*(0.7 + 0.6*lit), post);
  float postRim = smoothstep(1.6, 0.0, abs(dpix - postR));
  float litDir = 0.40 + 0.60*clamp(0.5 + 0.55*pc.y - 0.20*pc.x, 0.0, 1.0);
  col = mix(col, vec3(0.30, 0.31, 0.34)*litDir, postRim*0.55);

  // sand: warm bone with a hint of gold; celeste in argentina's three modes,
  // and jordan's answer inked a desaturated kit-red — never cartoon
  vec4 wv = vec4(w0, w1, w2, w3);
  float wArg = dot(wv, u_team);
  float wJor = dot(wv, 1.0 - u_team);
  vec3 sandc = vec3(0.905, 0.865, 0.760);
  sandc = mix(sandc, vec3(0.700, 0.855, 0.950), wArg*0.22);
  sandc = mix(sandc, vec3(0.660, 0.340, 0.290), wJor*0.30);
  sandc *= 0.82 + 0.22*lit;
  col = mix(col, sandc, sand);

  // grain + a mild breathing of light toward the corners (never dead)
  float g2 = hash(gl_FragCoord.xy*0.7);
  col += (g2 - 0.5)*0.028;
  float vig = smoothstep(1.55, 0.35, length(p - vec2(0.5)));
  col *= mix(0.86, 1.0, vig);

  // open: the plate falls off into the room's darkness at its borders —
  // no box, the steel floats on the page ground (#0d0a07)
  float dEdge = min(min(p.x, 1.0 - p.x), min(p.y, 1.0 - p.y));
  col = mix(vec3(0.051, 0.039, 0.027), col, smoothstep(0.0, 0.11, dEdge));

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-06-27-003");
let sh = null, done = false, start = null;

// the match, from data-003.js: goals in minute order drive the four modes
const goals = window.M3.goals.slice().sort((a, b) => a.min - b.min);

const F = FRAME.mount({
  num: 3, title: "Resonancia", subject: "Jordan vs. Argentina",
  edition: "03/31", date: "27·06·2026",
  stack: "WebGL — GLSL", time: "84 minutes",
  desc: "Fine sand on a dark steel plate, driven through four Chladni resonances — one per goal, 19′ to 80′. Rectangular-plate modes span the surface edge to edge; the penalty lands as a single hard strike, Jordan's answer at 55′ inks its figure a quiet kit-red among the celeste, and each locked mode leaves its residue of grains under the one that rests holding the match.",
  bleed: true, open: true,
  dark: true, onResize() {
    if (!sh) {
      sh = ART.shader(F.canvas, document.getElementById("frag").textContent,
        ["u_p", "u_team", "u_snap"]);
      // per-mode scorer (1 = argentina) and the snapping transition (into
      // the penalty mode) — derived from the match data, not hardcoded
      const t = goals.map((g) => (g.team === "arg" ? 1 : 0));
      sh.gl.uniform4f(sh.extra.u_team, t[0], t[1], t[2], t[3]);
      sh.gl.uniform1f(sh.extra.u_snap, goals.findIndex((g) => g.pen) - 1);
    }
    done = false;          // re-render after resize
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// the drive sweeps once (10s), locks the fourth figure, then the plate rests
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
