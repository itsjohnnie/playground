<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<canvas id="c"></canvas>
<script src="../art.js"></script>
<script>
// 007 · taffy — video feedback in software: every frame the canvas is
// redrawn into itself, slightly rotated and zoomed, while three lights
// orbit. Color gets pulled like sugar.

const seed = ART.seed("2026-07-06-007");
const R = ART.rng(seed);
const canvas = ART.fit(document.getElementById("c"), init);
const ctx = canvas.getContext("2d");
let buf, bctx;

const zoom = 1.004 + R() * 0.006;
const spin = (R() - 0.5) * 0.012;
const orbs = [];
for (let i = 0; i < 3; i++) {
  orbs.push({
    f: 0.05 + R() * 0.12,
    ph: R() * Math.PI * 2,
    rad: 0.18 + R() * 0.25,
    hue: R() * 360,
    size: 0.02 + R() * 0.035,
  });
}

function init(W, H) {
  buf = document.createElement("canvas");
  buf.width = W; buf.height = H;
  bctx = buf.getContext("2d");
  ctx.fillStyle = "#050508";
  ctx.fillRect(0, 0, W, H);
}

function draw(tms) {
  const t = tms / 1000;
  const W = canvas.width, H = canvas.height;
  const m = Math.min(W, H);

  // copy current frame, then paint it back transformed — the feedback loop
  bctx.clearRect(0, 0, W, H);
  bctx.drawImage(canvas, 0, 0);

  ctx.globalAlpha = 0.985;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.translate(W / 2, H / 2);
  ctx.rotate(spin);
  ctx.scale(zoom, zoom);
  ctx.translate(-W / 2, -H / 2);
  ctx.drawImage(buf, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;

  // slow dimming so it never blows out
  ctx.fillStyle = "rgba(5,5,8,0.06)";
  ctx.fillRect(0, 0, W, H);

  // the sources: three soft orbiting lights
  ctx.globalCompositeOperation = "lighter";
  for (const o of orbs) {
    const a = t * o.f * Math.PI * 2 + o.ph;
    const x = W / 2 + Math.cos(a) * o.rad * m * (1 + 0.3 * Math.sin(t * 0.21 + o.ph));
    const y = H / 2 + Math.sin(a * 1.31) * o.rad * m;
    const r = o.size * m;
    const hue = (o.hue + t * 14) % 360;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `hsla(${hue}, 90%, 65%, 0.55)`);
    g.addColorStop(1, `hsla(${hue}, 90%, 65%, 0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = "source-over";
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
ART.chrome({ n: "007", title: "taffy", date: "2026-07-06", dark: true });
</script>
