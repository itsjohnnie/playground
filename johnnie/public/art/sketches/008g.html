<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — g · pileta — a miami hotel pool at night, shot from above. Two
// layers of caustic filaments over the depth gradient; the pool floor's
// tile grid wobbles under the same refraction. Five standing ripple
// rings sit at the goal minutes on an invisible 120' clock — argentina's
// bleach the light toward white, cabo verde's tint it rose; the 111'
// own goal rings twice. NOTE: this piece deliberately never freezes —
// after the 10s settle the loop idles at ~12% time so the water still
// breathes (frozen water reads as wrong).

const float TAU = 6.28318530718;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

// classic iterated caustic field — filament webs, tileable
float caus(vec2 uv, float t){
  vec2 k = mod(uv*TAU, TAU) - 250.0;
  vec2 i = k;
  float c = 1.0;
  const float inten = 0.005;
  for (int n = 0; n < 5; n++){
    float tt = t * (1.0 - 3.5/float(n + 1));
    i = k + vec2(cos(tt - i.x) + sin(tt + i.y), sin(tt - i.y) + cos(tt + i.x));
    c += 1.0/length(vec2(k.x/(sin(i.x + tt)/inten), k.y/(cos(i.y + tt)/inten)));
  }
  c /= 5.0;
  c = 1.17 - pow(c, 1.4);
  return pow(abs(c), 8.0);
}

// minute 0 at the top of an invisible clock, clockwise
vec2 clockPos(float minute){
  float a = minute/120.0*TAU;
  return vec2(0.375, 0.5) + 0.240*vec2(sin(a), cos(a));
}

void ring(vec2 q, float minute, float order, float dbl, float team,
          inout vec2 disp, inout float gA, inout float gC){
  float e = ease((u_p*10.0 - 0.8 - order*1.30)/3.0);
  if (e <= 0.001) return;
  vec2 c = clockPos(minute);
  float d = length(q - c);
  float R = 0.050*e;
  float w = 0.011;
  float env = exp(-pow((d - R)/w, 2.0));
  if (dbl > 0.5) env = max(env, 0.8*exp(-pow((d - R + 0.017)/w, 2.0)));
  disp += (q - c)/max(d, 1e-4) * env * sin(d*170.0) * 0.010 * e;
  gA += env*e*team;
  gC += env*e*(1.0 - team);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 q = vec2(p.x*0.75, (p.y-0.5)*0.75/max(aspect,0.001) + 0.5);
  float t = u_time;

  // five standing rings — 29' 92' 111' argentina, 59' 103' cabo verde
  vec2 disp = vec2(0.0); float gA = 0.0, gC = 0.0;
  ring(q,  29.0, 0.0, 0.0, 1.0, disp, gA, gC);
  ring(q,  59.0, 1.0, 0.0, 0.0, disp, gA, gC);
  ring(q,  92.0, 2.0, 0.0, 1.0, disp, gA, gC);
  ring(q, 103.0, 3.0, 0.0, 0.0, disp, gA, gC);
  ring(q, 111.0, 4.0, 1.0, 1.0, disp, gA, gC);

  vec2 qd = q + disp;
  vec2 so = vec2(u_seed*0.013, u_seed*0.007);

  // two caustic layers, different scale and drift
  float c1 = caus(qd*1.8 + so, t*0.60);
  float c2 = caus(qd*3.3 + so.yx*3.0 + 1.7, 2.0 - t*0.43);
  float ca = c1*0.80 + c2*0.42;
  ca = ca/(1.0 + 0.45*ca);                    // soft shoulder — night, not noon

  // depth: shallow celeste top-left → deep bottom-right
  float diag = smoothstep(0.0, 1.0, clamp((p.x + (1.0 - p.y))*0.60, 0.0, 1.0));
  vec3 col = mix(vec3(0.227, 0.498, 0.682), vec3(0.039, 0.125, 0.200), diag);
  col *= 0.82;                                 // the pool sits in the dark

  // pool-floor tiles, refracted by the same water
  vec2 tuv = q + disp*1.6
           + vec2(sin(q.y*36.0 + t*0.7), sin(q.x*31.0 - t*0.6))*0.0045;
  vec2 tf = abs(fract(tuv/0.085) - 0.5);
  float tl = smoothstep(0.42, 0.485, max(tf.x, tf.y));
  col *= 1.0 - tl * 0.14 * mix(1.0, 0.30, diag) * (0.50 + 0.50*clamp(ca, 0.0, 1.0));

  // the light
  col += vec3(0.72, 0.90, 1.0) * ca * 0.62 * mix(1.05, 0.45, diag) * (1.0 + gA*1.6);
  col += vec3(1.00, 0.99, 0.95) * gA * (0.08 + ca*0.50);            // argentina → white
  col  = mix(col, vec3(0.82, 0.44, 0.42), clamp(gC, 0.0, 1.0)*0.26); // cabo verde → rose
  col += vec3(0.95, 0.62, 0.52) * gC * ca * 0.40;
  col += (gA + gC) * 0.035;                                          // the ridge itself

  // one gold sun-glint across the upper water, barely there —
  // it lives only in the caustic filaments, like low sun on ripples
  {
    vec2 gc = q - vec2(0.38, 0.84);
    vec2 gd = normalize(vec2(0.97, -0.24));
    float gu = dot(gc, gd), gv = dot(gc, vec2(-gd.y, gd.x));
    float glint = exp(-gv*gv/0.0004) * exp(-gu*gu/0.040);
    col += vec3(0.96, 0.74, 0.34) * glint * (0.04 + 0.55*ca);
  }

  // grain + vignette
  float gn = hash(gl_FragCoord.xy*0.7);
  col += (gn - 0.5)*0.025;
  float vig = smoothstep(1.35, 0.45, length(p - vec2(0.5)));
  col *= mix(0.78, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008g");
const M = window.M8;
let sh = null, start = null, last = null, wt = 0;

const F = FRAME.mount({
  n: "008", v: "g", title: "pileta", date: "06·07·2026",
  data: M.frameData, tech: "glsl · caustics",
  dark: true,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
  },
});
const sf = ART.rng(seed)() * 100;
const ss = (a, b, x) => { const t = Math.min(1, Math.max(0, (x - a) / (b - a))); return t*t*(3 - 2*t); };

// settles for 10s, then idles at ~12% time — the water must keep breathing,
// so unlike the other settle pieces the rAF loop never stops (intentional)
function loop(tms) {
  requestAnimationFrame(loop);
  if (!sh) return;
  if (start === null) { start = tms; last = tms; }
  const p = Math.min(1, (tms - start) / 10000);
  const dt = Math.min(0.05, (tms - last) / 1000); last = tms;
  wt += dt * (1.0 - 0.88 * ss(0.85, 1.0, p));
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(wt, sf);
}
requestAnimationFrame(loop);
</script>
