<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — g · aerosol — one confident spray stroke on black. The ring is
// the match: it draws itself once around the clock (0'→120', from the
// top), celeste for argentina's 64% of the ball, fluorescent rose for
// cabo verde's 36%. The five goals hit the ring as heavier bursts at
// their minute; the 111' own goal drips. Grain everywhere. When the
// stroke completes, the poster is finished — it does not loop.

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }

float bayer2(vec2 a){ a = floor(a); return fract(a.x/2.0 + a.y*a.y*0.75); }
float bayer4(vec2 a){ return bayer2(0.5*a)*0.25 + bayer2(a); }
float bayer8(vec2 a){ return bayer4(0.5*a)*0.25 + bayer2(a); }

float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

// angle around the ring, 0..1 from the top, clockwise — the match clock
float clockAngle(vec2 v){
  return fract((atan(v.x, v.y)) / 6.28318530718 + 1.0);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  // width-anchored design space: x∈[0,0.75], y extends on taller screens
  vec2 q = vec2(p.x * 0.75, (p.y - 0.5) * 0.75 / max(aspect, 0.001) + 0.5);
  float t10 = u_p * 10.0;

  vec3 col = vec3(0.020, 0.019, 0.027);      // night

  vec2 c = vec2(0.365, 0.565);
  float R = 0.240;
  vec2 v = q - c;
  float d = length(v);
  float a = clockAngle(v);                    // minute/120 at this angle

  // the stroke draws itself around the clock over 7 beats
  float sweep = ease(t10 / 7.0);
  float lead = smoothstep(a - 0.035, a + 0.005, sweep);

  // spray body: tight bright pass over a wide soft halo
  float ring = abs(d - R);
  float core = exp(-ring*ring / (0.0011));
  float halo = exp(-ring*ring / (0.012));

  // aerosol speckle — the paint is particles, not airbrush
  float n1 = hash(gl_FragCoord.xy * 0.51);
  float n2 = hash(gl_FragCoord.xy * 0.13 + 7.0);
  core *= mix(0.55, 1.0, n1);
  halo *= step(n2, halo * 1.9) * mix(0.35, 1.0, n1);

  // possession splits the stroke: 64% celeste, then fluorescent rose
  vec3 celeste = vec3(0.47, 0.76, 0.94);
  vec3 rosa    = vec3(0.99, 0.20, 0.49);
  // 64% celeste, then rose — folding back to celeste at the top so the
  // stroke closes on itself without a seam
  float band = smoothstep(0.615, 0.665, a) * (1.0 - smoothstep(0.945, 0.995, a));
  vec3 ink = mix(celeste, rosa, band);

  float dens = (core * 0.9 + halo * 0.55) * lead;

  // five goals strike the ring at their minute — heavier bursts
  for (int i = 0; i < 5; i++){
    float gm   = i==0 ? 29.0 : i==1 ? 59.0 : i==2 ? 92.0 : i==3 ? 103.0 : 111.0;
    float isA  = (i==0 || i==2 || i==4) ? 1.0 : 0.0;   // arg goals (incl. og)
    float ga = gm / 120.0;
    vec2 bp = c + vec2(sin(ga*6.28318), cos(ga*6.28318)) * R;
    float bd = length(q - bp);
    float s = ease((t10 - ga*7.0 - 0.15) / 0.9);
    float burst = exp(-bd*bd / 0.0028) * s;
    burst *= mix(0.45, 1.0, n1);
    vec3 bink = mix(rosa, celeste, isA);
    // the burst overwhelms the stroke locally
    ink = mix(ink, bink, clamp(burst*1.6, 0.0, 1.0));
    dens += burst * 1.15;
  }

  // the 111' own goal drips — gravity finishing the story
  {
    float ga = 111.0 / 120.0;
    vec2 dp = c + vec2(sin(ga*6.28318), cos(ga*6.28318)) * R;
    float dripS = ease((t10 - 7.6) / 2.4);
    float len = 0.34 * dripS;
    float below = dp.y - q.y;                 // positive under the burst
    float wob = (hash(vec2(floor(q.y*140.0), 3.3)) - 0.5) * 0.004;
    float dx = abs(q.x - dp.x - wob);
    float w = mix(0.011, 0.0035, clamp(below/max(len,1e-4), 0.0, 1.0));
    float drip = step(dx, w) * step(0.0, below) * step(below, len);
    drip *= mix(0.5, 1.0, n1) * smoothstep(len, len*0.15, below*0.3);
    float bead = exp(-(pow(q.x-dp.x, 2.0) + pow(q.y-(dp.y-len), 2.0)) / 0.00006) * dripS;
    dens += (drip * 0.8 + bead * 1.2) * step(0.01, dripS);
    ink = mix(ink, celeste, clamp((drip + bead)*1.2, 0.0, 1.0));
  }

  // whiten the hottest paint, then lay it on the night
  vec3 paint = mix(ink, vec3(1.0), clamp(dens - 0.85, 0.0, 0.6));
  col += paint * clamp(dens, 0.0, 1.35);

  // ambient fog the spray leaves in the air
  col += rosa * exp(-d*d / 0.16) * 0.045 * sweep;

  // print pass: dither + grain + vignette
  float cell = max(2.0, floor(u_res.y / 380.0));
  float th = bayer8(gl_FragCoord.xy / cell) - 0.5;
  float levels = 7.0;
  col = floor(col * levels + 0.5 + th * 0.8) / levels;
  col += (hash(gl_FragCoord.xy * 0.77) - 0.5) * 0.035;
  float vig = smoothstep(1.45, 0.5, length(p - vec2(0.5, 0.5)));
  col *= mix(0.82, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008g");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  n: "008", v: "g", title: "aerosol", date: "06·07·2026",
  data: M.frameData, tech: "glsl · spray grain",
  dark: true,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// sprayed once (10s), then the poster is finished — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
