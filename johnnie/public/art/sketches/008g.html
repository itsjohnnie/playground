<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script>
// 008 — g · mosaico — the match as a broken-tile mosaic, the kind set
// into buenos aires sidewalks. One great circle read like a clock:
// 0' at the top, each glazed shard coloured by who held the game at
// that minute (possession blended with phase xG — the same flow as the
// other studies). Five gold shards burn at the goal angles; the own
// goal is an unglazed one. Assembled ring by ring from the centre,
// then the grout dries and it stays.

const seed = ART.seed("2026-07-06-008g");
const R = ART.rng(seed);
const M = window.M8;

let W, H, DPR, shards = [], grain, done = false, start = null;
const F = FRAME.mount({
  n: "008", v: "g", title: "mosaico", date: "06·07·2026",
  data: M.frameData, tech: "canvas · glazed shards",
  dark: false,
  onResize(w, h, dpr) {
    W = w; H = h; DPR = dpr;
    build();
    done = false; start = null;
    requestAnimationFrame(loop);
  },
});
const ctx = F.canvas.getContext("2d");

// minute → argentina share (possession + phase-xG blend)
function flow(min) {
  const pts = [[22.5, 0], [67.5, 1], [105, 2]].map(([m, i]) => ({
    m, f: 0.64 * 0.68 + (M.xgPhase.arg[i] / (M.xgPhase.arg[i] + M.xgPhase.cpv[i])) * 0.32,
  }));
  if (min <= pts[0].m) return pts[0].f;
  if (min >= pts[2].m) return pts[2].f;
  const i = min < pts[1].m ? 0 : 1;
  const t = (min - pts[i].m) / (pts[i + 1].m - pts[i].m);
  return pts[i].f + (pts[i + 1].f - pts[i].f) * (t * t * (3 - 2 * t));
}

const TILE = {
  celes: ["#7fb3d5", "#5f97c0", "#a9c8dd", "#4a7ba6"],
  rojos: ["#c34a38", "#a63a2a", "#d9705c", "#8e3325"],
  gold: "#d9a72e",
  bone: "#e6ddc6",
  coal: "#2b241d",
};

function build() {
  shards = [];
  const u = Math.min(W, H * 0.75);
  const cx = W / 2, cyy = H / 2 - u * 0.02;
  const R0 = u * 0.062;                 // rosette radius
  const R1 = u * 0.435;                 // outer radius
  const RINGS = 7;
  const Rt = ART.rng(seed + "shards");

  // centre rosette — bone & coal
  for (let s = 0; s < 10; s++) {
    const a0 = (s / 10) * Math.PI * 2, a1 = ((s + 1) / 10) * Math.PI * 2;
    shards.push(mkShard(cx, cyy, u * 0.012, R0 - u * 0.004, a0, a1, s % 2 ? TILE.bone : TILE.coal, 0, Rt));
  }

  for (let r = 0; r < RINGS; r++) {
    const rIn = R0 + (r / RINGS) * (R1 - R0);
    const rOut = R0 + ((r + 1) / RINGS) * (R1 - R0);
    const count = Math.round(10 + r * 5.5);
    let a = Rt() * 0.4;
    for (let s = 0; s < count; s++) {
      const span = (Math.PI * 2) / count;
      const a0 = a + s * span + (Rt() - 0.5) * span * 0.22;
      const a1 = a + (s + 1) * span - (Rt() - 0.5) * span * 0.10;
      const mid = (a0 + a1) / 2;
      // the clock: minute 0 at the top, clockwise
      const minute = ((mid + Math.PI / 2) / (Math.PI * 2) % 1 + 1) % 1 * 120;

      let col = null, unglazed = false;
      // goal shards: gold at the five angles (outer three rings only)
      for (const g of M.goals) {
        if (r >= RINGS - 3 && Math.abs(minute - g.min) < 2.4) {
          col = TILE.gold;
          unglazed = !!g.og;
        }
      }
      if (!col) {
        const argy = Rt() < flow(minute);   // shard by possession share
        const set = argy ? TILE.celes : TILE.rojos;
        col = set[(Rt() * set.length) | 0];
        // bone breathing room scattered through the field
        if (Rt() < 0.07) col = TILE.bone;
      }
      shards.push(mkShard(cx, cyy, rIn, rOut, a0, a1, col, 0.6 + r * 0.85, Rt, unglazed));
    }
  }

  // a few strays past the rim, like the sidewalk crew ran out of circle
  for (let i = 0; i < 26; i++) {
    const a = Rt() * Math.PI * 2;
    const rr = R1 + u * (0.02 + Rt() * 0.05);
    shards.push(mkShard(cx, cyy, rr, rr + u * (0.018 + Rt() * 0.02),
      a, a + 0.10 + Rt() * 0.12,
      Rt() < 0.5 ? TILE.bone : (Rt() < 0.64 ? TILE.celes[0] : TILE.rojos[0]),
      7.2 + Rt() * 1.4, Rt));
  }

  grain = document.createElement("canvas");
  grain.width = W; grain.height = H;
  const g = grain.getContext("2d");
  const img = g.createImageData(W, H);
  const Rg = ART.rng(seed + "grain");
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 114 + Rg() * 26 | 0;
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = 20;
  }
  g.putImageData(img, 0, 0);
}

// one glazed shard: an irregular polar quad, inset for grout
function mkShard(cx, cyy, rIn, rOut, a0, a1, col, delay, Rt, unglazed) {
  const gap = 0.012;                          // grout, in radians-ish
  const j = () => (Rt() - 0.5) * (rOut - rIn) * 0.16;
  const pts = [
    [a0 + gap, rIn + Math.abs(j())], [a1 - gap, rIn + Math.abs(j())],
    [a1 - gap + (Rt() - 0.5) * 0.02, rOut - Math.abs(j())],
    [a0 + gap + (Rt() - 0.5) * 0.02, rOut - Math.abs(j())],
  ].map(([a, r]) => [cx + Math.cos(a) * r, cyy + Math.sin(a) * r]);
  return {
    pts, col, delay, unglazed,
    hx: (Rt() - 0.5) * 0.5 + 0.3,             // highlight offset
    hy: (Rt() - 0.5) * 0.5 - 0.3,
    tone: 0.92 + Rt() * 0.16,
  };
}

const easeOut = (t) => 1 - Math.pow(1 - Math.max(0, Math.min(1, t)), 3);

function drawShard(sh, s) {
  if (s <= 0) return;
  const pts = sh.pts;
  const mx = (pts[0][0] + pts[2][0]) / 2, my = (pts[0][1] + pts[2][1]) / 2;

  ctx.save();
  ctx.translate(mx, my);
  ctx.scale(0.7 + 0.3 * s, 0.7 + 0.3 * s);
  ctx.rotate((1 - s) * 0.2);
  ctx.translate(-mx, -my);
  ctx.globalAlpha = Math.min(1, s * 2);

  ctx.beginPath();
  pts.forEach(([x, y], i) => (i ? ctx.lineTo(x, y) : ctx.moveTo(x, y)));
  ctx.closePath();

  // tile body
  ctx.fillStyle = sh.col;
  ctx.save();
  ctx.globalAlpha *= sh.tone > 1 ? 1 : sh.tone;
  ctx.fill();
  ctx.restore();

  // bevel shade at the lower edge
  ctx.strokeStyle = "rgba(30,22,14,0.30)";
  ctx.lineWidth = 1.4 * DPR;
  ctx.stroke();

  if (!sh.unglazed) {
    // glaze: a soft window-light highlight
    const r = Math.hypot(pts[2][0] - pts[0][0], pts[2][1] - pts[0][1]) * 0.5;
    const gx = mx + sh.hx * r, gy = my + sh.hy * r;
    const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, r * 1.1);
    gr.addColorStop(0, "rgba(255,252,240,0.42)");
    gr.addColorStop(0.5, "rgba(255,252,240,0.08)");
    gr.addColorStop(1, "rgba(255,252,240,0)");
    ctx.fillStyle = gr;
    ctx.fill();
  } else {
    // the own goal: matte, dusty
    ctx.fillStyle = "rgba(60,50,34,0.25)";
    ctx.fill();
  }
  ctx.restore();
}

function loop(tms) {
  if (done) return;
  if (start === null) start = tms;
  const t10 = Math.min(10, (tms - start) / 1000);

  // plaster
  const g0 = ctx.createLinearGradient(0, 0, 0, H);
  g0.addColorStop(0, "#ddd4c2");
  g0.addColorStop(1, "#cfc5b0");
  ctx.fillStyle = g0;
  ctx.fillRect(0, 0, W, H);

  for (const sh of shards) drawShard(sh, easeOut((t10 - sh.delay) / 1.3));

  ctx.globalCompositeOperation = "multiply";
  ctx.drawImage(grain, 0, 0);
  ctx.globalCompositeOperation = "source-over";

  if (t10 >= 10) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
