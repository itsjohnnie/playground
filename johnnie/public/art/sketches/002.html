<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-002.js"></script>
<script>
// 002 — sismógrafo — Argentina 2–0 Austria as a seismograph record.
// Light on dark (johnnie, seventh pass: "remove it from the canvas — light
// content on dark background"): the paper sheet is gone; the record floats
// directly on the room's darkness. 96 plotter lines, one per minute, 1'
// (top) to 90+6' (bottom). Energy per minute = per-half xG density
// (M2.xgPhase) + gaussian spikes at shot minutes (pinned where the
// commentary gives them, remainder seeded) + mountains at the two goals.
// Argentina shakes the LEFT half of each line, Austria the RIGHT; ink
// weight follows possession (54–46) as trace alpha. The 9' missed penalty
// is a marked early tremor; the 76' and 90+2' bookings cut BELOW the
// baseline as a sharp zigzag — everything else in the match rises,
// discipline digs down. The record ends on its deepest spike: Messi at
// 90+5', his 18th World Cup goal, inked in gold on the final line.
// Plotter truth kept: baseline drift down the roll, ragged pen-down
// margins, ink pooling where the pen turns hard, a heavier pen on event
// lines. Finishing is a whisper of film grain fading out around the block —
// no rectangle anywhere. Draws itself once (~11 s), then the rAF loop stops.

const seed = ART.seed("2026-06-22-002");
const N = ART.makeNoise(seed);
const M = window.M2;
// —— the inks: two palettes, one switch. Sismógrafo follows the system
//    scheme (johnnie: light content on dark, "the other way around for
//    light mode"). dark = luminous bone traces directly on the room
//    (ground null → transparent, the room shows through); light = the
//    mirror, near-ink traces on a neutral paper ground. `fill` is what
//    each trace lays under itself to occlude the mountains above it.
//    Nothing below this block knows the polarity.
const PALETTES = {
  dark:  { ground: null,      fill: "#0d0a07", bone: "242,236,225",
           celeste: "#8fc6ea", gold: "#e9b32a" },   // accents lifted for dark
  light: { ground: "#ecebe8", fill: "#ecebe8", bone: "23,21,17",
           celeste: "#2b6a99", gold: "#a97b12" },   // deep inks for paper
};
let DARK, ROOM, GROUND, CELESTE, GOLD, INK;
const mqLight = matchMedia("(prefers-color-scheme: light)");
function applyScheme() {
  DARK = !mqLight.matches; // dark is the house default
  const P = PALETTES[DARK ? "dark" : "light"];
  GROUND = P.ground; ROOM = P.fill; CELESTE = P.celeste; GOLD = P.gold;
  INK = "rgba(" + P.bone + ",";
}
applyScheme();
// a scheme flip re-inks the settled record in place — never replays the
// arrival (build() redraws the lines already on the roll, then renders)
mqLight.addEventListener("change", () => { applyScheme(); if (lines) build(); });
// the record clerk's hand: Geist Sans, all caps, gently tracked
const FONT = (px) => "500 " + px + "px 'Geist', ui-sans-serif, system-ui, sans-serif";
const TRACK = "0.05em";
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;
const TOTAL = M.totalMin; // 96

let W, H, DPR, S, T0, B0, X0, X1, fs, lines, grain, off, offCtx;
let px, py, pw, ph;
let drawn = 0, settled = false, start;

const F = FRAME.mount({
  num: 2, title: "Sismógrafo", subject: "Argentina vs. Austria",
  edition: "02/31", date: "22·06·2026",
  stack: "Canvas 2D", time: "48 minutes",
  desc: "A plotter’s seismogram of the match, one tremor per minute from kickoff to the sixth minute of stoppage: amplitude is intensity, ink weight is possession, and the two bookings cut below the line at 76’ and 90+2’. The record ends on its deepest spike — Messi at 90+5’, his eighteenth World Cup goal, more than anyone has ever scored.",
  open: true, dark: true,
  onResize(w, h, dpr) { W = w; H = h; DPR = dpr; build(); },
});
const ctx = F.canvas.getContext("2d");

const mm = (m) => (m > 90 ? "90+" + (m - 90) : m) + "’";
const ss = (a, b, v) => {
  const t = Math.min(1, Math.max(0, (v - a) / (b - a)));
  return t * t * (3 - 2 * t);
};

function build() {
  // the record block — the same footprint the paper strip used to hold,
  // now floating unframed on the ground
  ph = 0.955 * H;
  pw = Math.min(0.94 * W, 0.66 * ph);
  ph = Math.min(ph, pw / 0.55);
  px = (W - pw) / 2; py = (H - ph) / 2 + 0.004 * H;
  // the trace block sits dead-center on the sheet — symmetric margins;
  // the annotations hang balanced either side
  X0 = px + 0.19 * pw; X1 = px + 0.81 * pw;
  T0 = py + 0.108 * ph; B0 = py + 0.948 * ph;
  S = (B0 - T0) / (TOTAL - 1);
  fs = Math.min(11.5 * DPR, Math.max(0.022 * pw, 7.5 * DPR));

  // shot ticks: pinned real minutes + seeded remainder within exact counts
  const Rt = ART.rng(seed + "ticks");
  const spans = [[1, 45], [46, TOTAL]];
  const ticks = { arg: [], aut: [] };
  for (const team of ["arg", "aut"]) {
    const seeded = [];
    M.shotsPhase[team].forEach((count, pi) => {
      const [a, b] = spans[pi];
      const pinned = M.shotMinutes[team].filter((s) => s.min >= a && s.min <= b);
      for (let i = 0; i < count - pinned.length; i++)
        seeded.push({ min: a + 1.5 + Rt() * (b - a - 3), on: false });
    });
    const need = M.onTarget[team] - M.shotMinutes[team].filter((s) => s.on).length;
    seeded.forEach((s, i) => { if (i < need) s.on = true; });
    ticks[team] = M.shotMinutes[team].concat(seeded);
  }

  const plen = [45, TOTAL - 45];
  const dens = {}; let dmax = 0;
  for (const tm of ["arg", "aut"]) {
    dens[tm] = M.xgPhase[tm].map((x, i) => x / plen[i]);
    dmax = Math.max(dmax, ...dens[tm]);
  }
  const phaseOf = (m) => (m <= 45 ? 0 : 1);

  // energy at minute m for one team: xG simmer + shot spikes + penalty +
  // goal mountains (the record goal kept separate — it carries the gold)
  function amp(team, m) {
    let a = (dens[team][phaseOf(m)] / dmax) * 0.8;
    for (const s of ticks[team]) {
      const d = m - s.min;
      a += (s.on ? 2.0 : 1.0) * Math.exp(-d * d / (2 * 0.55 * 0.55));
    }
    if (M.penalty.team === team) {
      const d = m - M.penalty.min;
      a += 2.3 * Math.exp(-d * d / (2 * 0.6 * 0.6));
    }
    let g1 = 0, g2 = 0;
    for (const go of M.goals) if (go.team === team) {
      const d = m - (go.exact || go.min);
      if (go.record) g2 += 10.8 * Math.exp(-d * d / (2 * 1.3 * 1.3));
      else g1 += 6.8 * Math.exp(-d * d / (2 * 1.05 * 1.05));
    }
    return { a: Math.min(a + g1 + g2, 11.8) * S, g1: g1 * S, g2: g2 * S };
  }

  const tri = (x) => 4 * Math.abs((x % 1 + 1) % 1 - 0.5) - 1;

  lines = [];
  const nS = 240;
  for (let i = 0; i < TOTAL; i++) {
    const m = i + 1;
    // baseline drift: the roll feeds unevenly down the page
    const y0 = T0 + i * S + 0.55 * S * N.noise2(3.7, i * 0.083);
    const Rl = ART.rng(seed + "line" + i);
    const xj = (Rl() - 0.5) * 0.014 * pw; // ragged pen-down margin
    const A = amp("arg", m), C = amp("aut", m);
    const cardsHere = M.cards.filter((c) => c.min === m);
    const goal = M.goals.find((g) => g.min === m);
    const heavy = m === 45 || m === 90;
    const event = !!(goal || cardsHere.length || m === M.penalty.min);
    const pts = [];
    for (let j = 0; j < nS; j++) {
      const u = j / (nS - 1), x = X0 + xj + u * (X1 - X0);
      const taper = ss(0, 0.05, u) * ss(1, 0.95, u);
      const winA = Math.exp(-(((u - 0.27) / 0.17) ** 2));
      const winC = Math.exp(-(((u - 0.73) / 0.17) ** 2));
      const shape = 0.3 + 0.7 * (0.5 + 0.5 * N.fbm2(u * 11 + i * 0.61, i * 3.17, 3));
      const hf = N.noise2(u * 70, i * 9.3);
      const main = (A.a * winA + C.a * winC) * shape * taper * (1 + 0.25 * hf);
      const gT1 = A.g1 * winA * shape * taper;
      const gT2 = A.g2 * winA * shape * taper;
      const tremor = 0.10 * S * N.noise2(u * 90 + i * 4.4, i * 17.7);
      const wob = 0.22 * S * N.noise2(u * 1.6 + i * 0.05, i * 0.29);
      let y = y0 - (main + tremor + wob);
      // booking signature: a sharp zigzag that cuts BELOW the baseline
      for (const c of cardsHere) {
        const uc = c.team === "arg" ? 0.30 : 0.70;
        const env = Math.exp(-(((u - uc) / 0.052) ** 2)) * taper;
        y += env * S * (0.62 * tri(u * 40 + i * 0.7) + 0.16);
      }
      let tint = null;
      if (gT2 > 2.3 * S) tint = GOLD;
      else if (gT1 > 2.3 * S) tint = CELESTE;
      pts.push({ x, y, tint });
    }

    // ink pooling: peaks, hard direction changes, the deepest booking dip
    const pools = [];
    for (let j = 2; j < nS - 2; j++) {
      if (y0 - pts[j].y > 2.4 * S &&
          pts[j].y < pts[j - 1].y && pts[j].y <= pts[j + 1].y &&
          pts[j].y < pts[j - 2].y && pts[j].y < pts[j + 2].y)
        pools.push({ x: pts[j].x, y: pts[j].y, r: 1.35 * DPR, tint: pts[j].tint });
    }
    for (let j = 3; j < nS - 3; j++) {
      const c = Math.abs(pts[j - 2].y - 2 * pts[j].y + pts[j + 2].y);
      if (c > 1.35 * S && Rl() < 0.16 && pools.length < 7)
        pools.push({ x: pts[j].x, y: pts[j].y, r: (1.0 + 0.7 * Rl()) * DPR, tint: pts[j].tint });
    }
    if (cardsHere.length) {
      let dj = 0;
      for (let j = 0; j < nS; j++) if (pts[j].y > pts[dj].y) dj = j;
      if (pts[dj].y > y0 + 0.25 * S)
        pools.push({ x: pts[dj].x, y: pts[dj].y, r: 1.55 * DPR, tint: null });
    }

    // margin annotations, the record clerk's hand
    const labs = [];
    if (goal) labs.push({
      left: true, l1: mm(goal.min), l2: goal.player + " · " + goal.nth + "º",
      col: goal.record ? GOLD : CELESTE,
    });
    if (m === M.penalty.min)
      labs.push({ left: true, single: true, l1: mm(m) + " penal", col: INK + "0.55)" });
    // the right-margin twin of the 76' altercation carries the surname
    // only — the minute lives with its left twin on the same line
    for (const c of cardsHere)
      labs.push({ left: c.team === "arg", single: true,
                  l1: c.team === "arg" ? mm(c.min) + " " + c.player : c.player,
                  col: INK + "0.62)" });
    if (heavy) labs.push({ left: false, single: true, l1: mm(m), col: INK + "0.38)" });

    lines.push({ y: y0, pts, pools, heavy, event, labs });
  }

  off = document.createElement("canvas");
  off.width = W; off.height = H;
  offCtx = off.getContext("2d");
  stamp(offCtx);
  for (let k = 0; k < Math.min(drawn, TOTAL); k++) drawLine(offCtx, k, 1);

  grain = document.createElement("canvas");
  grain.width = W; grain.height = H;
  const g = grain.getContext("2d");
  const img = g.createImageData(W, H);
  const Rg = ART.rng(seed + "grain");
  if (DARK) {
    // dark room: a whisper of light film grain, drawn over the record —
    // masked below so it breathes out to nothing well before any edge
    for (let i = 0; i < img.data.length; i += 4) {
      const v = 200 + Rg() * 55 | 0;
      img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
      img.data[i + 3] = Rg() * 14;
    }
  } else {
    // paper ground: the old dark grain, multiplied over the full sheet
    for (let i = 0; i < img.data.length; i += 4) {
      const v = 118 + Rg() * 20 | 0;
      img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
      img.data[i + 3] = 24;
    }
  }
  g.putImageData(img, 0, 0);
  if (DARK) {
    // elliptical fade around the trace block — nothing boxy survives
    g.globalCompositeOperation = "destination-in";
    g.save();
    g.translate(W / 2, H / 2);
    g.scale(pw * 0.9, ph * 0.66);
    const mg = g.createRadialGradient(0, 0, 0, 0, 0, 1);
    mg.addColorStop(0, "rgba(0,0,0,1)");
    mg.addColorStop(0.55, "rgba(0,0,0,0.8)");
    mg.addColorStop(1, "rgba(0,0,0,0)");
    g.fillStyle = mg;
    g.fillRect(-1, -1, 2, 2);
    g.restore();
    g.globalCompositeOperation = "source-over";
  }

  if (settled) render(TOTAL);
}

// the printed header of the record form — set before the pen moves
function stamp(g) {
  const f = fs * 0.92;
  g.font = FONT(f);
  g.letterSpacing = TRACK;
  const xL = px + 0.048 * pw, xR = px + 0.952 * pw;
  const y1 = py + 0.038 * ph + f, y2 = y1 + f * 1.6;
  g.fillStyle = INK + "0.5)";
  g.textAlign = "left";
  g.fillText("REG. Nº 002 · MUNDIAL 2026 · GRUPO J", xL, y1);
  g.fillText("ESTADIO DE DALLAS, ARLINGTON · 22·06·2026", xL, y2);
  g.textAlign = "right";
  g.fillText("ARG 2–0 AUT", xR, y1);
  g.fillText("70 649", xR, y2);
  g.letterSpacing = "0px";
}

// possession as ink weight: argentina's half of the line runs darker
function inkGrad(g, heavy) {
  const al = (p) => Math.min(1, 0.70 + 0.25 * (p - 46) / 8 + (heavy ? 0.06 : 0)).toFixed(2);
  const gr = g.createLinearGradient(X0, 0, X1, 0);
  gr.addColorStop(0, INK + al(M.possession.arg) + ")");
  gr.addColorStop(0.42, INK + al(M.possession.arg) + ")");
  gr.addColorStop(0.58, INK + al(M.possession.aut) + ")");
  gr.addColorStop(1, INK + al(M.possession.aut) + ")");
  return gr;
}

// draw one record line onto g, clipped to fraction `clip` of its width;
// each line first fills ground under itself (occludes the mountains above)
function drawLine(g, i, clip) {
  const L = lines[i], pts = L.pts;
  const n = Math.max(2, Math.min(pts.length, Math.ceil(clip * (pts.length - 1)) + 1));
  g.fillStyle = ROOM;
  g.beginPath();
  g.moveTo(pts[0].x, L.y + 1.6 * DPR);
  for (let j = 0; j < n; j++) g.lineTo(pts[j].x, pts[j].y);
  g.lineTo(pts[n - 1].x, L.y + 1.6 * DPR);
  g.closePath();
  g.fill();
  g.lineWidth = (L.heavy ? 1.6 : L.event ? 1.42 : 1.05) * DPR;
  g.lineJoin = "round"; g.lineCap = "round";
  const base = inkGrad(g, L.heavy || L.event);
  let j0 = 0;
  while (j0 < n - 1) {
    const c = pts[j0].tint;
    let j1 = j0 + 1;
    while (j1 < n && pts[j1].tint === c) j1++;
    g.strokeStyle = c || base;
    g.beginPath();
    g.moveTo(pts[j0].x, pts[j0].y);
    for (let j = j0 + 1; j <= Math.min(j1, n - 1); j++) g.lineTo(pts[j].x, pts[j].y);
    g.stroke();
    j0 = j1;
  }
  if (clip >= 1) {
    const dot = (x, y, r, col) => {
      g.fillStyle = col;
      g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
    };
    dot(pts[0].x, pts[0].y, 1.15 * DPR, INK + "0.55)");
    dot(pts[pts.length - 1].x, pts[pts.length - 1].y, 1.15 * DPR, INK + "0.55)");
    for (const p of L.pools) dot(p.x, p.y, p.r, p.tint || INK + "0.78)");
    for (const lab of L.labs) {
      const lx = lab.left ? X0 - 0.018 * pw : X1 + 0.018 * pw;
      const l1 = lab.l1.toUpperCase(), l2 = lab.l2 && lab.l2.toUpperCase();
      // fit-guard: an annotation never leaves the sheet (Sans metrics)
      const maxw = lab.left ? lx - px - 0.028 * pw : px + pw - 0.028 * pw - lx;
      let f = fs;
      g.font = FONT(f);
      g.letterSpacing = TRACK;
      const tw = Math.max(g.measureText(l1).width, l2 ? g.measureText(l2).width : 0);
      if (tw > maxw) { f = Math.max(6 * DPR, f * maxw / tw); g.font = FONT(f); }
      g.fillStyle = lab.col;
      g.textAlign = lab.left ? "right" : "left";
      if (lab.single) g.fillText(l1, lx, L.y + f * 0.35);
      else {
        g.fillText(l1, lx, L.y - f * 0.25);
        g.fillText(l2, lx, L.y + f * 0.85);
      }
      g.letterSpacing = "0px";
    }
  }
}

function render(pos) {
  ctx.clearRect(0, 0, W, H);
  // dark: transparent — the record sits directly on the room;
  // light: the region becomes a plain paper ground
  if (GROUND) { ctx.fillStyle = GROUND; ctx.fillRect(0, 0, W, H); }
  ctx.drawImage(off, 0, 0);

  if (pos < TOTAL) {
    const i = Math.min(TOTAL - 1, Math.floor(pos)), frac = pos - i;
    drawLine(ctx, i, Math.max(0.02, frac));
    const pts = lines[i].pts;
    const pj = Math.max(0, Math.min(pts.length - 1, Math.ceil(frac * (pts.length - 1))));
    ctx.fillStyle = INK + "0.9)";
    ctx.beginPath(); ctx.arc(pts[pj].x, pts[pj].y, 2.1 * DPR, 0, 7); ctx.fill();
    // travelling minute readout (skipped next to right-margin labels)
    const nearR = (k) => k >= 0 && k < TOTAL && lines[k].labs.some((l) => !l.left);
    if (!nearR(i) && !nearR(i - 1) && !nearR(i + 1)) {
      ctx.font = FONT(fs);
      ctx.letterSpacing = TRACK;
      ctx.fillStyle = INK + "0.4)";
      ctx.textAlign = "left";
      ctx.fillText(mm(i + 1), X1 + 0.018 * pw, lines[i].y + fs * 0.35);
      ctx.letterSpacing = "0px";
    }
  } else {
    // the pen rests where the record ends, one last pool of ink
    const p = lines[TOTAL - 1].pts[lines[TOTAL - 1].pts.length - 1];
    ctx.fillStyle = INK + "0.72)";
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.3 * DPR, 0, 7); ctx.fill();
  }

  // finishing pass — per ground
  if (DARK) {
    // a whisper of light film grain, already masked to breathe out around
    // the block; the room itself stays untouched darkness
    ctx.drawImage(grain, 0, 0);
  } else {
    // paper: raking light down the sheet + dark grain, multiplied
    ctx.save();
    const lg = ctx.createLinearGradient(0, 0, 0, H);
    lg.addColorStop(0, "rgba(255,255,253,0.055)");
    lg.addColorStop(0.35, "rgba(255,255,253,0)");
    lg.addColorStop(1, "rgba(45,44,40,0.05)");
    ctx.fillStyle = lg;
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = "multiply";
    ctx.drawImage(grain, 0, 0);
    ctx.restore();
  }
}

// the record draws itself once — ~11 s, top to bottom — then rests
function draw(tms) {
  if (start === undefined) start = tms;
  const t = (tms - start) / 1000;
  const pos = RM ? TOTAL : Math.min(TOTAL, t * 8.4);
  while (drawn < Math.floor(pos) && drawn < TOTAL) { drawLine(offCtx, drawn, 1); drawn++; }
  render(pos);
  if (pos >= TOTAL) { settled = true; return; } // settled — the loop stops
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
// the stamp is baked into the record at build time — if Geist lands after
// the first bake, rebuild once so the registry type is true
document.fonts.load(FONT(16)).then(() => {
  if (lines) { build(); if (settled) render(TOTAL); }
});
</script>
