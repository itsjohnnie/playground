<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — a · bruma — the match as weather. Five pigments — one per goal,
// the own goal a hollow loop — arrive as soft forms and then MELT: a
// two-level domain warp pulls them into fluid tongues and filaments,
// like ink released into slow water. The dither lives in the pigment;
// the paper stays calm. It flows once, then the weather rests.

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++){ s += a*vnoise(p); p = p*2.03 + 11.7; a *= 0.5; }
  return s;
}
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }
float sub(float i){ return ease((u_p*10.0 - i*1.0) / 5.0); }

float bayer2(vec2 a){ a = floor(a); return fract(a.x/2.0 + a.y*a.y*0.75); }
float bayer4(vec2 a){ return bayer2(0.5*a)*0.25 + bayer2(a); }
float bayer8(vec2 a){ return bayer4(0.5*a)*0.25 + bayer2(a); }

// the water: a nested domain warp, strength s
vec2 warp(vec2 p, float s){
  vec2 w1 = vec2(fbm(p*2.6 + 7.1), fbm(p*2.6 + 3.9)) - 0.5;
  vec2 p2 = p + w1 * 0.55 * s;
  vec2 w2 = vec2(fbm(p2*5.3 + 11.0), fbm(p2*5.3 + 17.0)) - 0.5;
  return p + (w1*0.45 + w2*0.22) * s;
}

vec2 rot(vec2 v, float a){ return vec2(v.x*cos(a)-v.y*sin(a), v.x*sin(a)+v.y*cos(a)); }

// a pigment: anisotropic, streaked, living in the warped space
vec3 form(vec3 col, inout float cov, vec2 qq, vec2 c0, vec2 c1, float r,
          float ang, float str, vec3 core, vec3 edge, float s, float hollow, float fi){
  if (s <= 0.0) return col;
  vec2 c = mix(c0, c1, s);
  float rr = r * mix(1.35, 1.0, s);
  vec2 d2 = rot(qq - c, ang);
  d2.x /= (1.0 + str);                          // a tongue, not a circle
  float d = length(d2);
  float g = 1.0 - smoothstep(0.0, rr, d);
  if (hollow > 0.5) g *= smoothstep(rr*0.36, rr*0.60, d);
  // pigment travels in streaks along the flow
  float streak = 0.72 + 0.55 * fbm(qq * 6.5 + fi * 13.0);
  vec3 ink = mix(core, edge, pow(smoothstep(0.0, rr, d), 0.8));
  float a = g * s * streak;
  cov += a;
  return col * mix(vec3(1.0), ink * mix(vec3(1.0), vec3(1.08), g*g), clamp(a, 0.0, 1.0));
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 q = vec2(p.x * 0.75, (p.y - 0.5) * 0.75 / max(aspect, 0.001) + 0.5);

  vec3 col = mix(vec3(0.918, 0.898, 0.845), vec3(0.936, 0.885, 0.845), pow(p.y, 1.6));

  float cov0 = 0.0;
  // a pale gold field behind everything — the stadium's light, also fluid
  {
    float s = ease(u_p*10.0/6.0);
    vec2 qg = warp(q, 0.5 * s);
    float d = length(qg - vec2(0.42, 0.62));
    float g = (1.0 - smoothstep(0.05, 0.40, d)) * 0.10 * s;
    col = col * (1.0 - g) + vec3(0.955, 0.83, 0.55) * g;
    cov0 = g * 3.0;
  }

  // the melt: forms arrive nearly whole, then the water takes them
  float fluid = 0.42 + 0.58 * ease((u_p*10.0 - 2.0)/6.0);
  vec2 qq = warp(q, fluid);

  vec3 celCore = vec3(0.72, 0.87, 0.95), celEdge = vec3(0.20, 0.45, 0.67);
  vec3 rojCore = vec3(0.97, 0.72, 0.56), rojEdge = vec3(0.63, 0.19, 0.13);

  float cov = cov0;
  col = form(col, cov, qq, vec2(0.05, 0.95), vec2(0.245, 0.665), 0.205, 0.55, 0.85, celCore, celEdge, sub(0.0), 0.0, 1.0); // 29'
  col = form(col, cov, qq, vec2(0.80, 0.80), vec2(0.525, 0.560), 0.150, -0.9, 0.55, rojCore, rojEdge, sub(1.0), 0.0, 2.0); // 59'
  col = form(col, cov, qq, vec2(0.30, 0.02), vec2(0.370, 0.405), 0.185, 1.85, 1.05, celCore, celEdge, sub(2.0), 0.0, 3.0); // 92'
  col = form(col, cov, qq, vec2(-0.06, 0.20), vec2(0.165, 0.285), 0.125, -0.35, 0.65, rojCore, rojEdge, sub(3.0), 0.0, 4.0); // 103'
  col = form(col, cov, qq, vec2(0.85, 0.10), vec2(0.560, 0.262), 0.150, 0.2, 0.35, celCore, celEdge, sub(4.0), 1.0, 5.0); // 111' og

  // one small gold seed beside the loop — the moment itself
  {
    float s = sub(4.6);
    float d = length(qq - vec2(0.618, 0.335));
    float g = (1.0 - smoothstep(0.0, 0.020, d)) * s;
    col = mix(col, vec3(0.84, 0.65, 0.18), g*0.9);
  }

  // 38 dust specks — the shots, settled on the surface, crisp
  {
    float s = ease((u_p*10.0 - 6.0)/3.0);
    for (int i = 0; i < 38; i++){
      float fi = float(i);
      vec2 sp = vec2(0.06 + hash(vec2(fi, 1.7))*0.63,
                     0.14 + hash(vec2(fi, 9.2))*0.72);
      float d = length(q - sp);
      float a = (1.0 - smoothstep(0.0, 0.0035, d)) * s * (0.25 + 0.5*hash(vec2(fi, 4.4)));
      vec3 ink = hash(vec2(fi, 2.2)) < 0.58 ? vec3(0.28, 0.45, 0.60) : vec3(0.58, 0.24, 0.18);
      col = mix(col, ink, a);
    }
  }

  // print pass: the dither lives where the ink lives
  float cell = max(2.0, floor(u_res.y / 340.0));
  float th = bayer8(gl_FragCoord.xy / cell) - 0.5;
  float levels = 6.0;
  vec3 dithered = floor(col * levels + 0.5 + th * 0.95) / levels;
  col = mix(col, dithered, clamp(cov * 1.5 + 0.05, 0.0, 1.0));

  float g2 = hash(gl_FragCoord.xy * 0.7);
  col += (g2 - 0.5) * 0.022;
  float vig = smoothstep(1.25, 0.45, length(p - vec2(0.5, 0.52)));
  col *= mix(0.965, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008a");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  num: 1, title: "Bruma", subject: "Argentina vs. Cabo Verde",
  edition: "02/31", date: "06·07·2026",
  stack: "WebGL — GLSL", time: "48 minutes",
  desc: "Two inks — celeste and rojo — pushed through a domain-warped flow field and settled as dithered pigment. The volumes follow possession, 64% to 36%; the fleck of gold is the winning goal at 118'.",
  dark: false, onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// flows once (10s), then the weather rests — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
