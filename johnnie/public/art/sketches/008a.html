<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script>
// 008 — a · río — the match as two risograph inks sharing one page.
// Time flows down; the boundary is the real balance of the game
// (possession blended with per-phase xG). Goals bend the river toward
// the conceding side. Every shot is a stitch on its team's bank.
// Replays the 120 minutes in 26 seconds, top to bottom.

const seed = ART.seed("2026-07-06-008a");
const N = ART.makeNoise(seed);
const M = window.M8;

let W, H, DPR, grain, ticks;
const F = FRAME.mount({
  n: "008", v: "a", title: "río", date: "06·07·2026",
  data: M.frameData, tech: "canvas 2d · dos tintas",
  dark: false,
  onResize(w, h, dpr) {
    W = w; H = h; DPR = dpr;
    const Rt = ART.rng(seed + "ticks");
    ticks = [];
    for (const team of ["arg", "cpv"]) {
      const all = [];
      M.shotsPhase[team].forEach((count, pi) => {
        const [a, b] = [[0, 45], [45, 90], [90, 120]][pi];
        for (let i = 0; i < count; i++) all.push(a + 2 + Rt() * (b - a - 4));
      });
      for (let i = all.length - 1; i > 0; i--) {
        const j = (Rt() * (i + 1)) | 0;
        [all[i], all[j]] = [all[j], all[i]];
      }
      all.forEach((min, i) => ticks.push({ team, min, on: i < M.onTarget[team] }));
    }
    grain = document.createElement("canvas");
    grain.width = W; grain.height = H;
    const g = grain.getContext("2d");
    const img = g.createImageData(W, H);
    const Rg = ART.rng(seed + "grain");
    for (let i = 0; i < img.data.length; i += 4) {
      const v = 118 + Rg() * 20 | 0;
      img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
      img.data[i + 3] = 24;
    }
    g.putImageData(img, 0, 0);
  },
});
const ctx = F.canvas.getContext("2d");

// band occupies the middle four grid columns, rows 2–7
const L = () => W * (1 / 6) * 0.9, Rr = () => W * (5 / 6) + W / 6 * 0.1;
const T = () => H / 8, B = () => H * 7 / 8;
const yFor = (min) => T() + (min / 120) * (B() - T());

function baseFlow(min) {
  const pts = [[22.5, 0], [67.5, 1], [105, 2]].map(([m, i]) => ({
    m, f: 0.64 * 0.68 + (M.xgPhase.arg[i] / (M.xgPhase.arg[i] + M.xgPhase.cpv[i])) * 0.32,
  }));
  if (min <= pts[0].m) return pts[0].f;
  if (min >= pts[2].m) return pts[2].f;
  const i = min < pts[1].m ? 0 : 1;
  const t = (min - pts[i].m) / (pts[i + 1].m - pts[i].m);
  return pts[i].f + (pts[i + 1].f - pts[i].f) * (t * t * (3 - 2 * t));
}

function boundary(min, z) {
  let f = baseFlow(min) + 0.075 * N.fbm3(min * 0.09, 7.3, z, 3);
  f = Math.max(0.2, Math.min(0.9, f));
  let x = L() + f * (Rr() - L());
  for (const g of M.goals) {
    const d = min - g.min;
    // a goal bends the river toward the side that conceded
    x += (g.team === "arg" ? 1 : -1) * 0.11 * (Rr() - L()) * Math.exp(-(d * d) / 9.5);
  }
  return x;
}

function ribbon(z, xLeftOf, xRightOf, hex, alpha, dx, dy) {
  ctx.save();
  ctx.translate(dx, dy);
  ctx.globalCompositeOperation = "multiply";
  ctx.globalAlpha = alpha;
  ctx.fillStyle = hex;
  ctx.beginPath();
  const step = Math.max(2, H / 420);
  for (let y = T(); y <= B(); y += step) {
    const min = ((y - T()) / (B() - T())) * 120;
    y === T() ? ctx.moveTo(xLeftOf(min), y) : ctx.lineTo(xLeftOf(min), y);
  }
  for (let y = B(); y >= T(); y -= step) {
    const min = ((y - T()) / (B() - T())) * 120;
    ctx.lineTo(xRightOf(min), y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function draw(tms) {
  const t = tms / 1000, z = t * 0.025;
  const cycle = t % 34, prog = Math.min(1, cycle / 26);
  const fs = Math.max(0.0205 * W, 9 * DPR);
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = M.ink.paper;
  ctx.fillRect(0, 0, W, H);

  const sweepY = T() + prog * (B() - T() + 4);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, sweepY);
  ctx.clip();

  const xL = (min) => L() + 0.012 * W * N.fbm3(min * 0.05 + 3.1, 1.7, z, 3);
  const xR = (min) => Rr() + 0.012 * W * N.fbm3(min * 0.05 + 9.4, 5.2, z, 3);
  const xB = (min) => boundary(min, z);

  // goal beams — horizontal light through the page
  for (const g of M.goals) {
    const gy = yFor(g.min);
    const hex = g.team === "arg" ? M.ink.arg : M.ink.cpv;
    const grad = ctx.createLinearGradient(0, gy - 0.035 * H, 0, gy + 0.035 * H);
    grad.addColorStop(0, hex + "00");
    grad.addColorStop(0.5, hex + "4d");
    grad.addColorStop(1, hex + "00");
    ctx.globalCompositeOperation = "multiply";
    ctx.fillStyle = grad;
    ctx.fillRect(0.06 * W, gy - 0.035 * H, 0.88 * W, 0.07 * H);
  }

  // two inks, double-printed off register
  ribbon(z, xL, xB, M.ink.arg, 0.42, 1.6 * DPR, -1.1 * DPR);
  ribbon(z, xL, xB, M.ink.arg, 0.78, 0, 0);
  ribbon(z, xB, xR, M.ink.cpv, 0.40, -1.4 * DPR, 1.2 * DPR);
  ribbon(z, xB, xR, M.ink.cpv, 0.72, 0, 0);

  // period lines + hydration slits
  ctx.globalCompositeOperation = "source-over";
  ctx.font = fs + "px 'Fragment Mono', ui-monospace, monospace";
  for (const m of M.periods) {
    ctx.fillStyle = "rgba(233,227,213,0.92)";
    ctx.fillRect(0.10 * W, yFor(m) - 1.2 * DPR, 0.80 * W, 2.4 * DPR);
    ctx.fillStyle = "rgba(23,21,17,0.4)";
    ctx.textAlign = "right";
    ctx.fillText(m + "’", L() - 0.012 * W, yFor(m) + fs * 0.35);
  }
  for (const m of M.breaks) {
    ctx.fillStyle = "rgba(233,227,213,0.5)";
    ctx.fillRect(0.13 * W, yFor(m) - 0.6 * DPR, 0.74 * W, 1.2 * DPR);
  }

  // shot stitches on each bank; solid = on target
  for (const s of ticks) {
    const y = yFor(s.min);
    const left = s.team === "arg";
    ctx.strokeStyle = (left ? M.ink.argDeep : M.ink.cpvDeep) + (s.on ? "d9" : "59");
    ctx.lineWidth = 1.6 * DPR;
    ctx.beginPath();
    const x0 = left ? L() + 0.006 * W : Rr() - 0.006 * W;
    ctx.moveTo(x0, y);
    ctx.lineTo(x0 + (left ? 0.022 * W : -0.022 * W), y);
    ctx.stroke();
  }

  // cards in the margins
  for (const c of M.cards) {
    const y = yFor(c.min);
    const x = c.team === "arg" ? L() - 0.045 * W : Rr() + 0.03 * W;
    ctx.fillStyle = M.ink.gold;
    ctx.fillRect(x, y - 0.008 * H, 0.014 * W, 0.014 * H);
  }

  // goals: marker on the boundary + scorer label on the scorer's side
  for (const g of M.goals) {
    const gy = yFor(g.min), gx = xB(g.min);
    const deep = g.team === "arg" ? M.ink.argDeep : M.ink.cpvDeep;
    ctx.lineWidth = 2 * DPR;
    ctx.beginPath();
    ctx.arc(gx, gy, 0.016 * W, 0, Math.PI * 2);
    if (g.og) {
      ctx.fillStyle = M.ink.paper; ctx.strokeStyle = deep;
      ctx.fill(); ctx.stroke();
    } else {
      ctx.fillStyle = deep; ctx.fill();
    }
    const left = g.team === "arg";
    ctx.fillStyle = deep;
    ctx.textAlign = left ? "left" : "right";
    const lx = left ? L() + 0.02 * W : Rr() - 0.02 * W;
    ctx.fillText(g.min + "’ " + g.player, lx, gy - fs * 0.8);
  }
  ctx.restore();

  // the current minute rides the reveal front
  if (prog < 1) {
    ctx.fillStyle = "rgba(23,21,17,0.45)";
    ctx.textAlign = "left";
    ctx.font = fs + "px 'Fragment Mono', ui-monospace, monospace";
    ctx.fillText(Math.round(prog * 120) + "’", Rr() + 0.03 * W, sweepY + fs * 0.35);
  }

  ctx.globalCompositeOperation = "multiply";
  ctx.drawImage(grain, 0, 0);
  ctx.globalCompositeOperation = "source-over";
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
