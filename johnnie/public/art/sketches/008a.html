<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — a · bruma — the match as weather. Five soft gradient forms —
// one per goal, the own goal a hollow ring — drift in and settle into
// one composition on warm paper; 38 specks of dust are the shots.
// Every gradient passes through an 8×8 bayer dither, so the air reads
// as print, not screen. The animation arrives once and rests.

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }

float bayer2(vec2 a){ a = floor(a); return fract(a.x/2.0 + a.y*a.y*0.75); }
float bayer4(vec2 a){ return bayer2(0.5*a)*0.25 + bayer2(a); }
float bayer8(vec2 a){ return bayer4(0.5*a)*0.25 + bayer2(a); }

float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

// staggered sub-progress for element i of n
float sub(float i){ return ease((u_p*10.0 - i*1.1) / 5.5); }

// soft two-tone ink form; accumulates coverage so the print pass knows
// where the ink lives
vec3 form(vec3 col, inout float cov, vec2 q, vec2 c0, vec2 c1, float r, vec3 core, vec3 edge, float s, float hollow){
  if (s <= 0.0) return col;
  vec2 c = mix(c0, c1, s);
  float rr = r * mix(1.5, 1.0, s);
  float d = length(q - c);
  float g = 1.0 - smoothstep(0.0, rr, d);
  if (hollow > 0.5) g *= smoothstep(rr*0.40, rr*0.62, d);   // ring, mist inside
  vec3 ink = mix(core, edge, pow(smoothstep(0.0, rr, d), 0.8));
  float a = g * s;
  cov += a;
  return col * mix(vec3(1.0), ink * mix(vec3(1.0), vec3(1.08), g*g), a); // multiply
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  vec2 q = vec2(p.x * 0.75, p.y);           // metric coords, 3:4

  // paper: warm cream breathing into blush at the top
  vec3 col = mix(vec3(0.918, 0.898, 0.845), vec3(0.936, 0.885, 0.845), pow(p.y, 1.6));

  float cov0 = 0.0;
  // a pale gold field behind everything — the stadium's light
  {
    float s = ease(u_p*10.0/6.0);
    float d = length(q - vec2(0.42, 0.62));
    float g = (1.0 - smoothstep(0.05, 0.38, d)) * 0.10 * s;
    col = col * (1.0 - g) + vec3(0.955, 0.83, 0.55) * g;
    cov0 = g * 3.0;
  }

  vec3 celCore = vec3(0.72, 0.87, 0.95), celEdge = vec3(0.20, 0.45, 0.67);
  vec3 rojCore = vec3(0.97, 0.72, 0.56), rojEdge = vec3(0.63, 0.19, 0.13);

  float cov = cov0;
  // five goals, in order, drifting from offstage to their places
  col = form(col, cov, q, vec2(0.05, 0.95), vec2(0.24, 0.660), 0.215, celCore, celEdge, sub(0.0), 0.0); // 29' messi
  col = form(col, cov, q, vec2(0.80, 0.80), vec2(0.52, 0.545), 0.160, rojCore, rojEdge, sub(1.0), 0.0); // 59' duarte
  col = form(col, cov, q, vec2(0.30, 0.02), vec2(0.375, 0.405), 0.195, celCore, celEdge, sub(2.0), 0.0); // 92' l. martínez
  col = form(col, cov, q, vec2(-0.06, 0.20), vec2(0.170, 0.290), 0.135, rojCore, rojEdge, sub(3.0), 0.0); // 103' cabral
  col = form(col, cov, q, vec2(0.85, 0.10), vec2(0.555, 0.258), 0.150, celCore, celEdge, sub(4.0), 1.0); // 111' og — hollow

  // one small gold seed beside the ring — the moment itself
  {
    float s = sub(4.6);
    float d = length(q - vec2(0.612, 0.332));
    float g = (1.0 - smoothstep(0.0, 0.020, d)) * s;
    col = mix(col, vec3(0.84, 0.65, 0.18), g*0.9);
  }

  // 38 dust specks — the shots, settled
  {
    float s = ease((u_p*10.0 - 6.0)/3.0);
    for (int i = 0; i < 38; i++){
      float fi = float(i);
      vec2 sp = vec2(0.06 + hash(vec2(fi, 1.7))*0.63,
                     0.14 + hash(vec2(fi, 9.2))*0.72);
      float d = length(q - sp);
      float a = (1.0 - smoothstep(0.0, 0.0035, d)) * s * (0.25 + 0.5*hash(vec2(fi, 4.4)));
      vec3 ink = hash(vec2(fi, 2.2)) < 0.58 ? vec3(0.28, 0.45, 0.60) : vec3(0.58, 0.24, 0.18);
      col = mix(col, ink, a);
    }
  }

  // the print pass: the dither lives where the ink lives — the paper
  // stays calm, the gradients halftone
  float cell = max(2.0, floor(u_res.y / 340.0));
  float th = bayer8(gl_FragCoord.xy / cell) - 0.5;
  float levels = 6.0;
  vec3 dithered = floor(col * levels + 0.5 + th * 0.95) / levels;
  col = mix(col, dithered, clamp(cov * 1.5 + 0.05, 0.0, 1.0));

  // grain + breath of a vignette
  float g2 = hash(gl_FragCoord.xy * 0.7);
  col += (g2 - 0.5) * 0.022;
  float vig = smoothstep(1.25, 0.45, length(p - vec2(0.5, 0.52)));
  col *= mix(0.965, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008a");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  n: "008", v: "a", title: "bruma", date: "06·07·2026",
  data: M.frameData, tech: "glsl · dithered gradients",
  dark: false,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;          // re-render after resize
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// arrives once (10s), then the composition rests — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
