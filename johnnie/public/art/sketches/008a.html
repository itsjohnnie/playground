<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — a · sello — the match struck as a letterpress seal on cotton rag.
// A sheet of handmade paper on dark felt; a die presses the design blind
// into the fibres (a true height field, lit by one raking light), then the
// ink arrives in match order. The medallion: a sol de mayo in gold, a ring
// of 120 minute-ticks (long ticks at 0/45/90/105), the five goals printed
// at their minutes — celeste for argentina, rojo for cabo verde, the own
// goal an open ring — the two bookings as gilt hairlines outside the ring,
// and the score row beneath: five pressed dots in goal order. Deckled
// edges, cockled paper, ink squash, slight misregistration. It is pressed
// once, inked once, then rests.

const float TAU = 6.28318530718;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 3; i++){ s += a*vnoise(p); p = p*2.03 + 11.7; a *= 0.5; }
  return s;
}
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }
float band(float d, float w, float aa){ return smoothstep(w + aa, w - aa, abs(d)); }
float rsdf(vec2 p, vec2 b, float r){
  vec2 d = abs(p) - b + r;
  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;
}

// each printed element inks in at its minute of the match
float cue(float m){ return ease((u_p - (0.50 + m/120.0*0.30)) / 0.07); }
float goalMin(int i){ return i==0 ? 29.0 : i==1 ? 59.0 : i==2 ? 92.0 : i==3 ? 103.0 : 111.0; }

// the die: returns (blind deboss depth, celeste ink, rojo ink, gold ink)
vec4 plate(vec2 u, float aa){
  float press = ease((u_p - 0.14) / 0.28);
  vec4 o = vec4(0.0);

  // the plate mark — the whole die face presses the sheet faintly
  float pm = smoothstep(0.0055, -0.0055, rsdf(u - vec2(0.0, 0.04), vec2(0.26, 0.325), 0.02));
  o.x = max(o.x, pm * 0.22);

  vec2 v = u - vec2(0.0, 0.085);      // medallion centre
  float r = length(v);
  float phi = atan(v.x, v.y);         // 0 at the top, clockwise

  if (r < 0.30){
    // hairline rings framing the tick band
    float ring = band(r - 0.234, 0.0013, aa) + band(r - 0.140, 0.0012, aa);
    o.x = max(o.x, min(ring, 1.0) * 0.55);

    // 120 minute-ticks, one per minute played
    float mn = mod(phi/TAU*120.0 + 120.0, 120.0);
    float dm = (mn - floor(mn + 0.5)) * (TAU/120.0) * r;
    float mi = mod(floor(mn + 0.5), 120.0);
    float isP = step(abs(mi - 45.0), 0.25) + step(abs(mi - 90.0), 0.25)
              + step(abs(mi - 105.0), 0.25) + step(mi, 0.25);
    isP = min(isP, 1.0);
    float w  = mix(0.00115, 0.0021, isP);
    float r0 = mix(0.163, 0.152, isP), r1 = mix(0.184, 0.188, isP);
    float tick = band(dm, w, aa) * smoothstep(r0 - aa, r0 + aa, r) * smoothstep(r1 + aa, r1 - aa, r);
    o.x = max(o.x, tick * 0.75);

    // sol de mayo — gold face and sixteen alternating rays
    float face = smoothstep(aa, -aa, r - 0.042);
    float t16 = phi/TAU*16.0;
    float i16 = floor(t16 + 0.5);
    float fr = abs(t16 - i16);
    float L = mix(0.118, 0.096, mod(i16, 2.0));
    float wu = 0.20 * clamp((L - r) / (L - 0.052), 0.0, 1.0);
    float ray = smoothstep(aa, -aa, (fr - wu) * (TAU/16.0) * max(r, 1e-3))
              * smoothstep(0.052 - aa, 0.052 + aa, r)
              * smoothstep(L, L - 0.006, r);
    float sun = max(face, ray);
    o.x = max(o.x, sun);
    o.w = max(o.w, sun * ease((u_p - 0.86) / 0.11));

    // the five goals, seated at their minutes outside the ring
    for (int i = 0; i < 5; i++){
      float gm = goalMin(i);
      float ga = gm/120.0*TAU;
      vec2 gp = vec2(sin(ga), cos(ga)) * 0.208;
      float gr = length(v - gp);
      float m = smoothstep(aa, -aa, gr - 0.0125);
      if (i == 4) m *= smoothstep(-aa, aa, gr - 0.0068);   // the own goal, open
      o.x = max(o.x, m);
      float c = m * cue(gm);
      if (i == 1 || i == 3) o.z = max(o.z, c); else o.y = max(o.y, c);
    }

    // the two bookings — gilt hairlines at 69' and 115'
    for (int i = 0; i < 2; i++){
      float cm = i == 0 ? 69.0 : 115.0;
      float ad = (mod(mn - cm + 60.0, 120.0) - 60.0) * (TAU/120.0) * r;
      float ct = band(ad, 0.0011, aa)
               * smoothstep(0.196 - aa, 0.196 + aa, r) * smoothstep(0.224 + aa, 0.224 - aa, r);
      o.x = max(o.x, ct * 0.8);
      o.w = max(o.w, ct * cue(cm));
    }
  }

  // the score row — five dots in goal order, 3–2
  for (int i = 0; i < 5; i++){
    vec2 sp = vec2((float(i) - 2.0) * 0.048, -0.235);
    float sr = length(u - sp);
    float m = smoothstep(aa, -aa, sr - 0.0095);
    if (i == 4) m *= smoothstep(-aa, aa, sr - 0.0050);
    o.x = max(o.x, m);
    float c = m * cue(goalMin(i));
    if (i == 1 || i == 3) o.z = max(o.z, c); else o.y = max(o.y, c);
  }

  o.x *= press;
  return o;
}

// the sheet, with deckled edges
float sheetSD(vec2 u){
  float sd = rsdf(u, vec2(0.315, 0.425), 0.010);
  sd += (fbm(u*34.0 + 5.7) - 0.5) * 0.009;
  return sd;
}

// the surface: felt board, paper thickness, cockle, the deboss, tooth
float heightAt(vec2 u, float aa){
  float sd = sheetSD(u);
  float sm = smoothstep(0.002, -0.002, sd);
  float d = plate(u, aa).x;
  float h = sm * 0.0050;
  h += sm * (fbm(u*7.0 + 2.3) - 0.5) * 0.0042;
  h += sm * (fbm(u*26.0 + 9.1) - 0.5) * 0.0013;
  h -= sm * d * 0.0036;
  h += (vnoise(u*480.0) - 0.5) * 0.00034 * mix(0.55, 1.0, sm) * (1.0 - d*0.7);
  h += (vnoise(u*150.0 + 3.3) - 0.5) * 0.00016 * sm * (1.0 - d*0.7);
  return h;
}

vec3 inkLayer(vec3 base, float m, vec3 deep, float mot){
  float solid = smoothstep(0.50, 0.78, m);
  float rim = smoothstep(0.10, 0.45, m) * (1.0 - smoothstep(0.60, 0.95, m));
  float a = clamp(solid * (0.72 + 0.28*mot) + rim * 0.85, 0.0, 1.0);
  return base * mix(vec3(1.0), deep * mix(1.0, 0.70, rim), a);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 q = vec2(p.x * 0.75, (p.y - 0.5) * 0.75 / max(aspect, 0.001) + 0.5);
  float px = 0.75 / u_res.x;
  float aa = px * 0.9;

  // the sheet sits a hair off true — placed by hand
  float rot = (hash(vec2(3.1, 7.7)) - 0.5) * 0.035;
  vec2 uc = q - vec2(0.375, 0.5);
  float cs = cos(rot), sn = sin(rot);
  vec2 u = vec2(uc.x*cs + uc.y*sn, -uc.x*sn + uc.y*cs);

  // dark felt board
  vec3 col = vec3(0.094, 0.079, 0.067) * (0.80 + 0.42*fbm(q*70.0));
  col *= 0.92 + 0.20 * (1.0 - length(p - vec2(0.34, 0.76)));

  // the shadow the sheet throws
  float ssd = rsdf(u - vec2(0.011, -0.013), vec2(0.315, 0.425), 0.010);
  col *= 1.0 - ((1.0 - smoothstep(0.0, 0.05, ssd)) * 0.45 + (1.0 - smoothstep(0.0, 0.012, ssd)) * 0.25);

  // surface normal from the true height field
  float eps = px * 1.4;
  float h0 = heightAt(u, aa);
  float hx = heightAt(u + vec2(eps, 0.0), aa);
  float hy = heightAt(u + vec2(0.0, eps), aa);
  vec3 n = normalize(vec3(-(hx - h0)/eps * 1.15, -(hy - h0)/eps * 1.15, 1.0));

  float sd = sheetSD(u);
  float sm = smoothstep(0.002, -0.002, sd);
  vec4 pl = plate(u, aa);

  // cotton rag
  vec3 paper = vec3(0.936, 0.906, 0.842);
  paper *= 0.972 + 0.048 * fbm(u*20.0 + 1.2);
  paper *= 0.988 + 0.024 * vnoise(u*300.0);
  vec3 base = mix(col, paper, sm);
  base *= 1.0 - 0.10 * pl.x * sm;             // fibres crushed in the valley

  // one raking light, upper left
  vec3 Ldir = normalize(vec3(-0.48, 0.60, 0.64));
  float diff = max(dot(n, Ldir), 0.0);
  float specBase = max(2.0 * n.z * dot(n, Ldir) - Ldir.z, 0.0);
  vec3 lit = base * (0.36 + 0.82 * diff) * vec3(1.015, 1.0, 0.97);
  lit += pow(specBase, 20.0) * 0.10 * (0.25 + 0.75 * pl.x) * sm;   // pressed fibres shine

  // the ink, pulled a hair out of register
  vec2 mis = (vec2(hash(vec2(1.3, 9.2)), hash(vec2(8.4, 2.6))) - 0.5) * 0.0042;
  vec4 ink = plate(u + mis, max(aa, 0.0020));
  float mot = clamp(0.78 + 0.30 * fbm(u*95.0 + 4.4), 0.0, 1.0);
  lit = inkLayer(lit, ink.y * sm, vec3(0.169, 0.416, 0.600), mot);        // celeste
  lit = inkLayer(lit, ink.z * sm, vec3(0.659, 0.173, 0.133), mot);        // rojo
  float aG = smoothstep(0.45, 0.75, ink.w * sm);
  vec3 gold = vec3(0.833, 0.647, 0.204) * (0.35 + 0.90 * diff)
            + vec3(1.0, 0.92, 0.70) * pow(specBase, 34.0) * 0.9;
  lit = mix(lit, gold * (0.94 + 0.10 * mot), aG * 0.94);

  // the light comes up, the photograph settles
  lit *= mix(0.30, 1.0, ease(u_p / 0.16));
  lit += (hash(gl_FragCoord.xy * 0.83) - 0.5) * 0.020;
  float vig = smoothstep(1.30, 0.45, length(p - vec2(0.5, 0.5)));
  lit *= mix(0.90, 1.0, vig);

  gl_FragColor = vec4(lit, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008a");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  num: 1, title: "Sello", subject: "Argentina vs. Cabo Verde",
  edition: "02/31", date: "06·07·2026",
  stack: "WebGL — GLSL", time: "86 minutes",
  desc: "Letterpress on cotton rag — a die struck blind into the sheet, then inked by hand. A sol de mayo in gold, a ring of 120 minute-ticks, the five goals printed at their minutes — celeste, rojo, the own goal an open ring — the two bookings as gilt hairlines, the score row pressed beneath. The paper keeps the pressure long after the whistle.",
  dark: true, onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;
const DUR = matchMedia("(prefers-reduced-motion: reduce)").matches ? 500 : 9000;

// pressed once, inked once (9s), then it rests — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / DUR);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
