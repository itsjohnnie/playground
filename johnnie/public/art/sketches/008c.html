<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script>
// 008 — c · organismo — the match as a living culture. A physarum
// (slime-mould) transport network, Jones' deposit/sense/steer model, run
// in a petri dish. Two species share the plate: argentina (64% of the
// agents, celeste-white veins) and cabo verde (36%, rojo-ember). Five
// food bodies sit on an invisible clock at the goal minutes — 29', 59',
// 92', 103', 111' — each feeding its scorer's colony (the 111' own goal
// feeds argentina). The colonies grow from seeded blobs, thread the food
// into pulsing veins, and wall each other off at a dark seam. It grows
// for ~14 seconds, then the network is fixed — the plate is photographed.

const seed = ART.seed("2026-07-06-008c");
const rng = ART.rng(seed);

let W, H, DPR;
let gw, gh, NC;            // grid dims + cell count
let TA, TB, SA, SB;        // trail maps A/B + scratch
let ax, ay, ah, asp;      // agent x, y, heading, species (0=A arg, 1=B cpv)
let NAGT;
let foods = [];            // {gx, gy, sx, sy, map, min}
let off, offCtx, imgData;
let grain, vignette;
let done = false, start = null;
let lutA, lutB;

const DURATION = 8200;     // grow into the braided mesh, then rest
const TAU = Math.PI * 2;

// ---- tunables (Jones physarum, tuned for dendritic veins) ----
const CELL_TARGET = 190000; // grid cells (fine enough for filaments)
const SENSE_DIST = 4.2;    // cells ahead the sensors reach
const SENSE_ANG  = 0.39;   // ±22.5° sensor spread
const TURN_ANG   = 0.66;   // ~38° steer — RA > SA gives reticular networks
const MOVE       = 1.0;    // cells per step
const DEPOSIT    = 1.0;    // own-trail drop
const OTHER_REP  = 0.72;   // how strongly the other species repels
const DECAY      = 0.90;   // multiplicative decay after diffuse
const DIFF_CTR   = 1;      // centre weight in the 3×3 diffusion (1 = pure mean)
const FOOD_PEAK  = 0.60;   // gaussian food deposit peak
const K_NORM     = 0.30;   // trail -> intensity soft mapping

const F = FRAME.mount({
  n: "008", v: "c", title: "organismo", date: "06·07·2026",
  data: window.M8.frameData, tech: "canvas · physarum", dark: true,
  onResize(w, h, dpr) {
    W = w; H = h; DPR = dpr;
    build();
    done = false; start = null;
    requestAnimationFrame(loop);
  },
});
const ctx = F.canvas.getContext("2d");

// ---- colour ramps: 3 stops each, driven by trail intensity ----
const CELESTE = [[0.086, 0.227, 0.361], [0.424, 0.671, 0.839], [0.918, 0.957, 0.984]]; // #163a5c → #6cabd6 → near-white
const EMBER   = [[0.227, 0.070, 0.047], [0.765, 0.290, 0.220], [0.941, 0.690, 0.537]]; // #3a120c → #c34a38 → #f0b089

function ramp3(st, t) {
  t = t < 0 ? 0 : t > 1 ? 1 : t;
  const s = t < 0.5 ? t / 0.5 : (t - 0.5) / 0.5;
  const a = t < 0.5 ? st[0] : st[1], b = t < 0.5 ? st[1] : st[2];
  return [a[0] + (b[0] - a[0]) * s, a[1] + (b[1] - a[1]) * s, a[2] + (b[2] - a[2]) * s];
}

// precompute 256-entry LUTs: contribution colour already scaled by intensity
function buildLUT(st) {
  const L = new Float32Array(256 * 3);
  for (let i = 0; i < 256; i++) {
    const s = i / 255;
    const c = ramp3(st, s);
    // fade brightness in with intensity so low trail ≈ black (screen-safe)
    const g = Math.pow(s, 0.82);
    L[i * 3] = c[0] * g; L[i * 3 + 1] = c[1] * g; L[i * 3 + 2] = c[2] * g;
  }
  return L;
}

function build() {
  // grid matched to stage aspect
  const target = CELL_TARGET;
  gh = Math.max(40, Math.round(Math.sqrt(target * H / W)));
  gw = Math.max(40, Math.round(target / gh));
  NC = gw * gh;

  TA = new Float32Array(NC); TB = new Float32Array(NC);
  SA = new Float32Array(NC); SB = new Float32Array(NC);

  lutA = buildLUT(CELESTE); lutB = buildLUT(EMBER);

  // food on the invisible clock: minute 0 at top, clockwise
  const cx = gw / 2, cy = gh / 2;
  const foodR = 0.32 * Math.min(gw, gh);
  const G = window.M8.goals;
  // map each goal minute -> scorer's trail map (og at 111' feeds arg = A)
  foods = G.map((gl) => {
    const th = (gl.min / window.M8.totalMin) * TAU;   // clockwise from top
    const fx = cx + foodR * Math.sin(th);
    const fy = cy - foodR * Math.cos(th);
    const isA = gl.og ? true : gl.team === "arg";
    return { gx: fx, gy: fy, map: isA ? "A" : "B", min: gl.min };
  });

  // ---- agents, 64/36 split, seeded blobs inside the dish ----
  NAGT = 32000;
  const nA = Math.round(NAGT * 0.64);
  ax = new Float32Array(NAGT); ay = new Float32Array(NAGT);
  ah = new Float32Array(NAGT); asp = new Uint8Array(NAGT);

  // seeded blob centres per species, scattered within the food ring
  function blobs(n) {
    const arr = [];
    for (let i = 0; i < n; i++) {
      const a = rng() * TAU, r = (0.2 + rng() * 0.72) * foodR;
      arr.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
    }
    return arr;
  }
  const blobA = blobs(5), blobB = blobs(4);
  const sd = Math.max(gw, gh) * 0.035;
  function gauss() { // box-muller-ish via two uniforms
    let u = 0, v = 0;
    while (u === 0) u = rng();
    v = rng();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(TAU * v);
  }
  for (let i = 0; i < NAGT; i++) {
    const isA = i < nA;
    const bl = isA ? blobA : blobB;
    const b = bl[(rng() * bl.length) | 0];
    let x = b[0] + gauss() * sd, y = b[1] + gauss() * sd;
    x = Math.max(1, Math.min(gw - 2, x));
    y = Math.max(1, Math.min(gh - 2, y));
    ax[i] = x; ay[i] = y; ah[i] = rng() * TAU; asp[i] = isA ? 0 : 1;
  }

  // stage-space food nodes for labels
  foods.forEach((f) => { f.sx = f.gx / gw * W; f.sy = f.gy / gh * H; });

  // offscreen grid canvas + reusable ImageData
  off = document.createElement("canvas");
  off.width = gw; off.height = gh;
  offCtx = off.getContext("2d");
  imgData = offCtx.createImageData(gw, gh);

  buildGrain();
  buildVignette();
}

// ---- one simulation step ----
function sense(own, other, x, y, ca, sa) {
  const sx = x + ca * SENSE_DIST, sy = y + sa * SENSE_DIST;
  let cxi = sx | 0, cyi = sy | 0;
  if (cxi < 0) cxi = 0; else if (cxi >= gw) cxi = gw - 1;
  if (cyi < 0) cyi = 0; else if (cyi >= gh) cyi = gh - 1;
  const idx = cyi * gw + cxi;
  return own[idx] - OTHER_REP * other[idx];
}

function step() {
  for (let i = 0; i < NAGT; i++) {
    const A = asp[i] === 0;
    const own = A ? TA : TB, other = A ? TB : TA;
    let h = ah[i];
    const x = ax[i], y = ay[i];

    const cf = Math.cos(h), sf = Math.sin(h);
    const hl = h - SENSE_ANG, hr = h + SENSE_ANG;
    const F0 = sense(own, other, x, y, cf, sf);
    const L0 = sense(own, other, x, y, Math.cos(hl), Math.sin(hl));
    const R0 = sense(own, other, x, y, Math.cos(hr), Math.sin(hr));

    if (F0 > L0 && F0 > R0) {
      // straight
    } else if (F0 < L0 && F0 < R0) {
      h += (rng() < 0.5 ? -1 : 1) * TURN_ANG;
    } else if (L0 < R0) {
      h += TURN_ANG;
    } else if (R0 < L0) {
      h -= TURN_ANG;
    } else {
      h += (rng() < 0.5 ? -1 : 1) * TURN_ANG;
    }

    let nx = x + Math.cos(h) * MOVE, ny = y + Math.sin(h) * MOVE;
    // bounce in the dish
    if (nx < 1) { nx = 1; h = Math.PI - h; }
    else if (nx > gw - 2) { nx = gw - 2; h = Math.PI - h; }
    if (ny < 1) { ny = 1; h = -h; }
    else if (ny > gh - 2) { ny = gh - 2; h = -h; }

    ax[i] = nx; ay[i] = ny; ah[i] = h;
    const idx = (ny | 0) * gw + (nx | 0);
    own[idx] += DEPOSIT;
  }
}

// ---- diffuse (centre-weighted 3×3) + decay, map -> scratch, swap ----
// A gentle blur (centre weight DIFF_CTR) keeps filaments crisp where a pure
// mean would smear them into fat ribbons.
const DIFF_NORM = 1 / (DIFF_CTR + 8);
function diffuse(src, dst) {
  for (let y = 0; y < gh; y++) {
    const y0 = y > 0 ? y - 1 : 0, y1 = y < gh - 1 ? y + 1 : gh - 1;
    const r0 = y0 * gw, r1 = y * gw, r2 = y1 * gw;
    for (let x = 0; x < gw; x++) {
      const x0 = x > 0 ? x - 1 : 0, x1 = x < gw - 1 ? x + 1 : gw - 1;
      const c = src[r1 + x];
      const s =
        src[r0 + x0] + src[r0 + x] + src[r0 + x1] +
        src[r1 + x0] + c + src[r1 + x1] +
        src[r2 + x0] + src[r2 + x] + src[r2 + x1] +
        c * (DIFF_CTR - 1);
      dst[r1 + x] = (s * DIFF_NORM) * DECAY;
    }
  }
}

// ---- food: gaussian deposit into the right map ----
const FR = 3;
function feed() {
  for (const f of foods) {
    const map = f.map === "A" ? TA : TB;
    const cx = f.gx | 0, cy = f.gy | 0;
    for (let dy = -FR; dy <= FR; dy++) {
      const yy = cy + dy; if (yy < 0 || yy >= gh) continue;
      for (let dx = -FR; dx <= FR; dx++) {
        const xx = cx + dx; if (xx < 0 || xx >= gw) continue;
        const d2 = dx * dx + dy * dy;
        map[yy * gw + xx] += FOOD_PEAK * Math.exp(-d2 / 5.0);
      }
    }
  }
}

// ---- render trail maps into the ImageData ----
function render() {
  const d = imgData.data;
  const baseR = 10, baseG = 10, baseB = 12;   // #0a0a0c
  for (let i = 0, p = 0; i < NC; i++, p += 4) {
    const ta = TA[i], tb = TB[i];
    let ia = 1 - Math.exp(-K_NORM * ta);
    let ib = 1 - Math.exp(-K_NORM * tb);
    let ai = (ia * 255) | 0; if (ai > 255) ai = 255;
    let bi = (ib * 255) | 0; if (bi > 255) bi = 255;
    const ja = ai * 3, jb = bi * 3;
    // screen-blend base + A + B (in 0..255)
    let r = baseR, g = baseG, b = baseB;
    // A contribution
    const ar = lutA[ja] * 255, ag = lutA[ja + 1] * 255, ab = lutA[ja + 2] * 255;
    r = 255 - (255 - r) * (255 - ar) / 255;
    g = 255 - (255 - g) * (255 - ag) / 255;
    b = 255 - (255 - b) * (255 - ab) / 255;
    // B contribution
    const br = lutB[jb] * 255, bg = lutB[jb + 1] * 255, bb = lutB[jb + 2] * 255;
    r = 255 - (255 - r) * (255 - br) / 255;
    g = 255 - (255 - g) * (255 - bg) / 255;
    b = 255 - (255 - b) * (255 - bb) / 255;
    d[p] = r; d[p + 1] = g; d[p + 2] = b; d[p + 3] = 255;
  }
  offCtx.putImageData(imgData, 0, 0);
}

// ---- static grain (pre-rendered, multiplied) ----
function buildGrain() {
  grain = document.createElement("canvas");
  grain.width = W; grain.height = H;
  const g = grain.getContext("2d");
  const img = g.createImageData(W, H);
  const rg = ART.rng(seed + "grain");
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 205 + (rg() * 50 | 0);
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = 30;
  }
  g.putImageData(img, 0, 0);
}

function buildVignette() {
  vignette = document.createElement("canvas");
  vignette.width = W; vignette.height = H;
  const v = vignette.getContext("2d");
  const grd = v.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.30,
    W / 2, H / 2, Math.max(W, H) * 0.72);
  grd.addColorStop(0, "rgba(0,0,0,0)");
  grd.addColorStop(1, "rgba(0,0,0,0.55)");
  v.fillStyle = grd;
  v.fillRect(0, 0, W, H);
}

// ---- composite everything to the visible canvas ----
function paint() {
  ctx.fillStyle = "#0a0a0c";
  ctx.fillRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(off, 0, 0, gw, gh, 0, 0, W, H);

  // vignette
  ctx.drawImage(vignette, 0, 0);

  // grain
  ctx.globalCompositeOperation = "multiply";
  ctx.drawImage(grain, 0, 0);
  ctx.globalCompositeOperation = "source-over";

  // food nodes: tiny bone-white dots + minute in Geist Mono
  const dot = Math.max(1.4, 1.7 * DPR);
  ctx.font = (8.5 * DPR) + "px 'Geist Mono', ui-monospace, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (const f of foods) {
    ctx.beginPath();
    ctx.arc(f.sx, f.sy, dot, 0, TAU);
    ctx.fillStyle = "rgba(244,240,229,0.82)";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(f.sx, f.sy, dot * 2.6, 0, TAU);
    ctx.strokeStyle = "rgba(244,240,229,0.14)";
    ctx.lineWidth = Math.max(1, DPR * 0.6);
    ctx.stroke();
    // label offset outward from centre
    const dx = f.sx - W / 2, dy = f.sy - H / 2;
    const dl = Math.hypot(dx, dy) || 1;
    const lx = f.sx + (dx / dl) * 15 * DPR;
    const ly = f.sy + (dy / dl) * 15 * DPR;
    ctx.fillStyle = "rgba(244,240,229,0.34)";
    ctx.fillText(f.min + "’", lx, ly);
  }
}

function loop(tms) {
  if (done) return;
  if (start === null) start = tms;
  const elapsed = tms - start;

  // 2 sim substeps per frame for faster network formation
  for (let s = 0; s < 2; s++) {
    step();
    diffuse(TA, SA); diffuse(TB, SB);
    let t = TA; TA = SA; SA = t;
    t = TB; TB = SB; SB = t;
    feed();
  }

  render();
  paint();

  if (elapsed >= DURATION) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
