<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — c · vitral — the match as stained glass. A leaded field of
// hand-set panes: celeste glass for argentina's 64% of the ball, ember
// for cabo verde's 36%, a few clear panes for the paper between. Five
// roundels sit at the goal minutes, top to bottom — petalled rose
// windows, the own goal left as clear glass in a leaded ring. Light
// rises behind the window once, pane by pane; then it simply glows.

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++){ s += a*vnoise(p); p = p*2.03 + 11.7; a *= 0.5; }
  return s;
}
float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

// glass palette — deep transmissive colors
vec3 glass(float h, float clearish){
  if (clearish > 0.5)       return vec3(0.88, 0.86, 0.78);   // clear antique
  if (h < 0.42)             return vec3(0.16, 0.38, 0.60);   // celeste deep
  if (h < 0.64)             return vec3(0.34, 0.58, 0.78);   // celeste pale
  if (h < 0.78)             return vec3(0.62, 0.18, 0.12);   // ruby
  if (h < 0.93)             return vec3(0.78, 0.40, 0.16);   // amber
  return vec3(0.80, 0.62, 0.22);                             // gold
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  // width-anchored design space
  vec2 q = vec2(p.x * 0.75, (p.y - 0.5) * 0.75 / max(aspect, 0.001) + 0.5);
  float t10 = u_p * 10.0;

  // organic leading: warp the space, then cut it on a grid
  vec2 w = q * vec2(9.0, 12.0);
  w += 0.55 * vec2(fbm(q * 5.1 + 3.7), fbm(q * 5.1 + 9.2)) - 0.275;
  vec2 cell = floor(w);
  vec2 f = fract(w);
  float came = min(min(f.x, 1.0 - f.x), min(f.y, 1.0 - f.y)); // distance to lead

  // per-pane character
  float h = hash(cell * 1.7 + 0.31);
  float clearish = step(0.92, hash(cell * 3.1 + 7.7));
  vec3 pane = glass(h, clearish);
  // streaks in the glass, each pane rolled in its own direction
  float ang = hash(cell * 2.3) * 6.2832;
  vec2 dir = vec2(cos(ang), sin(ang));
  float streak = fbm(vec2(dot(q, dir) * 26.0, dot(q, vec2(-dir.y, dir.x)) * 5.0));
  pane *= 0.82 + 0.36 * streak;
  // seeds and bubbles
  float bubble = step(0.994, hash(floor(q * 430.0)));
  pane += bubble * 0.10;

  // ---- five roundels at the goal minutes, time falling top to bottom ----
  // x positions composed by hand; petals in the scorer's glass
  for (int i = 0; i < 5; i++){
    float gm = i==0 ? 29.0 : i==1 ? 59.0 : i==2 ? 92.0 : i==3 ? 103.0 : 111.0;
    float isArg = (i==0 || i==2 || i==4) ? 1.0 : 0.0;
    float og = i==4 ? 1.0 : 0.0;
    vec2 c = vec2(
      i==0 ? 0.245 : i==1 ? 0.525 : i==2 ? 0.230 : i==3 ? 0.510 : 0.375,
      mix(0.86, 0.14, gm / 120.0)
    );
    float r = i==4 ? 0.070 : 0.088;
    float d = length(q - c);
    if (d < r + 0.012){
      float petal = 0.0;
      float a2 = atan(q.y - c.y, q.x - c.x);
      // radial cames: 8 petals + hub ring
      float spokes = abs(mod(a2 * 1.2732 + 8.0, 1.0) - 0.5) * 2.0; // 8 sectors
      float ringD = min(abs(d - r), min(abs(d - r * 0.42), spokes * d * 1.4)) * 3.2;
      if (og > 0.5){
        pane = glass(0.0, 1.0) * (0.9 + 0.2 * streak);       // clear rose
      } else {
        float ph = hash(vec2(float(i) * 3.3, floor(a2 * 1.2732 + 8.0)));
        pane = isArg > 0.5 ? glass(ph * 0.6, 0.0) : glass(0.66 + ph * 0.3, 0.0);
        pane *= 0.84 + 0.3 * streak;
        if (d < r * 0.42) pane = vec3(0.80, 0.62, 0.22) * (0.8 + 0.3 * streak); // gold hub
      }
      came = min(ringD * 7.0, came);
      petal = 1.0;
    }
  }

  // ---- the light behind the window rises once ----
  // panes wake in a staggered order as the light reaches them
  float sun = ease(t10 / 7.5);
  vec2 lightC = vec2(0.375, 1.05);
  float fall = 1.0 - clamp(length(q - lightC) / 1.35, 0.0, 1.0);
  float wake = ease((sun * 1.6 - hash(cell * 5.3) * 0.55 - (1.0 - fall)) * 2.2);
  float light = (0.08 + 0.80 * sun * (0.32 + 0.68 * fall)) * (0.22 + 0.78 * wake);

  vec3 col = pane * light;
  // transmission bloom on the brightest glass
  col += pane * pow(light, 3.0) * 0.35;

  // the lead: dark, soft-edged, slightly lit on top
  float lead = 1.0 - smoothstep(0.035, 0.085, came);
  vec3 leadC = vec3(0.075, 0.065, 0.06) + vec3(0.06) * light * 0.3;
  col = mix(col, leadC, lead);

  // stone dark around everything the light hasn't reached
  col *= 0.35 + 0.65 * smoothstep(0.0, 0.15, light);

  // grain + vignette
  col += (hash(gl_FragCoord.xy * 0.73) - 0.5) * 0.028;
  float vig = smoothstep(1.5, 0.55, length(p - vec2(0.5, 0.5)));
  col *= mix(0.78, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008c");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  n: "008", v: "c", title: "vitral", date: "06·07·2026",
  data: M.frameData, tech: "glsl · stained glass",
  dark: true,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// the light rises once (10s), then the window glows still — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
