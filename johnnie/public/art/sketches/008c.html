<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script type="importmap">{ "imports": { "three": "../lib/three.module.min.js" } }</script>
<script type="module">
// 008 — c · constelación — the match as a star chart.
// Time falls down the axis (0' top → 120' bottom). Every shot is a star:
// argentina west of the meridian, cabo verde east; on-target stars sit
// close and burn bright, off-target ones drift dim and far. The five
// goals are the brightest bodies, haloed — the own goal (111') wears a
// dashed, hollow halo. Faint constellation lines join each side's shots
// in order; rings cross the axis at 45/90/105. A 26s replay slides down
// the meridian and makes each goal flare as it passes.
// data: counts exact from M8; individual shot minutes seeded per phase
// (only phase totals exist); on-target split of non-goal shots is the
// real on-target total minus goals; the og is charted as an argentina
// body (it is argentina's goal) though it isn't in arg's shot count.
// three.js · star chart.

import * as THREE from "three";

const seed = ART.seed("2026-07-06-008c");
const M = window.M8;

const Y_TOP = 0.92, Y_BOT = -0.92;              // minute 0 → 120
const yOf = (min) => Y_TOP + (min / 120) * (Y_BOT - Y_TOP);
const DIST = 4.2, FOV = 34;

let renderer, scene, camera, built = false;
let starMat, goalBodies = [], marker, clockLine, dust, grainTex, grainScene, grainCam;

const F = FRAME.mount({
  n: "008", v: "c", title: "constelación", date: "06·07·2026",
  data: M.frameData, tech: "three.js · star chart",
  dark: true,
  onResize(w, h, dpr) {
    if (!built) build();
    renderer.setPixelRatio(dpr);
    renderer.setSize(w / dpr, h / dpr, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  },
});

/* ---------- seeded shot catalogue (real counts, seeded minutes) ---------- */
function catalogue(team) {
  const Rt = ART.rng(seed + "-shots-" + team);
  const phases = [[0, 45], [45, 90], [90, 120]];
  const goals = M.goals.filter((g) => g.team === team);
  const out = [];
  M.shotsPhase[team].forEach((count, pi) => {
    const [a, b] = phases[pi];
    const gHere = goals.filter((g) => g.min > a && g.min <= b);
    for (let i = 0; i < count - gHere.length; i++)
      out.push({ min: a + 1.5 + Rt() * (b - a - 3), goal: null });
  });
  // deterministic shuffle, then flag on-target (goals are on target already)
  for (let i = out.length - 1; i > 0; i--) {
    const j = (Rt() * (i + 1)) | 0;
    [out[i], out[j]] = [out[j], out[i]];
  }
  const nOn = M.onTarget[team] - goals.filter((g) => !g.og).length;
  out.forEach((s, i) => (s.on = i < nOn));
  goals.forEach((g) => out.push({ min: g.exact || g.min, on: true, goal: g }));
  out.sort((a, b) => a.min - b.min);
  // chart position: seeded distance from the meridian + tiny depth
  const Rp = ART.rng(seed + "-pos-" + team);
  const side = team === "arg" ? -1 : 1;
  out.forEach((s) => {
    const d = s.goal ? 0.14 + Rp() * 0.10
      : s.on ? 0.16 + Rp() * 0.18
      : 0.40 + Rp() * 0.32;
    s.x = side * d;
    s.y = yOf(s.min) + (Rp() - 0.5) * 0.012;
    s.z = (Rp() - 0.5) * 0.34;
  });
  return out;
}

/* ---------- offscreen glow / ring textures ---------- */
function glowTex() {
  const c = document.createElement("canvas");
  c.width = c.height = 128;
  const g = c.getContext("2d");
  const rad = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  rad.addColorStop(0, "rgba(255,255,255,1)");
  rad.addColorStop(0.18, "rgba(255,255,255,.85)");
  rad.addColorStop(0.45, "rgba(255,255,255,.22)");
  rad.addColorStop(1, "rgba(255,255,255,0)");
  g.fillStyle = rad;
  g.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
function ringTex(dashed) {
  const c = document.createElement("canvas");
  c.width = c.height = 256;
  const g = c.getContext("2d");
  g.strokeStyle = "rgba(255,255,255,.95)";
  g.lineWidth = 7;
  g.shadowColor = "rgba(255,255,255,.9)";
  g.shadowBlur = 10;
  if (dashed) g.setLineDash([16, 13]);
  g.beginPath();
  g.arc(128, 128, 96, 0, Math.PI * 2);
  g.stroke();
  return new THREE.CanvasTexture(c);
}
function textSprite(str, hex, px) {
  const dpr = 3, pad = 8;
  const c = document.createElement("canvas");
  const g = c.getContext("2d");
  g.font = px * dpr + "px 'Fragment Mono', ui-monospace, monospace";
  c.width = Math.ceil(g.measureText(str).width) + pad * 2;
  c.height = px * dpr + pad * 2;
  g.font = px * dpr + "px 'Fragment Mono', ui-monospace, monospace";
  g.fillStyle = hex;
  g.textBaseline = "middle";
  g.fillText(str, pad, c.height / 2);
  const tex = new THREE.CanvasTexture(c);
  const m = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sp = new THREE.Sprite(m);
  const hWorld = 0.052 * (px / 13);
  sp.scale.set(hWorld * c.width / c.height, hWorld, 1);
  return sp;
}

/* ---------- build ---------- */
function build() {
  built = true;
  renderer = new THREE.WebGLRenderer({ canvas: F.canvas, antialias: true });
  renderer.autoClear = false;
  scene = new THREE.Scene();
  scene.background = new THREE.Color(M.ink.night);
  scene.fog = new THREE.Fog(0x0a0a0c, 3.4, 6.4);
  camera = new THREE.PerspectiveCamera(FOV, 3 / 4, 0.1, 12);

  const argStars = catalogue("arg");
  const cpvStars = catalogue("cpv");
  const all = argStars.concat(cpvStars);

  // --- meridian + minute ticks
  const axisMat = new THREE.LineBasicMaterial({ color: 0xf4f0e5, transparent: true, opacity: 0.38 });
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0, Y_TOP + 0.03, 0), new THREE.Vector3(0, Y_BOT - 0.03, 0)]), axisMat));
  const tickPts = [];
  for (let m = 15; m < 120; m += 15) {
    if (m === 45 || m === 90 || m === 105) continue;
    tickPts.push(new THREE.Vector3(-0.02, yOf(m), 0), new THREE.Vector3(0.02, yOf(m), 0));
  }
  scene.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(tickPts),
    new THREE.LineBasicMaterial({ color: 0xf4f0e5, transparent: true, opacity: 0.22 })));

  // --- period rings at 45 / 90 / 105
  const circ = [];
  for (let i = 0; i <= 96; i++) {
    const a = (i / 96) * Math.PI * 2;
    circ.push(new THREE.Vector3(Math.cos(a), 0, Math.sin(a)));
  }
  const circGeo = new THREE.BufferGeometry().setFromPoints(circ);
  for (const m of M.periods) {
    const ring = new THREE.Line(circGeo,
      new THREE.LineBasicMaterial({ color: 0xf4f0e5, transparent: true, opacity: 0.13 }));
    ring.scale.setScalar(0.56);
    ring.position.y = yOf(m);
    scene.add(ring);
  }

  // --- background dust (seeded, a few thousand)
  const Rd = ART.rng(seed + "-dust");
  const ND = 2600;
  const dp = new Float32Array(ND * 3);
  for (let i = 0; i < ND; i++) {
    const r = 1.6 + Rd() * 2.4, th = Rd() * Math.PI * 2, ph = Math.acos(2 * Rd() - 1);
    dp[i * 3] = r * Math.sin(ph) * Math.cos(th);
    dp[i * 3 + 1] = (Rd() - 0.5) * 3.4;
    dp[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
  }
  const dg = new THREE.BufferGeometry();
  dg.setAttribute("position", new THREE.BufferAttribute(dp, 3));
  dust = new THREE.Points(dg, new THREE.PointsMaterial({
    color: 0x6f7887, size: 0.006, transparent: true, opacity: 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  scene.add(dust);

  // --- constellation lines (consecutive shots per team)
  for (const [stars, hex] of [[argStars, M.ink.arg], [cpvStars, M.ink.cpv]]) {
    const pts = stars.map((s) => new THREE.Vector3(s.x, s.y, s.z));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({
        color: hex, transparent: true, opacity: 0.22,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })));
  }

  // --- shot stars (points, additive, twinkling shader)
  const N = all.length;
  const pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  const info = new Float32Array(N * 3);           // size, phase, minute
  const cArg = new THREE.Color(M.ink.arg), cCpv = new THREE.Color(M.ink.cpv);
  const Rs = ART.rng(seed + "-sz");
  all.forEach((s, i) => {
    pos[i * 3] = s.x; pos[i * 3 + 1] = s.y; pos[i * 3 + 2] = s.z;
    const c = s.x < 0 ? cArg : cCpv;
    const b = s.goal ? 1.0 : s.on ? 0.88 : 0.46;
    col[i * 3] = c.r * b + (s.goal ? 0.25 : 0);
    col[i * 3 + 1] = c.g * b + (s.goal ? 0.22 : 0);
    col[i * 3 + 2] = c.b * b + (s.goal ? 0.15 : 0);
    info[i * 3] = s.goal ? 46 : s.on ? 26 + Rs() * 8 : 13 + Rs() * 6;
    info[i * 3 + 1] = Rs();
    info[i * 3 + 2] = s.min;
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("aCol", new THREE.BufferAttribute(col, 3));
  geo.setAttribute("aInfo", new THREE.BufferAttribute(info, 3));
  starMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: { uTime: { value: 0 }, uClock: { value: 0 }, uDpr: { value: F.DPR } },
    vertexShader: `
      attribute vec3 aCol; attribute vec3 aInfo;
      uniform float uTime, uClock, uDpr;
      varying vec3 vCol; varying float vA;
      void main(){
        vCol = aCol;
        float tw = 0.80 + 0.20 * sin(uTime*(0.6 + aInfo.y*1.9) + aInfo.y*41.0);
        float near = exp(-abs(uClock - aInfo.z) * 0.5);
        vA = tw + near * 0.7;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aInfo.x * (1.0 + near*0.55) * uDpr * (3.9 / -mv.z);
      }`,
    fragmentShader: `
      precision highp float;
      varying vec3 vCol; varying float vA;
      void main(){
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float core = smoothstep(0.42, 0.0, d);
        float glow = pow(max(0.0, 1.0 - d), 2.4) * 0.45;
        float a = (core + glow) * vA;
        gl_FragColor = vec4(vCol * a, a);
      }`,
  });
  scene.add(new THREE.Points(geo, starMat));

  // --- the five goals: halo rings (dashed + hollow for the og)
  const gTex = glowTex(), rTex = ringTex(false), rTexDash = ringTex(true);
  for (const g of M.goals) {
    const star = all.find((s) => s.goal === g);
    const hex = g.team === "arg" ? M.ink.arg : M.ink.cpv;
    const grp = new THREE.Group();
    grp.position.set(star.x, star.y, star.z);
    const halo = new THREE.Sprite(new THREE.SpriteMaterial({
      map: g.og ? rTexDash : rTex, color: g.og ? 0xf4f0e5 : hex,
      transparent: true, opacity: 0.7, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    const haloBase = g.og ? 0.13 : 0.115;
    halo.scale.setScalar(haloBase);
    grp.add(halo);
    let core = null;
    if (!g.og) {
      core = new THREE.Sprite(new THREE.SpriteMaterial({
        map: gTex, color: 0xfff6de,
        transparent: true, opacity: 0.9, depthWrite: false, blending: THREE.AdditiveBlending,
      }));
      core.scale.setScalar(0.11);
      grp.add(core);
    }
    scene.add(grp);
    goalBodies.push({ g, grp, halo, haloBase, core });
  }

  // --- replay marker riding the meridian + faint clock rule
  marker = new THREE.Sprite(new THREE.SpriteMaterial({
    map: gTex, color: 0xe9b32a, transparent: true, opacity: 0.95,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  marker.scale.setScalar(0.06);
  scene.add(marker);
  clockLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(-0.72, 0, 0), new THREE.Vector3(0.72, 0, 0)]),
    new THREE.LineBasicMaterial({ color: 0xe9b32a, transparent: true, opacity: 0.10 }));
  scene.add(clockLine);

  // --- film grain overlay (post sprite, own ortho pass)
  const gc = document.createElement("canvas");
  gc.width = gc.height = 256;
  const gg = gc.getContext("2d");
  const img = gg.createImageData(256, 256);
  const Rg = ART.rng(seed + "-grain");
  for (let i = 0; i < img.data.length; i += 4) {
    const v = (Rg() * 7) | 0;
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = 255;
  }
  gg.putImageData(img, 0, 0);
  grainTex = new THREE.CanvasTexture(gc);
  grainTex.wrapS = grainTex.wrapT = THREE.RepeatWrapping;
  grainTex.repeat.set(4.5, 6);
  grainScene = new THREE.Scene();
  grainCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  grainScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2),
    new THREE.MeshBasicMaterial({ map: grainTex, blending: THREE.AdditiveBlending,
      depthTest: false, depthWrite: false })));

  // --- labels (drawn after the mono font is ready)
  document.fonts.ready.then(() => {
    const argL = textSprite("argentina", "rgba(158,196,224,.9)", 13);
    argL.center.set(1, 0.5); argL.position.set(-0.10, Y_TOP + 0.015, 0);
    scene.add(argL);
    const cpvL = textSprite("cabo verde", "rgba(224,148,138,.9)", 13);
    cpvL.center.set(0, 0.5); cpvL.position.set(0.10, Y_TOP + 0.015, 0);
    scene.add(cpvL);
    for (const m of M.periods) {
      const s = textSprite(m + "’", "rgba(244,240,229,.5)", 11);
      s.center.set(0, 0.5); s.position.set(0.585, yOf(m), 0);
      scene.add(s);
    }
    for (const b of goalBodies) {
      const g = b.g;
      const hex = g.team === "arg" ? "rgba(178,212,236,.95)" : "rgba(233,168,158,.95)";
      const s = textSprite(g.min + "’ " + g.player, g.og ? "rgba(244,240,229,.85)" : hex, 12);
      const left = g.team === "arg";
      s.center.set(left ? 1 : 0, 0.5);
      s.position.set(b.grp.position.x + (left ? -0.085 : 0.085), b.grp.position.y + 0.052, b.grp.position.z);
      scene.add(s);
    }
  });
}

/* ---------- loop ---------- */
let raf;
function loop(tms) {
  const t = tms / 1000;
  const cycle = t % 34;
  const clock = Math.min(120, (cycle / 26) * 120);

  starMat.uniforms.uTime.value = t;
  starMat.uniforms.uClock.value = clock;
  starMat.uniforms.uDpr.value = F.DPR;

  for (const b of goalBodies) {
    const p = clock - b.g.min;
    const k = p >= 0 ? Math.exp(-p * 0.30) : 0;
    const br = 0.9 + 0.1 * Math.sin(t * 1.3 + b.g.min);
    b.halo.scale.setScalar(b.haloBase * (1 + k * 0.9) * br);
    b.halo.material.opacity = 0.55 + k * 0.45;
    b.halo.material.rotation = b.g.og ? t * 0.22 : 0;
    if (b.core) {
      b.core.scale.setScalar(0.105 * (1 + k * 0.7));
      b.core.material.opacity = 0.75 + k * 0.25;
    }
  }

  const cy = yOf(clock);
  marker.position.set(0, cy, 0.02);
  marker.material.opacity = cycle > 26 ? 0.35 : 0.95;
  clockLine.position.y = cy;
  clockLine.material.opacity = cycle > 26 ? 0.04 : 0.10;

  dust.rotation.y = t * 0.012;

  // slow, small orbit — parallax without losing the chart
  const az = 0.34 * Math.sin(t * 0.06);
  camera.position.set(Math.sin(az) * DIST, 0.10 * Math.sin(t * 0.041), Math.cos(az) * DIST);
  camera.lookAt(0, 0, 0);

  grainTex.offset.set((t * 1.7) % 1, (t * 2.3) % 1);

  renderer.clear();
  renderer.render(scene, camera);
  renderer.render(grainScene, grainCam);
  raf = requestAnimationFrame(loop);
}
queueMicrotask(() => { if (!built) build(); raf || requestAnimationFrame(loop); });
</script>
