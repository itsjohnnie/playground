<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<body>
<script src="../art.js"></script>
<script src="../frame.js"></script>
<script src="data-008.js"></script>
<script id="frag" type="x-shader">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_seed; uniform float u_p;

// 008 — c · marea — the match as a dusk shoreline. Six ridge lines —
// argentina and cabo verde through the three phases of the night —
// rise from the water and settle; their silhouettes carry the real
// per-phase xG and seeded swells stand in for the shots. A low gold
// sun hangs at minute 111 of 120. Dithered like an old travel poster.
// The tide comes in once, then the scene rests.

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)) + u_seed)*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++){ s += a*vnoise(p); p = p*2.03 + 11.7; a *= 0.5; }
  return s;
}

float bayer2(vec2 a){ a = floor(a); return fract(a.x/2.0 + a.y*a.y*0.75); }
float bayer4(vec2 a){ return bayer2(0.5*a)*0.25 + bayer2(a); }
float bayer8(vec2 a){ return bayer4(0.5*a)*0.25 + bayer2(a); }

float ease(float t){ t = clamp(t, 0.0, 1.0); return 1.0 - pow(1.0 - t, 3.0); }

float swell(float x, float m, float h){
  float d = x - m/120.0;
  return h * exp(-d*d/0.00028);
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float t10 = u_p * 10.0;

  float horizon = 0.585;

  // dusk sky: indigo falling into ember at the waterline
  vec3 indigo = vec3(0.082, 0.098, 0.196);
  vec3 ember  = vec3(0.485, 0.222, 0.196);
  vec3 glowc  = vec3(0.845, 0.492, 0.252);
  vec3 col;
  if (p.y > horizon) {
    float sy = (p.y - horizon) / (1.0 - horizon);
    col = mix(ember, indigo, pow(sy, 0.72));
    col = mix(glowc, col, smoothstep(0.0, 0.30, sy));
  } else {
    // water: the sky remembered, darker
    float wy = (horizon - p.y) / horizon;
    col = mix(ember*0.85, indigo*0.55, pow(wy, 0.8));
  }

  // the sun — minute 111 of 120 across the sky, low and gold, risen once
  {
    float s = ease((t10 - 0.6)/5.0);
    float aspect = u_res.x / u_res.y;
    vec2 q = vec2(p.x * aspect, p.y);         // metric-true so the disc stays round
    vec2 c = vec2(aspect * 0.835, mix(horizon-0.12, horizon+0.105, s));
    float d = length(q - c);
    float disc = 1.0 - smoothstep(0.050, 0.056, d);
    float glow = (1.0 - smoothstep(0.0, 0.34, d)) * 0.26 * s;
    vec3 gold = vec3(0.94, 0.72, 0.30);
    col += gold * glow;
    col = mix(col, gold, disc * s);
    // its path on the water
    float refl = (1.0 - smoothstep(0.0, 0.05, abs(p.x - 0.835))) *
                 smoothstep(horizon, horizon - 0.45, p.y) * 0.14 * s;
    col += gold * refl;
  }

  // six ridges, far→near, alternating team; amplitude ∝ that phase's xG
  for (int i = 0; i < 6; i++){
    float fi = float(i);
    float s = ease((t10 - (1.6 + fi*0.85)) / 4.2);
    if (s <= 0.0) continue;

    float isArg = mod(fi, 2.0) < 1.0 ? 1.0 : 0.0;
    float xg    = i==0 ? 0.46 : i==1 ? 0.08 : i==2 ? 1.31 : i==3 ? 0.23 : i==4 ? 0.58 : 0.45;
    float base  = horizon - 0.030 - fi * 0.078;
    float amp   = 0.030 + xg * 0.072;

    float x = p.x;
    float ridge = base
      + amp * (fbm(vec2(x*3.1 + fi*17.0, fi*7.3)) - 0.35)
      + swell(x, 12.0 + hash(vec2(fi,1.0))*30.0, amp*0.30)
      + swell(x, 48.0 + hash(vec2(fi,2.0))*38.0, amp*0.24)
      + swell(x, 92.0 + hash(vec2(fi,3.0))*26.0, amp*0.28);

    ridge = mix(ridge - 0.28, ridge, s);   // rises out of the water

    float m = smoothstep(ridge + 0.0018, ridge - 0.0018, p.y);

    vec3 argC = mix(vec3(0.295, 0.435, 0.585), vec3(0.052, 0.092, 0.158), fi/5.0);
    vec3 cpvC = mix(vec3(0.492, 0.238, 0.205), vec3(0.108, 0.048, 0.058), fi/5.0);
    vec3 ink = mix(cpvC, argC, isArg);
    ink *= mix(1.0, 0.82, clamp((ridge - p.y)*6.0, 0.0, 1.0));

    col = mix(col, ink, m * s);
  }

  // print pass: bayer-dithered poster quantization
  float cell = max(2.0, floor(u_res.y / 340.0));
  float th = bayer8(gl_FragCoord.xy / cell) - 0.5;
  float levels = 5.0;
  col = floor(col * levels + 0.5 + th * 0.95) / levels;

  // grain + vignette
  float g2 = hash(gl_FragCoord.xy * 0.7);
  col += (g2 - 0.5) * 0.03;
  float vig = smoothstep(1.35, 0.5, length(p - vec2(0.5, 0.5)));
  col *= mix(0.90, 1.0, vig);

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
const seed = ART.seed("2026-07-06-008c");
const M = window.M8;
let sh = null, done = false, start = null;

const F = FRAME.mount({
  n: "008", v: "c", title: "marea", date: "06·07·2026",
  data: M.frameData, tech: "glsl · dither scene",
  dark: true,
  onResize() {
    if (!sh) sh = ART.shader(F.canvas, document.getElementById("frag").textContent, ["u_p"]);
    done = false;
    start = null;
    requestAnimationFrame(loop);
  },
});
const sf = ART.rng(seed)() * 100;

// the tide comes in once (10s), then the scene rests — no loop
function loop(tms) {
  if (!sh || done) return;
  if (start === null) start = tms;
  const p = Math.min(1, (tms - start) / 10000);
  sh.gl.uniform1f(sh.extra.u_p, p);
  sh.draw(tms / 1000, sf);
  if (p >= 1) { done = true; return; }
  requestAnimationFrame(loop);
}
</script>
