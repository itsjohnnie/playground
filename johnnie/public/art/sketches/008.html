<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<canvas id="c"></canvas>
<script src="../art.js"></script>
<script>
// 008 · miami — Argentina 3–2 Cabo Verde (a.e.t.), World Cup 2026 R32,
// Hard Rock Stadium, 3 July 2026. The match printed as two risograph
// inks sharing one river: the boundary is the real balance of the game
// (possession + xG by phase), goals surge across it, every shot is a
// stitch. The piece replays itself — 120 minutes in 26 seconds.
//
// All marks are real data (FotMob/Sofascore/Opta/xGscore, 2026-07-06):
// goals 29' messi, 59' d. duarte, 92' l. martínez, 103' lopes cabral,
// 111' og; possession 64–36; xG 2.16–0.45 (by phase 0.46/1.31/0.58 vs
// 0.08/0.23/0.45); shots 22–16 (10–5 on target); yellows 69' & 115';
// hydration breaks 26' & 73'; attendance 64,478. Shot placement inside
// each phase is seeded approximation — the counts are exact.

const MATCH = {
  goals: [
    { min: 29,  team: "arg", label: "29' messi" },
    { min: 59,  team: "cpv", label: "59' d. duarte" },
    { min: 92,  team: "arg", label: "92' l. martínez" },
    { min: 103, team: "cpv", label: "103' lopes cabral" },
    { min: 111, team: "arg", label: "111' og", og: true },
  ],
  cards: [{ min: 69, team: "cpv" }, { min: 115, team: "arg" }],
  breaks: [26, 73],
  periods: [45, 90, 105],
  // phase share of the ink river = blend of possession (64%) and xG share
  phases: [
    { a: 0,  b: 45,  xga: 0.46, xgc: 0.08 },
    { a: 45, b: 90,  xga: 1.31, xgc: 0.23 },
    { a: 90, b: 120, xga: 0.58, xgc: 0.45 },
  ],
  shots: { arg: [4, 12, 6], cpv: [2, 5, 9] },   // per phase, sums 22 / 16
  sot:   { arg: 10, cpv: 5 },
};

const INK = {
  arg: "108,171,214", argDeep: "43,106,153",
  cpv: "213,73,60",  cpvDeep: "168,44,34",
  card: "233,179,42",
  text: "32,29,24",
};

const seed = ART.seed("2026-07-06-008");
const R = ART.rng(seed);
const N = ART.makeNoise(seed);
const canvas = ART.fit(document.getElementById("c"), init);
const ctx = canvas.getContext("2d");

let W, H, DPR = 2, mx, usable, bandTop, bandBot, grain, ticks;

function xFor(min) { return mx + (min / 120) * usable; }

// river share for argentina at a given minute (before wobble)
function baseFlow(min) {
  const pts = MATCH.phases.map((p) => ({
    m: (p.a + p.b) / 2,
    f: 0.64 * 0.68 + (p.xga / (p.xga + p.xgc)) * 0.32,
  }));
  if (min <= pts[0].m) return pts[0].f;
  if (min >= pts[2].m) return pts[2].f;
  const i = min < pts[1].m ? 0 : 1;
  const t = (min - pts[i].m) / (pts[i + 1].m - pts[i].m);
  return pts[i].f + (pts[i + 1].f - pts[i].f) * (t * t * (3 - 2 * t));
}

function boundary(min, z) {
  let f = baseFlow(min) + 0.075 * N.fbm3(min * 0.09, 7.3, z, 3);
  f = Math.max(0.2, Math.min(0.9, f));
  let y = bandTop + f * (bandBot - bandTop);
  for (const g of MATCH.goals) {
    const d = min - g.min;
    y += (g.team === "arg" ? 1 : -1) * 0.075 * H * Math.exp(-(d * d) / 9.5);
  }
  return y;
}

function init(w, h, dpr) {
  W = w; H = h; DPR = dpr || 2;
  mx = 0.08 * W;
  usable = W - 2 * mx;
  bandTop = 0.33 * H;
  bandBot = 0.67 * H;

  // seeded shot minutes per team/phase; first `sot` of a shuffle are on-target
  const Rt = ART.rng(seed + "ticks");
  ticks = [];
  for (const team of ["arg", "cpv"]) {
    const all = [];
    MATCH.shots[team].forEach((count, pi) => {
      const p = MATCH.phases[pi];
      for (let i = 0; i < count; i++)
        all.push(p.a + 2 + Rt() * (p.b - p.a - 4));
    });
    // shuffle to mark on-target
    for (let i = all.length - 1; i > 0; i--) {
      const j = (Rt() * (i + 1)) | 0;
      [all[i], all[j]] = [all[j], all[i]];
    }
    all.forEach((min, i) => ticks.push({ team, min, on: i < MATCH.sot[team] }));
  }

  // paper grain, rendered once
  grain = document.createElement("canvas");
  grain.width = W; grain.height = H;
  const g = grain.getContext("2d");
  const img = g.createImageData(W, H);
  const Rg = ART.rng(seed + "grain");
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 118 + Rg() * 20 | 0;
    img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
    img.data[i + 3] = 26;
  }
  g.putImageData(img, 0, 0);
}

function ribbon(z, yTopOf, yBotOf, rgb, alpha, dx, dy) {
  ctx.save();
  ctx.translate(dx, dy);
  ctx.globalCompositeOperation = "multiply";
  ctx.fillStyle = `rgba(${rgb},${alpha})`;
  ctx.beginPath();
  const step = Math.max(2, W / 380);
  for (let x = mx; x <= W - mx; x += step) {
    const min = ((x - mx) / usable) * 120;
    const y = yTopOf(min);
    x === mx ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  for (let x = W - mx; x >= mx; x -= step) {
    const min = ((x - mx) / usable) * 120;
    ctx.lineTo(x, yBotOf(min));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw(tms) {
  const t = tms / 1000;
  const z = t * 0.025;
  const cycle = t % 34;
  const prog = Math.min(1, cycle / 26);
  const minute = Math.round(prog * 120);
  const dp = DPR;                           // device px per css px
  const fLabel = Math.max(0.0145 * W, 9.5 * dp);
  const fTitle = Math.max(0.026 * W, 14 * dp);
  const mono = "ui-monospace, Menlo, Consolas, monospace";

  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#f4efe4";
  ctx.fillRect(0, 0, W, H);

  // ---- header (always on) ----
  ctx.fillStyle = `rgba(${INK.text},0.88)`;
  ctx.font = fTitle + "px " + mono;
  ctx.textAlign = "center";
  ctx.fillText("argentina 3 — cabo verde 2", W / 2, 0.095 * H);
  ctx.fillStyle = `rgba(${INK.text},0.45)`;
  ctx.font = fLabel + "px " + mono;
  ctx.fillText("prórroga · mundial 2026 · dieciseisavos · miami · 3 jul", W / 2, 0.132 * H);

  // running clock while the match replays
  ctx.textAlign = "left";
  ctx.fillStyle = `rgba(${INK.text},0.4)`;
  ctx.fillText(prog < 1 ? minute + "’" : "final", mx, 0.185 * H);

  // ---- everything below reveals with the sweep ----
  const sweepX = mx + prog * (usable + 0.02 * W);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0.16 * H, sweepX, 0.72 * H);
  ctx.clip();

  const yTopEdge = (min) => bandTop + 0.010 * H * N.fbm3(min * 0.05 + 3.1, 1.7, z, 3);
  const yBotEdge = (min) => bandBot + 0.010 * H * N.fbm3(min * 0.05 + 9.4, 5.2, z, 3);
  const yBound = (min) => boundary(min, z);

  // goal beams behind the river
  for (const g of MATCH.goals) {
    const gx = xFor(g.min);
    const rgb = g.team === "arg" ? INK.arg : INK.cpv;
    const grad = ctx.createLinearGradient(gx - 0.028 * W, 0, gx + 0.028 * W, 0);
    grad.addColorStop(0, `rgba(${rgb},0)`);
    grad.addColorStop(0.5, `rgba(${rgb},0.30)`);
    grad.addColorStop(1, `rgba(${rgb},0)`);
    ctx.globalCompositeOperation = "multiply";
    ctx.fillStyle = grad;
    ctx.fillRect(gx - 0.028 * W, 0.20 * H, 0.056 * W, 0.60 * H);
  }

  // the two inks, double-printed slightly off register
  ribbon(z, yTopEdge, yBound, INK.arg, 0.42, 1.6 * dp * 2, -1.1 * dp * 2);
  ribbon(z, yTopEdge, yBound, INK.arg, 0.78, 0, 0);
  ribbon(z, yBound, yBotEdge, INK.cpv, 0.40, -1.4 * dp * 2, 1.2 * dp * 2);
  ribbon(z, yBound, yBotEdge, INK.cpv, 0.72, 0, 0);

  // period lines + hydration slits (paper shows through)
  ctx.globalCompositeOperation = "source-over";
  for (const m of MATCH.periods) {
    ctx.fillStyle = "rgba(244,239,228,0.92)";
    ctx.fillRect(xFor(m) - 1.2 * dp * 2, 0.31 * H, 2.4 * dp * 2, 0.38 * H);
  }
  for (const m of MATCH.breaks) {
    ctx.fillStyle = "rgba(244,239,228,0.5)";
    ctx.fillRect(xFor(m) - 0.6 * dp * 2, 0.33 * H, 1.2 * dp * 2, 0.34 * H);
  }

  // shot stitches: above = argentina, below = cabo verde; solid = on target
  for (const s of ticks) {
    const x = xFor(s.min);
    const up = s.team === "arg";
    const rgb = up ? INK.argDeep : INK.cpvDeep;
    ctx.strokeStyle = `rgba(${rgb},${s.on ? 0.85 : 0.35})`;
    ctx.lineWidth = 1.6 * dp * 2;
    ctx.beginPath();
    ctx.moveTo(x, up ? 0.272 * H : 0.728 * H);
    ctx.lineTo(x, up ? 0.294 * H : 0.706 * H);
    ctx.stroke();
  }

  // yellow cards
  for (const c of MATCH.cards) {
    const x = xFor(c.min);
    const y = c.team === "arg" ? 0.247 * H : 0.753 * H;
    ctx.fillStyle = `rgba(${INK.card},0.95)`;
    const s = 0.009 * W;
    ctx.fillRect(x - s / 2, y - s * 1.3, s, s * 1.3);
  }

  // goal markers + labels (staggered rows so nothing collides)
  ctx.font = fLabel + "px " + mono;
  ctx.textAlign = "center";
  const rowsUp = { 29: 0.205, 92: 0.235, 111: 0.205 };
  const rowsDn = { 59: 0.80, 103: 0.83 };
  for (const g of MATCH.goals) {
    const gx = xFor(g.min);
    const gy = yBound(g.min);
    const rgb = g.team === "arg" ? INK.argDeep : INK.cpvDeep;
    ctx.globalCompositeOperation = "source-over";
    if (g.og) {
      ctx.fillStyle = "#f4efe4";
      ctx.strokeStyle = `rgba(${rgb},0.95)`;
      ctx.lineWidth = 2 * dp * 2;
      ctx.beginPath();
      ctx.arc(gx, gy, 0.011 * W, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(${rgb},0.95)`;
      ctx.beginPath();
      ctx.arc(gx, gy, 0.011 * W, 0, Math.PI * 2);
      ctx.fill();
    }
    const up = g.team === "arg";
    const ly = (up ? rowsUp[g.min] : rowsDn[g.min]) * H;
    ctx.fillStyle = `rgba(${rgb},0.95)`;
    const lx = Math.max(mx + 0.06 * W, Math.min(W - mx - 0.06 * W, gx));
    ctx.fillText(g.label, lx, ly);
  }
  ctx.restore();

  // ---- footer stats (always on) ----
  ctx.textAlign = "center";
  ctx.font = fLabel + "px " + mono;
  ctx.fillStyle = `rgba(${INK.text},0.55)`;
  ctx.fillText("posesión 64–36 · xg 2.16–0.45 · remates 22–16", W / 2, 0.885 * H);
  ctx.fillStyle = `rgba(${INK.text},0.38)`;
  ctx.fillText("messi 83 toques · vozinha 8 atajadas · 64.478 almas", W / 2, 0.917 * H);

  // side labels
  ctx.textAlign = "right";
  ctx.fillStyle = `rgba(${INK.argDeep},0.8)`;
  ctx.fillText("arg", mx - 0.012 * W, 0.375 * H);
  ctx.fillStyle = `rgba(${INK.cpvDeep},0.8)`;
  ctx.fillText("cpv", mx - 0.012 * W, 0.645 * H);

  // paper grain
  ctx.globalCompositeOperation = "multiply";
  ctx.drawImage(grain, 0, 0);
  ctx.globalCompositeOperation = "source-over";

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
ART.chrome({ n: "008", title: "miami", date: "2026-07-06" });
</script>
