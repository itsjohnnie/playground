// lit cell carries a character of the night's own data — the goals, the
// assists, the possession, the ground — running through the face like
// newsprint (an umbral is a threshold; the face sits on it). Two
// registers of light (a dim base and a hot layer redrawn above it) carve
// the features; the score sits above the brow; below the bright band a
// hidden register waits at alpha zero. Arrival and the tap-morph share
// one movement: an expansive luminance wave, each cell swelling as the
// front passes, a ripple of the hidden register rolling ahead of it.

// each face reads its nation's goals first. Hold and drag, and the
// finger is a torch: the quieter numbers rise to meet it and decay
// behind it. Seeded randomness only; reduced motion gets instant
// states; the piece rests at rAF-zero.

  mkTxt("INGLATERRA 1 ARGENTINA 2 GORDON 55′ ROGERS E. FERNÁNDEZ 85′ MESSI LAUTARO 90+2′ MESSI " +
        "POSESIÓN 64–36 XG 0.91–0.54 SEMIFINAL M102 MERCEDES-BENZ ATLANTA 68 239 ÁRBITRO ELFATH " +
        "15·07·2026 VAMOS POR LA CUARTA "),
];
// assign the running text to each face's lit cells, row-major
const CH = [MT, KT].map((G, f) => {
  const a = new Array(N).fill(" ");
  let p = 0;
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++)
    if (G[y][x] >= HI) { a[y * COLS + x] = TXT[f][p % TXT[f].length]; p++; }
  return a;
});
// the result and the three goals sit under the chin, full-bright
function stamp(map, row, text) {
  const c0 = Math.round((COLS - text.length) / 2);
  for (let i = 0; i < text.length; i++)
    if (text[i] !== " ") map.set(row * COLS + c0 + i, text[i]);
}
const OV = new Map();
stamp(OV, 65, "INGLATERRA 1 · ARGENTINA 2");
stamp(OV, 67, "GORDON 55′ — E. FERNÁNDEZ 85′ · LAUTARO 90+2′");
const HID = new Map();                       // the quieter numbers, for the torch
stamp(HID, 69, "MESSI ASISTIÓ LOS DOS GOLES");
stamp(HID, 71, "POSESIÓN 64–36 · XG 0.91–0.54");

let face = 0, entered = false;
let W = 0, H = 0, DPR = 1, fs = 8, cw = 4.8, chh = 9.1;

// fit the FACE (its lit columns), not the grid — the margins are blank
let C0 = COLS, C1 = 0;
for (const G of [MT, KT])
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++)
    if (G[y][x] >= HI) { if (x < C0) C0 = x; if (x > C1) C1 = x; }
for (const k of OV.keys()) {
  const x = k % COLS; if (x < C0) C0 = x; if (x > C1) C1 = x;
}

const F = FRAME.mount({
  num: 7, title: "Umbral", subject: "England vs. Argentina",
  edition: "07/8", date: "15·07·2026",
  stack: "embedded type · luminance wave", time: "108 minutes",
  desc: "The two captains set in the match&#x27;s own record — every lit cell a character of it, real type you can select; the shadow stays unprinted room. England lead through Gordon at 55′; Messi, no goal and both goals, turns it in the last five minutes — Enzo Fernández 85′, Lautaro 90+2′. Tap, and the portrait swells into the other captain. Hold and drag: a torch wakes the quieter numbers under the black.",
  dark: true, open: true, gesture: true, noCanvas: true,
  onResize(w, h, dpr) {
    W = w / dpr; H = h / dpr; DPR = dpr;
    metrics();
  },
});

const wrap = document.createElement("div");
wrap.className = "um";
wrap.innerHTML = '<div class="fw"><canvas id="bc"></canvas><canvas id="dm"></canvas><pre id="sel"></pre></div>';
F.stage.appendChild(wrap);
F.stage.style.touchAction = "none";
const pre2 = document.getElementById("sel");
const bc = document.getElementById("bc"), bg = bc.getContext("2d");
const dim = document.getElementById("dm"), dg = dim.getContext("2d");

function metrics() {
  if (!W) return;
  fs = Math.max(4, Math.min(W * 0.90 / ((C1 - C0 + 1) * 0.6), H * 0.80 / (ROWS * 1.14)));
  cw = fs * 0.6; chh = fs * 1.14;
  pre2.style.fontSize = fs + "px";
  for (const c of [bc, dim]) {
    c.style.width = (COLS * cw) + "px"; c.style.height = (ROWS * chh) + "px";
    c.width = Math.ceil(COLS * cw * DPR); c.height = Math.ceil(ROWS * chh * DPR);
  }
  if (entered) { setSelText(); render(performance.now()); drawDim(); }
}

/* ---- render: canvas glyphs at each cell's true luminance ---- */
const S = new Float32Array(N);               // transient glints, in ramp steps
let wave = null;                              // the one movement: enter and morph
const easeIO = (u) => u < 0.5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2;
// letters lay uniform ink, so tone rides two axes: alpha AND font
// weight — Geist Mono is variable 100–900, so the cheeks whisper in
// hairline and the brow prints near-black, the way the old ramp's dot
// density carved the face
const GR = new Float32Array(N);
{ const g = ART.rng(seed + "-grain");
  for (let i = 0; i < N; i++) GR[i] = (g() - 0.5) * 3.4; }
const tOf = (l) => Math.max(0, Math.min(1, (l - HI) / (35 - HI)));
const aOf = (l) => l < HI ? 0 : Math.min(1, 0.07 + 0.93 * Math.pow(tOf(l), 1.85));
const WGT = [180, 330, 480, 630, 780, 900];
const wOf = (l) => WGT[Math.min(5, (Math.pow(tOf(l), 1.25) * 6) | 0)];
function setSelText() {
  // the invisible copy layer: the current face's record, plus the score
  let o = "";
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const i = y * COLS + x;
      o += OV.get(i) || ((face ? KT : MT)[y][x] >= HI ? CH[face][i] : " ");
    }
    o += "\n";
  }
  pre2.textContent = o;
}
function render(now) {
  const t = wave ? now - wave.t0 : intro ? now - intro.t0 : 0;
  bg.setTransform(DPR, 0, 0, DPR, 0, 0);
  bg.clearRect(0, 0, COLS * cw, ROWS * chh);
  bg.textBaseline = "top";
  bg.fillStyle = "#f2f1ee";
  // bucket cells by weight so the font string is set once per pass
  const passes = WGT.map(() => []);
  const score = [];
  const G0 = face ? KT : MT, T0 = TXT[face];
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const i = y * COLS + x;
    let l, ch;
    if (intro) {
      const d = intro.delay[i];
      if (!d && !OV.has(i)) continue;
      if (t < d) continue;
      const ov = OV.get(i);
      l = G0[y][x] + GR[i];
      const k = intro.spin[i] ? Math.min(1, (t - d) / intro.spin[i]) : 1;
      if (k < 1) {
        // still spinning: a passing character of the record, swelling in
        const rc = T0[((R() * T0.length) | 0)];
        const aF = ov ? 1 : aOf(l);
        passes[WGT.indexOf(wOf(ov ? 35 : l))].push([rc, x, y, aF * (0.25 + 0.75 * k)]);
      } else if (ov) score.push([ov, x, y]);
      else {
        const a = aOf(l);
        if (a > 0.01) passes[WGT.indexOf(wOf(l))].push([CH[face][i], x, y, a]);
      }
      continue;
    }
    if (wave) {
      const d = Math.hypot((x - wave.cx) * 0.62, y - wave.cy);
      let u = (t - (d / wave.maxd) * wave.SPREAD) / wave.TWEEN;
      u = u < 0 ? 0 : u > 1 ? 1 : u;
      l = wave.fromL[i] + (wave.toL[i] - wave.fromL[i]) * easeIO(u);
      if (wave.toL[i] >= HI - 4 || wave.fromL[i] >= HI - 4) l += Math.sin(Math.PI * u) * 4;
      ch = (u > 0.55 ? CH[face] : wave.chOld)[i];
    } else {
      l = (face ? KT : MT)[y][x];
      ch = CH[face][i];
    }
    const ov = OV.get(i);
    if (ov) { score.push([ov, x, y]); continue; }
    if (ch === " ") continue;
    l += S[i] + GR[i];
    const a = aOf(l);
    if (a <= 0.01) continue;
    passes[WGT.indexOf(wOf(l))].push([ch, x, y, a]);
  }
  for (let k = 0; k < WGT.length; k++) {
    if (!passes[k].length) continue;
    bg.font = WGT[k] + " " + fs + "px 'Geist Mono',monospace";
    for (const [ch, x, y, a] of passes[k]) {
      bg.globalAlpha = a;
      bg.fillText(ch, x * cw, y * chh);
    }
  }
  bg.font = "560 " + fs + "px 'Geist Mono',monospace";
  bg.globalAlpha = 1;
  for (const [ov, x, y] of score) bg.fillText(ov, x * cw, y * chh);
}

/* ---- the dim register (and the numbers hiding in it) ---- */
const torch = new Float32Array(N);
let draf = 0;
function drawDim() {
  const G = face ? KT : MT;
  dg.setTransform(DPR, 0, 0, DPR, 0, 0);
  dg.clearRect(0, 0, COLS * cw, ROWS * chh);
  dg.font = "520 " + fs + "px 'Geist Mono',monospace";
  dg.textBaseline = "top";
  dg.fillStyle = "#f2f1ee";
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const i = y * COLS + x;
    const a = torch[i];
    if (a < 0.02) continue;
    const ch = HID.get(i) || dimAt(G[y][x]);
    if (ch === " ") continue;
    dg.globalAlpha = Math.min(1, a);
    dg.fillText(ch, x * cw, y * chh);
  }
  dg.globalAlpha = 1;
}
function dimLoop() {
  draf = 0;
  let alive = false;
  for (let i = 0; i < N; i++) {
    if (torch[i] > 0.01) { torch[i] *= 0.90; alive = true; } else torch[i] = 0;
  }
  drawDim();
  if (alive) draf = requestAnimationFrame(dimLoop);
}
const wakeDim = () => { if (!draf) draf = requestAnimationFrame(dimLoop); };

/* ---- the bright animator: waves and glints share one loop ---- */
let braf = 0;
function brightLoop(now) {
  braf = 0;
  let again = false;
  if (intro) {
    const t = now - intro.t0;
    // the ripple of the hidden register rolls through while it loads
    const r = (t / intro.SPREAD) * Math.hypot(COLS * 0.62, ROWS) * 1.1;
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
      const dd = Math.abs(Math.hypot((x - COLS / 2) * 0.62, y - ROWS * 0.40) - r);
      if (dd < 2.4) {
        const i = y * COLS + x;
        torch[i] = Math.max(torch[i], 0.30 * (1 - dd / 2.4));
      }
    }
    wakeDim();
    if (t > intro.SPREAD + 760) intro = null;
    else again = true;
  }
  if (wave) {
    const t = now - wave.t0;
    // a faint ripple of the hidden register rolls ahead of the front
    const r = (t / wave.SPREAD) * wave.maxd;
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
      const dd = Math.abs(Math.hypot((x - wave.cx) * 0.62, y - wave.cy) - r);
      if (dd < 2.4) {
        const i = y * COLS + x;
        torch[i] = Math.max(torch[i], 0.30 * (1 - dd / 2.4));
      }
    }
    wakeDim();
    if (t > wave.SPREAD + wave.TWEEN) wave = null;
    else again = true;
  }
  let hot = false;
  for (let i = 0; i < N; i++) {
    if (S[i] > 0.3) { S[i] *= 0.86; hot = true; } else S[i] = 0;
  }
  render(now);
  if (again || hot) braf = requestAnimationFrame(brightLoop);
}
const wakeBright = () => { if (!braf) braf = requestAnimationFrame(brightLoop); };

function startWave(toFace, cx, cy, SPREAD, TWEEN) {
  const fromL = new Float32Array(N);
  const chOld = CH[face];
  if (wave) {
    // retarget mid-flight: capture what's on screen now
    const t = performance.now() - wave.t0;
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
      const i = y * COLS + x;
      const d = Math.hypot((x - wave.cx) * 0.62, y - wave.cy);
      let u = (t - (d / wave.maxd) * wave.SPREAD) / wave.TWEEN;
      u = u < 0 ? 0 : u > 1 ? 1 : u;
      fromL[i] = wave.fromL[i] + (wave.toL[i] - wave.fromL[i]) * easeIO(u);
    }
  } else if (entered) {
    const G = face ? KT : MT;
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++)
      fromL[y * COLS + x] = G[y][x];
  }
  face = toFace;
  const G = face ? KT : MT;
  const toL = new Float32Array(N);
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) toL[y * COLS + x] = G[y][x];
  setSelText();
  if (RM) { wave = null; render(performance.now()); drawDim(); return; }
  wave = { t0: performance.now(), fromL, toL, cx, cy,
           maxd: Math.hypot(COLS * 0.62, ROWS), SPREAD, TWEEN, chOld };
  wakeBright();
}
function morph(px, py) {
  const r = pre2.getBoundingClientRect();
  startWave(1 - face, (px - r.left) / cw, (py - r.top) / chh, 1100, 620);
}
let intro = null;
function enter() {
  entered = true;
  if (RM || THUMB) { render(performance.now()); drawDim(); return; }
  // a few letters land first, then more and more — each spinning through
  // characters of the record until it settles on its own
  const G = face ? KT : MT;
  const delay = new Float32Array(N), spin = new Float32Array(N);
  const SPREAD = 2000;
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const i = y * COLS + x;
    if (OV.has(i)) { delay[i] = SPREAD * (0.72 + 0.28 * R()); spin[i] = 260 + R() * 300; }
    else if (G[y][x] >= HI && CH[face][i] !== " ") {
      delay[i] = Math.pow(R(), 0.55) * SPREAD;
      spin[i] = 280 + R() * 420;
    }
  }
  intro = { t0: performance.now(), delay, spin, SPREAD };
  wakeBright();
}

/* ---- glints: cells swell into the hot layer for a breath ---- */
function glint(x, y, amp) {
  S[y * COLS + x] = amp;
  wakeBright();
}
const lit = [MT, KT].map((G) => {
  const cells = [];
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++)
    if (G[y][x] >= HI) cells.push([x, y]);
  return cells;
});
let idleTimer = 0;
function schedIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(idleGlint, 1200 + R() * 2400);
}
function idleGlint() {
  if (entered && !wave && !intro && !RM && !document.hidden) {
    const cells = lit[face];
    const n = 2 + (R() * 3 | 0);
    for (let k = 0; k < n; k++) {
      const [x, y] = cells[(R() * cells.length) | 0];
      glint(x, y, 5 + R() * 5);
    }
  }
  schedIdle();
}

/* ---- the torch ---- */
function splat(px, py) {
  const r = pre2.getBoundingClientRect();
  const cx = (px - r.left) / cw, cy = (py - r.top) / chh;
  const RAD = 9;
  for (let y = Math.max(0, cy - RAD | 0); y < Math.min(ROWS, cy + RAD); y++)
    for (let x = Math.max(0, cx - RAD | 0); x < Math.min(COLS, cx + RAD); x++) {
      const d = Math.hypot((x - cx) * 0.62, y - cy) / (RAD * 0.62);
      if (d < 1) torch[y * COLS + x] = Math.max(torch[y * COLS + x], 1 - d * d);
    }
  wakeDim();
  // the stroke stirs the lit surface too — a soft swell, not a flicker
  if (!RM && R() < 0.6) {
    const G = face ? KT : MT;
    for (let k = 0; k < 2; k++) {
      const x = (cx + R() * 5 - 2.5) | 0, y = (cy + R() * 3 - 1.5) | 0;
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS && G[y][x] >= HI) glint(x, y, 5);
    }
  }
}

/* ---- input: tap flips the face, a drag is a torch ---- */
let pid = -1, x0 = 0, y0 = 0, t1 = 0, moved = 0;
F.stage.addEventListener("pointerdown", (e) => {
  if (pid >= 0) return;
  pid = e.pointerId; x0 = e.clientX; y0 = e.clientY;
  t1 = performance.now(); moved = 0;
  try { F.stage.setPointerCapture(pid); } catch (_) {}
});
F.stage.addEventListener("pointermove", (e) => {
  if (e.pointerId !== pid) return;
  moved = Math.max(moved, Math.hypot(e.clientX - x0, e.clientY - y0));
  if (moved >= 8 && entered) {
    // a drag is a torch stroke, not a selection — the text stays
    // selectable at rest (double-tap, long-press, select-all)
    if (!document.body.classList.contains("nosel")) {
      document.body.classList.add("nosel");
      getSelection().removeAllRanges();
    }
    splat(e.clientX, e.clientY);
  }
});
const up = (e) => {
  if (e.pointerId !== pid) return;
  pid = -1;
  document.body.classList.remove("nosel");
  if (e.type === "pointerup" && moved < 8 && performance.now() - t1 < 350 && entered && !intro)
    morph(e.clientX, e.clientY);
};
F.stage.addEventListener("pointerup", up);
F.stage.addEventListener("pointercancel", up);

/* ---- arrival ---- */
document.fonts.load("520 12px 'Geist Mono'").then(() => {
  metrics();
  setSelText();
  if (THUMB || RM) { entered = true; render(performance.now()); drawDim(); return; }
  // a beat of dark room before the face resolves
  setTimeout(() => { enter(); schedIdle(); }, 380);
});
</script>
