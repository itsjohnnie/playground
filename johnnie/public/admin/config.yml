# Sveltia CMS configuration
# Docs: https://github.com/sveltia/sveltia-cms
#
# All paths are relative to the REPO ROOT (itsjohnnie/playground), because the
# Next.js app lives in the `johnnie/` subfolder.

backend:
  name: github
  repo: itsjohnnie/playground
  branch: main # the branch your live site deploys from
  # Our own GitHub OAuth handler (the Cloudflare Worker), instead of Netlify's.
  # Change this to https://johnnies.life once the domain is on Cloudflare.
  base_url: https://playground.johnnie-885.workers.dev
  auth_endpoint: auth

# Lets you edit locally without GitHub auth:
#   1) cd johnnie && npx @sveltia/cms-server
#   2) open http://localhost:3000/admin/ (or your dev server's /admin/)
local_backend: true

# Uploaded images go here and are referenced from the site as /images/<file>
media_folder: "johnnie/public/images"
public_folder: "/images"

collections:
  - name: projects
    label: "Projects"
    label_singular: "Project"
    folder: "johnnie/content/projects"
    create: true
    slug: "{{fields.order}}-{{slug}}"
    identifier_field: title
    sortable_fields: [order, title]
    summary: "{{fields.order}} — {{title}}"
    fields:
      - { name: order, label: "Order (sort position)", widget: number, value_type: int, default: 99 }
      - { name: title, label: "Title", widget: string }
      - { name: tag, label: "Tag (small label, optional)", widget: string, required: false, default: "" }
      - { name: poster, label: "Poster image", widget: image, choose_url: false }
      - { name: video, label: "Video (mp4, optional)", widget: file, required: false, default: "" }
      - { name: award_text, label: "Award text (optional)", widget: string, required: false, default: "" }
      - { name: award_url, label: "Award link (optional)", widget: string, required: false, default: "" }

  - name: features
    label: "Features & Appearances"
    label_singular: "Feature"
    folder: "johnnie/content/features"
    create: true
    slug: "{{fields.order}}-{{slug}}"
    identifier_field: title
    sortable_fields: [order, title]
    summary: "{{fields.order}} — {{title}}"
    fields:
      - { name: order, label: "Order (sort position)", widget: number, value_type: int, default: 99 }
      - { name: title, label: "Title", widget: string }
      - { name: category, label: "Category (e.g. Podcast, Interview)", widget: string }
      - { name: url, label: "Link", widget: string }

  - name: discover
    label: "Discover Gallery"
    label_singular: "Discovery"
    folder: "johnnie/content/discover"
    create: true
    slug: "{{fields.order}}-{{slug}}"
    identifier_field: name
    sortable_fields: [order, name]
    summary: "{{fields.order}} — {{name}}"
    # Discover images are self-hosted under /discover (kept separate from the
    # homepage's /images), so this collection uploads there.
    media_folder: "/johnnie/public/discover"
    public_folder: "/discover"
    fields:
      - { name: order, label: "Order (sort position)", widget: number, value_type: int, default: 99 }
      - { name: name, label: "Name", widget: string }
      - { name: category, label: "Category (e.g. SaaS, Hospitality)", widget: string }
      - { name: image, label: "Image", widget: image, choose_url: false }

  - name: stuff
    label: "Stuff"
    label_singular: "Item"
    folder: "johnnie/content/stuff"
    create: true
    slug: "{{fields.order}}-{{slug}}"
    identifier_field: name
    sortable_fields: [order, name, category]
    summary: "{{fields.order}} — {{name}} ({{category}})"
    fields:
      - { name: order, label: "Order (sort position)", widget: number, value_type: int, default: 99 }
      - { name: name, label: "Product name", widget: string }
      - { name: category, label: "Category (Watch, Perfume, Clothing, Shoe…)", widget: string }
      - { name: owned, label: "Owned? (off = wishlist, shown dimmed)", widget: boolean, default: false }
      - { name: status, label: "Status override (e.g. \"Sold\" — leave blank for automatic Owned/Wishlist)", widget: string, required: false, default: "" }
      - { name: brand, label: "Brand", widget: string, required: false, default: "" }
      - { name: price, label: "Price (e.g. $5,000)", widget: string, required: false, default: "" }
      - { name: description, label: "Description (keep to 3–4 lines on mobile)", widget: text, required: false, default: "" }
      - name: specs
        label: "Extra details (dimensions, weight, movement…)"
        widget: list
        required: false
        label_singular: "Detail"
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - { name: label, label: "Label (e.g. Case, Weight, Volume)", widget: string }
          - { name: value, label: "Value (e.g. 40 mm, 250 g)", widget: string }
      - { name: image, label: "Isometric image (light theme)", widget: image, required: false, choose_url: false }
      - { name: image_dark, label: "Isometric image (dark theme, optional)", widget: image, required: false, choose_url: false }
      - { name: link, label: "Buy / info link (optional)", widget: string, required: false, default: "" }
      - { name: cta, label: "Button label (defaults to \"Buy it\")", widget: string, required: false, default: "" }
