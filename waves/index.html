<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Banded Gradient Waves</title>
    <style>
        :root { color-scheme: dark; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            position: fixed;
            inset: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .hint {
            position: fixed;
            left: 50%;
            bottom: max(1.5rem, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            padding: 9px 16px;
            border-radius: 999px;
            color: #fff;
            /* A low-opacity white wash + backdrop blur reads as a light
               version of whatever gradient sits behind it, and the soft
               shadow keeps the text legible across every palette. */
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.20);
            -webkit-backdrop-filter: blur(14px) saturate(1.3);
            backdrop-filter: blur(14px) saturate(1.3);
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.35);
            font: 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .hint.gone { opacity: 0; }
        .fallback {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            color: #888;
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <canvas id="gl"></canvas>
    <div class="hint" id="hint">tap to shuffle colors</div>
    <div class="fallback" id="fallback">Your browser doesn't support WebGL, so these waves can't render.</div>

    <script>
    (function () {
        const canvas = document.getElementById('gl');
        const gl = canvas.getContext('webgl', { antialias: true, premultipliedAlpha: false })
                || canvas.getContext('experimental-webgl');

        if (!gl) {
            document.getElementById('fallback').style.display = 'flex';
            return;
        }

        // ---- Shaders --------------------------------------------------------
        const vertSrc = `
            attribute vec2 a_pos;
            void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
        `;

        // Fluted-glass model: the screen is sliced into well-defined vertical
        // (or horizontal) flutes. Each flute samples one shared gradient, but
        // shifted along its length by a *quantized* offset. That offset varies
        // as a slow wave from flute to flute, so the gradient's contours bend
        // into the stepped chevron / arch seams — like a gradient seen through
        // fluted glass.
        const fragSrc = `
            precision highp float;

            uniform vec2  u_res;
            uniform float u_time;
            uniform float u_vertical;   // 1.0 = vertical flutes, 0.0 = horizontal
            uniform float u_bands;      // number of flutes
            // Palettes are supplied in OKLab so every blend is perceptually
            // uniform — no muddy mid-tones or uneven brightness like RGB/HSL.
            uniform vec3  u_colors[5];
            uniform float u_paletteMix; // 0..1 crossfade between old and new palette
            uniform vec3  u_prevColors[5];

            const float TAU = 6.28318530718;
            const float PI  = 3.14159265359;

            // Smooth circular blend across 5 OKLab colors, crossfading the old
            // palette into the new one. Returns an OKLab triplet. A raised-
            // cosine window (instead of a linear/triangular one) keeps the
            // blend C1-continuous, so the flow between colors has no kink at
            // each stop — the transitions glide rather than fold.
            vec3 colorCycle(float t) {
                float p = fract(t) * 5.0;
                vec3 lab = vec3(0.0);
                float wsum = 0.0;
                for (int i = 0; i < 5; i++) {
                    float d = abs(p - float(i));
                    d = min(d, 5.0 - d);
                    float w = d < 1.0 ? 0.5 + 0.5 * cos(d * PI) : 0.0;
                    vec3 c = mix(u_prevColors[i], u_colors[i], u_paletteMix);
                    lab += c * w;
                    wsum += w;
                }
                return lab / wsum;
            }

            // OKLab -> linear sRGB -> gamma-encoded sRGB.
            vec3 oklabToLinear(vec3 lab) {
                float l_ = lab.x + 0.3963377774 * lab.y + 0.2158037573 * lab.z;
                float m_ = lab.x - 0.1055613458 * lab.y - 0.0638541728 * lab.z;
                float s_ = lab.x - 0.0894841775 * lab.y - 1.2914855480 * lab.z;
                float l = l_ * l_ * l_;
                float m = m_ * m_ * m_;
                float s = s_ * s_ * s_;
                return vec3(
                     4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
                    -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
                    -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s
                );
            }

            vec3 linearToSrgb(vec3 c) {
                c = clamp(c, 0.0, 1.0);
                return mix(12.92 * c,
                           1.055 * pow(c, vec3(1.0 / 2.4)) - 0.055,
                           step(0.0031308, c));
            }

            // Interleaved gradient noise — a higher-quality dither pattern
            // than a plain hash, very effective at dissolving 8-bit banding
            // in dark gradients.
            float ign(vec2 p) {
                return fract(52.9829189 * fract(0.06711056 * p.x + 0.00583715 * p.y));
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_res.xy;

                // 'across' runs perpendicular to the flutes; 'along' runs down
                // each flute (this is the gradient + displacement axis).
                float across = mix(uv.y, uv.x, u_vertical);
                float along  = mix(uv.x, uv.y, u_vertical);

                float t = u_time;

                // Which flute are we in.
                float idx    = floor(across * u_bands);
                float center = (idx + 0.5) / u_bands;

                // Per-flute displacement. Uses the flute *center*, so it is
                // constant across each flute -> a hard step between neighbours
                // = the staircase look. Layered sines make it drift like waves.
                // Amplitudes are kept moderate so neighbouring flutes never jump
                // to wildly different parts of the gradient (which reads choppy).
                float disp =
                      sin(center * TAU * 1.0 + t * 0.40) * 0.17
                    + sin(center * TAU * 1.7 - t * 0.27) * 0.09
                    + sin(center * TAU * 0.5 + t * 0.13) * 0.20;

                float q = along + disp;

                // The shared gradient: colour traverses the palette (in OKLab)
                // while the brightness envelope opens from black up to full
                // colour. Scaling OKLab toward 0 fades cleanly to true black.
                vec3 lab = colorCycle(q * 0.85 + t * 0.03);
                float bright = 0.5 + 0.5 * cos(q * TAU * 0.5 - 0.2);
                bright = pow(clamp(bright, 0.0, 1.0), 1.2);
                vec3 color = linearToSrgb(oklabToLinear(lab * bright));

                // Interleaved-gradient-noise dither, animated, to dissolve any
                // residual 8-bit banding in the smooth/dark regions.
                color += (ign(gl_FragCoord.xy + 113.0 * fract(t)) - 0.5) / 128.0;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        function compile(type, src) {
            const sh = gl.createShader(type);
            gl.shaderSource(sh, src);
            gl.compileShader(sh);
            if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(sh));
            }
            return sh;
        }

        const program = gl.createProgram();
        gl.attachShader(program, compile(gl.VERTEX_SHADER, vertSrc));
        gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragSrc));
        gl.linkProgram(program);
        gl.useProgram(program);

        // Full-screen triangle.
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
        const loc = gl.getAttribLocation(program, 'a_pos');
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

        const uRes        = gl.getUniformLocation(program, 'u_res');
        const uTime       = gl.getUniformLocation(program, 'u_time');
        const uVertical   = gl.getUniformLocation(program, 'u_vertical');
        const uBands      = gl.getUniformLocation(program, 'u_bands');
        const uColors     = gl.getUniformLocation(program, 'u_colors');
        const uPrevColors = gl.getUniformLocation(program, 'u_prevColors');
        const uPalMix     = gl.getUniformLocation(program, 'u_paletteMix');

        // ---- Palette: 5 harmonious colors, fresh on load and on every tap ----
        function hslToRgb(h, s, l) {
            h = (h % 360 + 360) % 360 / 360;
            const a = s * Math.min(l, 1 - l);
            const f = (n) => {
                const k = (n + h * 12) % 12;
                return l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
            };
            return [f(0), f(8), f(4)];
        }

        // sRGB -> OKLab so the shader can blend colors perceptually.
        function srgbToOklab(r, g, b) {
            const lin = (c) => (c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4));
            r = lin(r); g = lin(g); b = lin(b);
            const l = Math.cbrt(0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b);
            const m = Math.cbrt(0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b);
            const s = Math.cbrt(0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b);
            return [
                0.2104542553 * l + 0.7936177850 * m - 0.0040720468 * s,
                1.9779984951 * l - 2.4285922050 * m + 0.4505937099 * s,
                0.0259040371 * l + 0.7827717662 * m - 0.8086757660 * s,
            ];
        }

        function makePalette() {
            const baseHue = Math.random() * 360;
            // Hue spread kept in the analogous / split-complementary range so
            // the set always reads as harmonious.
            const spread = 70 + Math.random() * 110;
            const sat = 0.62 + Math.random() * 0.23;
            const lab = [];
            for (let i = 0; i < 5; i++) {
                const tt = i / 4;
                const hue = baseHue + (tt - 0.5) * spread;
                const light = 0.48 + Math.sin(tt * Math.PI) * 0.12;
                lab.push(...srgbToOklab(...hslToRgb(hue, sat, light)));
            }
            return new Float32Array(lab);
        }

        let currentPalette = makePalette();
        let prevPalette = currentPalette;
        let mixStart = -1;                 // timestamp (s) when a crossfade began
        const MIX_DUR = 1.1;               // seconds to crossfade palettes
        gl.uniform3fv(uColors, currentPalette);
        gl.uniform3fv(uPrevColors, currentPalette);
        gl.uniform1f(uPalMix, 1.0);

        function shuffleColors() {
            prevPalette = currentPalette;
            currentPalette = makePalette();
            gl.uniform3fv(uPrevColors, prevPalette);
            gl.uniform3fv(uColors, currentPalette);
            mixStart = (performance.now() - start) / 1000;
        }

        // ---- Tap / click anywhere to shuffle the palette --------------------
        const hint = document.getElementById('hint');
        let hintGone = false;
        function onTap(e) {
            // Avoid double-firing (touchend + the click it synthesizes).
            if (e.cancelable) e.preventDefault();
            if (!hintGone) { hint.classList.add('gone'); hintGone = true; }
            shuffleColors();
        }
        window.addEventListener('pointerdown', onTap, { passive: false });
        // Fallback for browsers without Pointer Events.
        if (!window.PointerEvent) {
            window.addEventListener('touchstart', onTap, { passive: false });
            window.addEventListener('mousedown', onTap);
        }
        // Auto-hide the hint after a few seconds even if untouched.
        setTimeout(() => { if (!hintGone) hint.classList.add('gone'); }, 4500);

        // ---- Orientation + flute count --------------------------------------
        let vertical = 1.0;
        let bands = 24;
        function updateLayout() {
            // Portrait (taller than wide) -> horizontal flutes (phones);
            // landscape / desktop -> vertical flutes.
            vertical = window.innerWidth >= window.innerHeight ? 1.0 : 0.0;
            // Fixed band counts: 16 on desktop (landscape), 12 on mobile.
            bands = vertical ? 16 : 12;
        }

        function resize() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const w = Math.floor(window.innerWidth * dpr);
            const h = Math.floor(window.innerHeight * dpr);
            if (canvas.width !== w || canvas.height !== h) {
                canvas.width = w;
                canvas.height = h;
            }
            gl.viewport(0, 0, w, h);
            updateLayout();
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', resize);
        resize();

        // ---- Render loop ----------------------------------------------------
        const start = performance.now();
        function frame(now) {
            const t = (now - start) / 1000;
            let mix = 1.0;
            if (mixStart >= 0) {
                mix = Math.min(1.0, (t - mixStart) / MIX_DUR);
                mix = mix * mix * (3.0 - 2.0 * mix); // smoothstep
            }
            gl.uniform2f(uRes, canvas.width, canvas.height);
            gl.uniform1f(uTime, t);
            gl.uniform1f(uVertical, vertical);
            gl.uniform1f(uBands, bands);
            gl.uniform1f(uPalMix, mix);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    })();
    </script>
</body>
</html>
