<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretext — Text Orb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: Georgia, 'Times New Roman', serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #stage {
            position: relative;
            width: 720px;
            height: 640px;
        }

        #text-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .line {
            position: absolute;
            white-space: nowrap;
            color: #c4c8d4;
            font: 18px Georgia, serif;
            will-change: transform;
            transition: color 0.15s linear;
        }

        #orb {
            position: absolute;
            border-radius: 50%;
            cursor: grab;
            background: radial-gradient(circle at 35% 35%,
                rgba(140, 200, 255, 0.9),
                rgba(80, 120, 255, 0.6) 40%,
                rgba(60, 40, 180, 0.3) 70%,
                transparent);
            box-shadow:
                0 0 40px 10px rgba(100, 150, 255, 0.4),
                0 0 80px 20px rgba(80, 100, 255, 0.2),
                inset -20px -20px 40px rgba(20, 0, 80, 0.4);
            will-change: transform;
        }

        #orb.dragging {
            cursor: grabbing;
        }

        #orb::after {
            content: '';
            position: absolute;
            top: 18%;
            left: 22%;
            width: 25%;
            height: 25%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            filter: blur(8px);
        }

        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 25, 0.92);
            padding: 20px;
            border-radius: 8px;
            min-width: 220px;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #controls h3 {
            font-size: 13px;
            margin-bottom: 16px;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .control-group {
            margin-bottom: 14px;
        }

        .control-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #6080ff;
        }

        .val {
            float: right;
            opacity: 0.8;
            font-variant-numeric: tabular-nums;
        }

        #stats {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            opacity: 0.7;
            font-variant-numeric: tabular-nums;
        }

        #hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font: 12px system-ui, sans-serif;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        a {
            color: #8aa5ff;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="text-layer"></div>
        <div id="orb"></div>
    </div>

    <div id="controls">
        <h3>TEXT ORB</h3>
        <div class="control-group">
            <label>Orb radius <span class="val" id="radius-val">90</span></label>
            <input type="range" id="radius" min="30" max="180" value="90">
        </div>
        <div class="control-group">
            <label>Padding <span class="val" id="padding-val">16</span></label>
            <input type="range" id="padding" min="0" max="60" value="16">
        </div>
        <div class="control-group">
            <label>Line height <span class="val" id="lh-val">26</span></label>
            <input type="range" id="lh" min="20" max="40" value="26">
        </div>
        <div id="stats">
            <div>layout: <span id="perf">—</span></div>
            <div>lines: <span id="line-count">—</span></div>
            <div style="margin-top:8px">
                <a href="https://github.com/chenglou/pretext" target="_blank">pretext.js</a> by chenglou
            </div>
        </div>
    </div>

    <div id="hint">drag the orb · text reflows at 60fps via pure math</div>

    <script type="module" src="./main.js"></script>
</body>
</html>
