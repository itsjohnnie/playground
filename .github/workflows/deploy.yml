name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time. New pushes cancel queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truco
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: truco/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      # The site lives at /playground/truco/ to match the existing
      # webclip URL. Stage dist/ into a wrapper so the artifact root
      # serves /truco/ correctly.
      - name: Stage truco
        run: |
          mkdir -p ../_site/truco
          cp -r dist/. ../_site/truco/

      # Bundle every other static experiment + root files into the
      # same Pages artifact. The repo root is the working directory
      # here, not truco/. Anything that is its own folder of static
      # HTML/CSS/JS gets copied wholesale.
      - name: Stage rest of playground
        working-directory: ${{ github.workspace }}
        run: |
          shopt -s nullglob
          cp .nojekyll _site/ 2>/dev/null || true
          for f in index.html styles.css script.js README.md; do
            [ -e "$f" ] && cp "$f" _site/
          done
          for d in ascii cc dithered dots dott flyy generative-ui haiku jitter \
                   liquid liquid-glass-icon mask orb os poetry pretext sizzle \
                   toaster tyme waves; do
            if [ -d "$d" ]; then
              mkdir -p "_site/$d"
              cp -r "$d/." "_site/$d/"
            fi
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
