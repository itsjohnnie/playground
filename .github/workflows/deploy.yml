name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time. New pushes cancel queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truco
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: truco/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      # The site lives at /playground/truco/ to match the existing
      # webclip URL. Stage dist/ into a wrapper so the artifact root
      # serves /truco/ correctly.
      - name: Stage artifact
        run: |
          mkdir -p ../_site/truco
          cp -r dist/. ../_site/truco/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
