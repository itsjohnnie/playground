name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truco
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: truco/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx vite build
