name: Deploy to Cloudflare

# Builds the johnnie site at the domain ROOT (no base path) and deploys the
# Cloudflare Worker (worker/index.js + johnnie/out assets + the contact-form
# email handler). Runs on every push to main, so johnnies.life always tracks
# the repo — same idea as the GitHub Pages workflow, but for the real domain.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   - create via Cloudflare → My Profile → API Tokens →
#                            "Edit Cloudflare Workers" template.
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare dashboard → Workers & Pages (right side),
#                            or the hex id in the dashboard URL.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: johnnie/package-lock.json

      # Root build: DO NOT set PAGES_BASE_PATH — the domain serves from "/".
      - name: Build johnnie (root)
        working-directory: johnnie
        run: |
          npm ci
          npm run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
