<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#13261C"/>
  <rect width="512" height="512" rx="110" fill="url(#g)" opacity="0.4"/>
  <defs>
    <radialGradient id="g" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#1F4530"/>
      <stop offset="100%" stop-color="#13261C"/>
    </radialGradient>
  </defs>

  <!-- Bone "T" mark -->
  <text x="256" y="345" text-anchor="middle"
    font-family="Fraunces, Georgia, serif" font-weight="500"
    font-size="290" fill="#EFE4D2" letter-spacing="-10">T</text>

  <!-- Spanish-suit row: oro · copa · espada · basto, scaled to 32px -->
  <g transform="translate(160 410) scale(2)">
    <!-- Oro: ringed coin (honey) -->
    <g transform="translate(0 0)" fill="none" stroke="#D9A852" stroke-width="2">
      <circle cx="12" cy="12" r="9"/>
      <circle cx="12" cy="12" r="3.6" fill="#D9A852"/>
    </g>
    <!-- Copa: chalice (warm red, dim) -->
    <g transform="translate(32 0)" fill="#B84246">
      <path d="M5.4 3.5 H18.6 V5 C18.6 9.2 15.6 12.6 12 13 C8.4 12.6 5.4 9.2 5.4 5 Z"/>
      <rect x="11.2" y="13" width="1.6" height="5"/>
      <rect x="7" y="18.4" width="10" height="1.8" rx="0.5"/>
    </g>
    <!-- Espada: sword (bone, dim) -->
    <g transform="translate(64 0)" fill="#9F948A">
      <path d="M12 2.5 L13.4 16 H10.6 Z"/>
      <rect x="5.6" y="16" width="12.8" height="1.6" rx="0.4"/>
      <rect x="11.2" y="17.6" width="1.6" height="2.6"/>
      <circle cx="12" cy="21" r="1.4"/>
    </g>
    <!-- Basto: club (bone, dim) -->
    <g transform="translate(96 0)" fill="#9F948A">
      <ellipse cx="12" cy="3.5" rx="2" ry="1"/>
      <path d="M10 3.5 H14 L14.7 19.5 H9.3 Z"/>
      <ellipse cx="12" cy="19.8" rx="2.7" ry="1.1"/>
    </g>
  </g>
</svg>
