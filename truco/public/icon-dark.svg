<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Truco</title>
  <!-- Felt-dark background. iOS applies its own rounded mask, so this is flat full-bleed. -->
  <rect width="1024" height="1024" fill="#0D1110"/>

  <!-- 2x2 grid of Spanish suits — canonical order: oro, copa, espada, basto.
       Each glyph is the same path as src/components/ui/Suits.tsx, scaled 11.667x
       so the original 24x24 viewBox becomes ~280px wide, centered in its 512x512 quadrant. -->

  <!-- Oro — top-left, centered at (256, 256) -->
  <g transform="translate(116 116) scale(11.667)" color="#D68B5C">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="12" cy="12" r="3.6" fill="currentColor"/>
  </g>

  <!-- Copa — top-right, centered at (768, 256) -->
  <g transform="translate(628 116) scale(11.667)" color="#D24150" fill="currentColor">
    <path d="M5.4 3.5 H18.6 V5 C18.6 9.2 15.6 12.6 12 13 C8.4 12.6 5.4 9.2 5.4 5 Z"/>
    <rect x="11.2" y="13" width="1.6" height="5"/>
    <rect x="7" y="18.4" width="10" height="1.8" rx="0.5"/>
  </g>

  <!-- Espada — bottom-left, centered at (256, 768) -->
  <g transform="translate(116 628) scale(11.667)" color="#88A8BF" fill="currentColor">
    <path d="M12 2.5 L13.4 16 H10.6 Z"/>
    <rect x="5.6" y="16" width="12.8" height="1.6" rx="0.4"/>
    <rect x="11.2" y="17.6" width="1.6" height="2.6"/>
    <circle cx="12" cy="21" r="1.4"/>
  </g>

  <!-- Basto — bottom-right, centered at (768, 768) -->
  <g transform="translate(628 628) scale(11.667)" color="#76A78B" fill="currentColor">
    <ellipse cx="12" cy="3.5" rx="2" ry="1"/>
    <path d="M10 3.5 H14 L14.7 19.5 H9.3 Z"/>
    <ellipse cx="12" cy="19.8" rx="2.7" ry="1.1"/>
  </g>
</svg>
