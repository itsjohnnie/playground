<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/playground/truco/icon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/playground/truco/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/playground/truco/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" media="(prefers-color-scheme: light)" href="/playground/truco/apple-touch-icon-light.png" />
    <link rel="apple-touch-icon" sizes="180x180" media="(prefers-color-scheme: dark)"  href="/playground/truco/apple-touch-icon-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0E1110" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mondays" />
    <script>
      // FOUC guard — set data-theme + theme-color before React mounts.
      (function () {
        var COLORS = { dark: '#0E1110', light: '#f6f3ee' };
        var resolved;
        try {
          var stored = localStorage.getItem('truco.theme.v1');
          resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        } catch (e) {
          resolved = 'dark';
        }
        document.documentElement.dataset.theme = resolved;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', COLORS[resolved]);
      })();
    </script>
    <meta name="description" content="Marcador de Truco Argentino para la mesa de los lunes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..600,30,0&family=Geist:wght@400..600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..600,30,0&family=Geist:wght@400..600&display=swap"
    />
    <title>Truco</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
