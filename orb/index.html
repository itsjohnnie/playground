<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow: hidden;
            background: #000;
            width: 100%;
            height: 100%;
        }
        #stage {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 50% 45%, #05060a 0%, #000 70%);
        }

        /* the glass ball */
        #orb {
            position: relative;
            width: min(74vmin, 720px);
            height: min(74vmin, 720px);
            border-radius: 50%;
            overflow: hidden;
            isolation: isolate;
            box-shadow:
                0 0 90px 14px rgba(90, 120, 255, 0.16),   /* outer glow */
                0 10px 60px 0 rgba(0, 0, 0, 0.6),          /* drop */
                inset 0 0 70px 14px rgba(0, 0, 0, 0.9),    /* fresnel edge darkening */
                inset 0 10px 34px rgba(255, 255, 255, 0.05);
        }

        /* the glowing contents, softened into vapor and confined to the ball */
        #canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) scale(1.35);
            filter: blur(2px) saturate(1.15) brightness(1.05);
            /* fade the vapor before it reaches the glass so it looks suspended inside */
            -webkit-mask: radial-gradient(circle at 50% 50%, #000 42%, rgba(0,0,0,0.35) 60%, transparent 72%);
                    mask: radial-gradient(circle at 50% 50%, #000 42%, rgba(0,0,0,0.35) 60%, transparent 72%);
        }

        /* fresnel rim ring */
        #orb::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%,
                transparent 58%,
                rgba(120, 150, 255, 0.08) 80%,
                rgba(190, 210, 255, 0.28) 96%,
                rgba(255, 255, 255, 0.35) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* glossy specular highlight */
        #orb::after {
            content: '';
            position: absolute;
            top: 7%;
            left: 16%;
            width: 48%;
            height: 32%;
            background: radial-gradient(closest-side,
                rgba(255, 255, 255, 0.55),
                rgba(255, 255, 255, 0));
            filter: blur(7px);
            transform: rotate(-20deg);
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 3;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="orb">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script type="module">
        // Force the cursor far off-screen so the tubes idle at center, inside the orb
        const fakeMouseEvent = new Proxy(MouseEvent, {
            construct(target, args) {
                const event = new target(...args)
                Object.defineProperty(event, 'clientX', { value: -99999, writable: false })
                Object.defineProperty(event, 'clientY', { value: -99999, writable: false })
                return event
            }
        })

        import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js"

        const canvas = document.getElementById('canvas')
        canvas.style.pointerEvents = 'none'

        const app = TubesCursor(canvas, {
            tubes: {
                colors: ["#4f8fff", "#ff3b6b", "#9b6bff"],
                lights: {
                    intensity: 220,
                    colors: ["#5fa8ff", "#ff4f8b", "#7d5cff", "#36e0ff"]
                }
            },
            sleepRadiusX: 0,
            sleepRadiusY: 0,
            sleepTimeScale1: 1,
            sleepTimeScale2: 1
        })

        // click anywhere to recolor the vapor
        document.body.addEventListener('click', () => {
            app.tubes.setColors(randomColors(3))
            app.tubes.setLightsColors(randomColors(4))
        })

        function randomColors (count) {
            return new Array(count)
                .fill(0)
                .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'))
        }
    </script>
</body>
</html>
