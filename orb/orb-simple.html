<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Orb</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Create orb with glowing tubes
        const geometry = new THREE.TorusKnotGeometry(1, 0.3, 128, 16);
        const material = new THREE.MeshPhongMaterial({
            color: 0xf967fb,
            emissive: 0x53bc28,
            shininess: 100,
            wireframe: false
        });

        const orb = new THREE.Mesh(geometry, material);
        scene.add(orb);

        // Add lights
        const light1 = new THREE.PointLight(0x83f36e, 200, 100);
        light1.position.set(2, 2, 2);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xfe8a2e, 200, 100);
        light2.position.set(-2, -2, 2);
        scene.add(light2);

        const light3 = new THREE.PointLight(0xff008a, 200, 100);
        light3.position.set(0, 2, -2);
        scene.add(light3);

        const light4 = new THREE.PointLight(0x60aed5, 200, 100);
        light4.position.set(2, -2, -2);
        scene.add(light4);

        camera.position.z = 5;

        // Animation
        function animate() {
            requestAnimationFrame(animate);

            orb.rotation.x += 0.01;
            orb.rotation.y += 0.01;

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // Click to randomize colors
        document.body.addEventListener('click', () => {
            const randomColor = () => '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            material.color.set(randomColor());
            material.emissive.set(randomColor());
            light1.color.set(randomColor());
            light2.color.set(randomColor());
            light3.color.set(randomColor());
            light4.color.set(randomColor());
        });
    </script>
</body>
</html>
